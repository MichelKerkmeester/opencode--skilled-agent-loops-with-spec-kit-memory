model_auto_compact_token_limit = 750000

approval_policy = "never"
sandbox_mode = "danger-full-access"
[mcp_servers.sequential_thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
 
[mcp_servers.spec_kit_memory]
command = "node"
args = [".opencode/bin/spec-kit-memory-launcher.cjs"]

[mcp_servers.spec_kit_memory.env]
EMBEDDINGS_PROVIDER = "auto"
# MEMORY_DB_PATH intentionally unset: filename is auto-derived from provider+model+dim
# (e.g., context-index__hf-local__onnx-community__embeddinggemma-300m-ONNX__768.sqlite
# for the Setup A default since 014/011). To override the model: set
# HF_EMBEDDINGS_MODEL in .env.local at repo root (see .env.example).
SPECKIT_SESSION_BOOST = "true"
SPECKIT_CAUSAL_BOOST = "true"
_NOTE_1_DATABASE = "Stores vectors in: .opencode/skills/system-spec-kit/mcp_server/database/context-index__hf-local__onnx-community__embeddinggemma-300m-ONNX__768.sqlite"
_NOTE_2_PROVIDERS = "Default HF Local: onnx-community/embeddinggemma-300m-ONNX (768 dims, q8 dtype default for 1/4 RAM at ~99% quality, no API key); cloud providers optional (Voyage 1024 dims, OpenAI 1536/3072 dims)"
_NOTE_3_EMBEDDINGS_PROVIDER = "Current: 'hf-local' (free, offline, Setup A default). Options: 'auto', 'voyage', 'openai'"
_NOTE_4_CLOUD_PROVIDERS = "For cloud: add VOYAGE_API_KEY or OPENAI_API_KEY and set EMBEDDINGS_PROVIDER=auto"
_NOTE_5_GET_VOYAGE_KEY = "Get Voyage key: https://dash.voyageai.com/api-keys (recommended, 8% better than OpenAI)"
_NOTE_6_GET_OPENAI_KEY = "Get OpenAI key: https://platform.openai.com/api-keys"
_NOTE_7_FEATURE_FLAGS = "Opt-out flags (all default ON): SPECKIT_ADAPTIVE_FUSION, SPECKIT_EXTENDED_TELEMETRY, SPECKIT_SESSION_BOOST, SPECKIT_CAUSAL_BOOST"
_NOTE_8_CODE_GRAPH_SCOPE = "Maintainer mode — opt-in all 5 .opencode/ folders (skills, agents, commands, specs, plugins) to the structural code graph. Per-call code_graph_scan args (includeSkills/Agents/Commands/Specs/Plugins) override these env defaults."
SPECKIT_CODE_GRAPH_INDEX_SKILLS = "false"
SPECKIT_CODE_GRAPH_INDEX_AGENTS = "false"
SPECKIT_CODE_GRAPH_INDEX_COMMANDS = "false"
SPECKIT_CODE_GRAPH_INDEX_SPECS = "false"
SPECKIT_CODE_GRAPH_INDEX_PLUGINS = "false"

[mcp_servers.cocoindex_code]
command = ".opencode/skills/mcp-coco-index/mcp_server/.venv/bin/ccc"
args = ["mcp"]

[mcp_servers.cocoindex_code.env]
COCOINDEX_CODE_ROOT_PATH = "."
_NOTE_1 = "Install: bash .opencode/skills/mcp-coco-index/scripts/install.sh"
_NOTE_2 = "Default embedding: google/embeddinggemma-300m (sentence-transformers, ~620MB, no API key — Setup A default since 014/011)"
_NOTE_3 = "Index stored in .cocoindex_code/ (gitignored)"

[mcp_servers.code_mode]
command = "node"
args = [".opencode/skills/mcp-code-mode/mcp_server/dist/index.js"]

[mcp_servers.code_mode.env]
UTCP_CONFIG_FILE = ".utcp_config.json"

[features]
multi_agent = true
child_agents_md = true

# Profiles for `codex exec -p <name>` are NOT defined here.
# Codex ignores [profiles.*] in project-local configs.
# They live at user level (~/.codex/config.toml) — see entries there.

# Agents for interactive multi-agent TUI (codex with multi_agent feature)
[agents.code]
description = "Application-code implementation specialist using sk-code for stack-aware execution."
config_file = "agents/code.toml"

[agents.markdown]
description = "Dedicated /create:* documentation executor using sk-doc templates."
config_file = "agents/markdown.toml"

[agents.context]
description = "Production context retrieval specialist (memory-first, read-only)."
config_file = "agents/context.toml"

[agents.debug]
description = "Debugging specialist for root-cause analysis and fix validation."
config_file = "agents/debug.toml"

[agents.orchestrate]
description = "Senior orchestrator for decomposition, delegation, and synthesis."
config_file = "agents/orchestrate.toml"

[agents.deep-research]
description = "Iterative investigation specialist with convergence detection."
config_file = "agents/deep-research.toml"

[agents.deep-review]
description = "LEAF review agent for deep-review. Performs single review iteration: reads state, reviews one dimension with P0/P1/P2 findings, updates strategy and JSONL."
config_file = "agents/deep-review.toml"

[agents.deep-agent-improvement]
description = "Proposal-only mutator for bounded deep-agent-improvement candidate generation with evaluator-first rules"
config_file = "agents/deep-agent-improvement.toml"

[agents.prompt-improver]
description = "Prompt-improver specialist for framework selection, CLEAR validation, and dispatch-ready prompt packages for high-stakes external CLI invocations"
config_file = "agents/prompt-improver.toml"

[agents.review]
description = "Code review specialist focused on correctness, risk, and tests."
config_file = "agents/review.toml"

[agents.deep-ai-council]
description = "Multi-strategy planning architect for diverse reasoning and optimal plans."
config_file = "agents/deep-ai-council.toml"
