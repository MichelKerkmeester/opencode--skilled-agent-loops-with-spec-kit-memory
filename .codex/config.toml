[mcp_servers."mk-spec-memory"]
command = "node"
args = [".opencode/bin/mk-spec-memory-launcher.cjs"]

[mcp_servers."mk-spec-memory".env]
EMBEDDINGS_PROVIDER = "auto"
# macOS sun_path limit (104 chars): the default bridge socket path under
# database/daemon-ipc.sock exceeds the limit and the launcher fails with
# EINVAL on listen(). Pin the socket dir to a short /tmp path so the
# multi-client launcher bridge can bind cleanly.
SPECKIT_IPC_SOCKET_DIR = "/tmp/mk-spec-memory"
# Phase 008/003: shared rerank sidecar port. Auto-spawned by mk-spec-memory-launcher
# via ensure-rerank-sidecar.cjs when SPECKIT_CROSS_ENCODER=true. Sidecar lives at
# .opencode/skills/system-rerank-sidecar/.
RERANK_SIDECAR_PORT = "8765"
_NOTE_RERANK = "Phase 008/003: when SPECKIT_CROSS_ENCODER=true, the launcher probes localhost:RERANK_SIDECAR_PORT and spawns the system-rerank-sidecar skill detached if absent. Sigmoid-normalized Qwen/Qwen3-Reranker-0.6B scores feed Stage 3 of the cross-encoder pipeline."
# MEMORY_DB_PATH intentionally unset: filename is auto-derived from provider+model+dim
# (e.g., context-index__ollama__nomic-embed-text-v1.5__768.sqlite when Ollama is
# detected; otherwise context-index__hf-local__nomic-ai_nomic-embed-text-v1.5__768.sqlite).
# Resolved automatically by the active embedding profile via shared/embeddings/profile.ts.
# To override the model: set OLLAMA_EMBEDDINGS_MODEL or HF_EMBEDDINGS_MODEL in .env.local (see .env.example).
_NOTE_1_DB = "Default DB (recommended): context-index__ollama__nomic-embed-text-v1.5__768.sqlite (auto-derived from provider+model+dim). Pull `ollama pull nomic-embed-text:v1.5` for the local-first new-user setup; hf-local with nomic-ai/nomic-embed-text-v1.5 is the Python-side fallback."
_NOTE_2_TOOLS = "Registers 42 tools: memory_save/search/context/match_triggers/index_scan/stats/health/validate/update/delete/bulk_delete/list/drift_why/retention_sweep/get_learning_history/quick_search (16 memory), memory_causal_link/stats (2 causal), memory_ingest_start/status/cancel (3 async ingest), embedder_list/set/status (3 embedder), session_bootstrap/resume/health (3 session), checkpoint_create/delete/list/restore (4 checkpoint), task_preflight/postflight (2 task), council_graph_query/status/upsert/convergence (4 council), deep_loop_graph_query/status/upsert/convergence (4 deep-loop), eval_run_ablation/reporting_dashboard (2 eval). MCP namespace: mcp__mk_spec_memory__*"
_NOTE_3_PROVIDERS = "Auto cascade (ADR-014, local-first): Ollama (local) -> hf-local (Python sentence-transformers) -> OpenAI API -> Voyage API."
_NOTE_4_EMBEDDINGS_PROVIDER = "Auto cascade (ADR-014, local-first): Ollama -> hf-local -> OpenAI -> Voyage. Set EMBEDDINGS_PROVIDER=<provider> (ollama|hf-local|openai|voyage) to force a specific tier."
_NOTE_5_CLOUD_PROVIDERS = "Cloud tiers are explicit opt-in: add VOYAGE_API_KEY or OPENAI_API_KEY only when you want cloud embeddings; otherwise the cascade keeps everything local."
_NOTE_6_GET_VOYAGE_KEY = "Get Voyage key: https://dash.voyageai.com/api-keys"
_NOTE_7_GET_OPENAI_KEY = "Get OpenAI key: https://platform.openai.com/api-keys"
_NOTE_8_FEATURE_FLAGS = "Opt-out flags (default ON): SPECKIT_ADAPTIVE_FUSION, SPECKIT_SESSION_BOOST, SPECKIT_CAUSAL_BOOST, SPECKIT_HYDE_ACTIVE, SPECKIT_ENTITY_LINKING, SPECKIT_GRAPH_CONCEPT_ROUTING, SPECKIT_RERANK_LAYER, SPECKIT_GRAPH_REFRESH_MODE=write_local. Tier 3 LLM save routing is always on (fail-open to Tier 2 on timeout)."
_NOTE_RECOMMENDED_SETUP = "New users: install Ollama (https://ollama.com) and run `ollama pull nomic-embed-text:v1.5`. The cascade auto-detects Ollama and persists nomic-embed-text-v1.5 (768d) as the active embedder — no API keys, all-local."

