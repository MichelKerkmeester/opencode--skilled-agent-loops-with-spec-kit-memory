# ─────────────────────────────────────────────────────────────────
# OPENCODE CREATE: PARENT SKILL WORKFLOW (AUTO MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: autonomous execution (no approval checkpoints)
# Entrypoint: /create:skill-parent
# Operations: create | update
# ─────────────────────────────────────────────────────────────────
role: Parent Skill Creator using sk-doc
purpose: Scaffold a parent skill with nested mode packets (one hub identity, registry source of truth)
action: Normalize inputs, load standards, generate the hub + registry + packets + shared, validate identity, and report completion

# ─────────────────────────────────────────────────────────────────
# PREREQUISITE: @markdown AGENT VERIFICATION
# ─────────────────────────────────────────────────────────────────
# This workflow REQUIRES the @markdown agent for:
#   - Template-first generation
#   - sk-doc standards enforcement
#   - Hub document validation
#
# PHASE 0 in the command markdown verifies @markdown agent BEFORE
# this YAML workflow loads. If you are executing this workflow,
# @markdown verification has already passed.
# ─────────────────────────────────────────────────────────────────

operating_mode:
  workflow: unified_6_step
  workflow_compliance: MANDATORY
  workflow_execution: autonomous
  approvals: none
  tracking: progressive_status_logging
  validation: continuous_self_validation
  supports_operations:
    - create
    - update
  description: |
    Executes the 6-step parent-skill scaffolding workflow without step-by-step approval.
    Pauses only if confidence drops below threshold or existence semantics conflict.

development_philosophy:
  principle: "One discoverable hub identity, the registry as the single declarative source of truth"
  approach: "Normalize -> Plan modes -> Scaffold -> Validate identity -> Report"
  mandate: "Prefer the shipped sk-doc parent-skill pattern over ad-hoc nested-skill layouts"

runtime_agent_path_resolution:
  default: .opencode/agents
  claude: .claude/agents

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with deterministic defaults" }
    medium: { range: "40-79%", action: "Proceed with caution and log assumptions" }
    low: { range: "0-39%", action: "STOP and request clarification" }
  scoring_weights:
    input_completeness: 0.30
    routing_clarity: 0.20
    contract_alignment: 0.30
    validation_readiness: 0.20
  low_confidence_behavior:
    action: "Stop before generation and ask one consolidated clarification"

# ─────────────────────────────────────────────────────────────────
# REQUEST ANALYSIS FRAMEWORK
# ─────────────────────────────────────────────────────────────────
request_analysis_framework:
  code_search_note: "Use Code Graph structural queries (code_graph_query) + Grep for concept discovery; verify hits with Read. memory_search is for spec docs/memory, not arbitrary code."
  solution_flow:
    - "Parse command arguments and normalize execution mode"
    - "Verify create/update semantics against the real target path"
    - "Load the creation reference and both templates before writing"
    - "Derive the mode list and per-mode packet plan"
    - "Generate the hub, registry, packets, and shared dir with one hub identity"
    - "Validate hub structure, per-packet structure, registry coverage, and the one-identity invariant"
  pre_change_validation:
    items:
      - "create_agent_verified is true"
      - "skill_name is present"
      - "operation is create or update"
      - "modes is present and non-empty"
      - "execution_mode is :auto"
    stop_conditions:
      - "Any required input missing"
      - "Operation does not match real target existence"
    stop_action: "STOP and correct setup before generation"

input_contract:
  required:
    - create_agent_verified
    - skill_name
    - operation
    - modes
    - execution_mode
  optional:
    - skill_path
    - surfaces
    - spec_choice
    - spec_path
    - memory_choice

field_handling:
  skill_name:
    validation: "hyphen-case folder name; becomes the hub skill identity"
    required: true
  operation:
    validation: "must be one of: create, update"
    required: true
  modes:
    validation: "comma-separated hyphen-case mode names; one workflow packet per mode"
    required: true
  surfaces:
    validation: "optional comma-separated bare-noun names, one read-only evidence-base surface packet each (packetKind: surface)"
    required: false
  execution_mode:
    validation: "must be :auto"
    required: true

documentation_level:
  default: "Level 2 (Verification)"
  required_files:
    - spec.md
    - plan.md
    - tasks.md
    - checklist.md
  note: "Parent-skill scaffolding spans a hub, a registry, multiple packets, and an identity invariant, so it needs verification"

defaults:
  skill_path: .opencode/skills/
  registry_filename: mode-registry.json
  hub_router_filename: hub-router.json
  description_filename: description.json
  graph_metadata_filename: graph-metadata.json
  shared_dirname: shared
  packet_prefix: "[hub-prefix]-  # derived from the hub (e.g. code- for sk-code); NEVER hardcode deep-. Exception: system-deep-loop's packets keep the deep- prefix (matching the /deep:* command namespace, not the hub folder name) — the folder-prefix/command-namespace-prefix equivalence has this one documented exception."
  surface_packet_naming: "bare noun, no prefix (e.g. webflow)"
  execution_mode: :auto
  dqi_hard_minimum: 75

operation_router:
  create:
    requires_existing_skill: false
    output_scope:
      - SKILL.md
      - mode-registry.json
      - hub-router.json
      - description.json
      - graph-metadata.json
      - changelog/
      - manual-testing-playbook/
      - "[hub-prefix]-<mode>/SKILL.md"
      - "[hub-prefix]-<mode>/README.md"
      - "[hub-prefix]-<mode>/changelog/"
      - "<surface>/{SKILL.md,README.md,changelog/}  (when --surfaces)"
      - shared/
      - shared/README.md
  update:
    requires_existing_skill: true
    output_scope:
      - SKILL.md
      - mode-registry.json
      - hub-router.json
      - description.json
      - graph-metadata.json
      - changelog/
      - "[hub-prefix]-<mode>/SKILL.md"
      - shared/

reference_sources:
  specific_creation: .opencode/skills/sk-doc/create-skill/references/README.md
  pattern_section: "Parent Skills with Nested Mode Packets"
  hub_router_schema: .opencode/skills/sk-doc/create-skill/references/parent-skill/parent-hub-router-schema.md
  core_standards: .opencode/skills/sk-doc/shared/references/core-standards.md
  validation: .opencode/skills/sk-doc/shared/references/validation.md
  canonical_example: .opencode/skills/sk-code

template_sources:
  hub_skill: .opencode/skills/sk-doc/create-skill/assets/parent-skill/parent-skill-hub-template.md
  mode_registry: .opencode/skills/sk-doc/create-skill/assets/parent-skill/parent-skill-registry-template.json
  hub_router: .opencode/skills/sk-doc/create-skill/assets/parent-skill/parent-skill-hub-router-template.json
  description: .opencode/skills/sk-doc/create-skill/assets/parent-skill/parent-skill-description-template.json
  hub_graph_metadata: .opencode/skills/sk-doc/create-skill/assets/parent-skill/parent-skill-graph-metadata-template.json

validation_scripts:
  validate_document: .opencode/skills/sk-doc/scripts/validate_document.py
  extract_structure: .opencode/skills/sk-doc/scripts/extract_structure.py
  advisor_projection_emit: "python3 .opencode/skills/system-skill-advisor/mcp-server/scripts/skill_advisor.py --emit-routing-projection"
  advisor_projection_guard: "PATH=\"/opt/homebrew/bin:$PATH\" npm test -- routing-registry-drift-guard.vitest.ts"

quality_standards:
  template_first: required
  frontmatter_required: true
  hub_requirements:
    - thin routing-only SKILL.md (no per-mode logic)
    - "exactly one graph-metadata.json at the hub root (from parent_skill_graph_metadata_template.json) with skill_id == hub folder name and family in {cli, mcp, sk-code, deep-loop, sk-util, system}"
    - mode-registry.json present and valid JSON
    - "hub-router.json present and valid (routerSignals cover every workflowMode, typed vocabularyClasses, tieBreak covers all modes; any catch-all vocabulary class (hub-identity) is on the default mode only, not specialized modes (see parent_hub_router_schema.md); surface packets get metadata routerSignals plus a surfaceBundle outcome)"
    - description.json present
    - "changelog/ with real files (no symlinks) at the hub root and in every packet"
  registry_requirements:
    - "each mode carries the two-axis discriminator: workflowMode (string) + packetKind (\"workflow\" | \"surface\") + backendKind; runtimeLoopType is present ONLY for workflow modes on a runtime-loop backend (when the runtime-loop extension is declared), otherwise omitted"
    - "each mode carries toolSurface (allowed, forbidden, mutatesWorkspace, bashAllowlist) and grandfatheredFolderMismatch (boolean, false unless a legacy folder/name mismatch is intentionally preserved)"
    - "surface packets (packetKind: surface) are read-only evidence bases: backendKind evidence-base, toolSurface allowed subset of {Read, Bash, Grep, Glob} with {Write, Edit, Task} forbidden and mutatesWorkspace false, advisorRouting.routingClass metadata (advisor-invisible)"
    - "each mode has a top-level packet field naming its packet sub-directory (a direct child of the hub)"
    - one advisorRouting block per mode
    - "advisorRouting fields: routingClass (lexical | alias-fold | metadata | command-bridge), legacyAdvisorId (lexical + alias-fold modes only), advisorDefaultMode (optional, alias-fold default), legacyAliases (lexical + alias-fold only), packetSkillName"
    - "registry keys (mode.packet) match packet folder names; canonical workflow folder == packetSkillName == [hub-prefix]-<mode>, surface folder == packetSkillName == bare noun; grandfathered mismatches recorded via grandfatheredFolderMismatch + packetSkillName"
    - "runtimeLoopType allowed set when present and non-null: research | review | council | context (or the hub's declared runtime-loop types)"
  advisor_projection_requirements:
    - "For lexical/alias-fold modes, emit the generated advisor projection from the finalized mode-registry.json into system-skill-advisor's TypeScript and Python projection constants"
    - "Projection emission must include a SHA-256 freshness hash and must not add runtime reads of another skill's mode-registry.json"
    - "The routing-registry drift guard must pass after projection emission"
  packet_requirements:
    - "RECOMMENDED DEFAULT for a net-new single-mode workflow packet: folder == packetSkillName == [hub-prefix]-<mode> (soft guidance, not a hard gate); surface packets use a bare-noun folder"
    - "ALLOWED: many modes mapping to one packet folder (canonical: 4 improvement modes -> deep-improvement)"
    - "ALLOWED: grandfathered packets where folder != packetSkillName (rare; record the rationale in the packet's decision record)"
    - each packet has its own SKILL.md
    - "each mode's packet folder is a direct child of the hub (no absolute or ../ paths)"
    - NO per-packet graph-metadata.json
  shared_requirements:
    - non-discoverable shared/ for packet-shared workflow-layer helpers (synthesis, not execution primitives)
    - NO graph-metadata.json inside shared/
  one_identity_rule: "Exactly one graph-metadata.json (the hub's). A nested graph-metadata.json creates a rogue advisor identity."
  validation_pipeline:
    - "python3 .opencode/skills/sk-doc/scripts/validate_document.py [skill_root]/SKILL.md"
    - "python3 .opencode/skills/sk-doc/scripts/extract_structure.py [skill_root]/SKILL.md"

gate_logic:
  hard:
    H0_write_verified:
      description: "create_agent_verified must be true"
      fail_action: "STOP and return to setup"
    H1_required_fields:
      description: "All required setup fields must be present (including a non-empty mode list)"
      fail_action: "STOP and collect missing fields"
    H2_existence_semantics:
      description: "create/update must match real skill-root existence"
      fail_action: "STOP and reroute or correct target"
    H3_contract_shape:
      description: "Generated package must match the parent-skill pattern (hub + registry + packets + shared)"
      fail_action: "Fix structure before continuing"
    H4_one_identity:
      description: "Exactly one graph-metadata.json at the hub; zero inside packets or shared"
      fail_action: "Remove rogue identities and re-validate"
    H5_validation_gate:
      description: "Hub validation, registry coverage, and per-packet structure checks must pass"
      fail_action: "Run fix-and-revalidate loop"
  soft:
    S1_packet_naming:
      description: "DEFAULT for a net-new single-mode workflow packet: folder == packetSkillName == [hub-prefix]-<mode> (surfaces use a bare-noun folder). NOT a hard gate. Many-modes-to-one-packet and grandfathered folder!=packetSkillName names are valid (canonical: 4 modes -> deep-improvement)."
      fail_action: "Proceed with a logged assumption when grandfathering an existing packet or mapping several modes to one packet"

workflow_overview:
  steps:
    - id: step_1_preflight
      purpose: "Normalize inputs and enforce H0-H2"
    - id: step_1b_spec_folder_setup
      purpose: "Resolve spec_choice into spec_path and create/confirm the documentation folder for tracking this work"
    - id: step_2_mode_planning
      purpose: "Resolve the mode list and per-packet plan"
    - id: step_3_template_loading
      purpose: "Load the reference and both hub/registry templates"
    - id: step_4_package_generation
      purpose: "Create or update hub, registry, packets, and shared with one identity"
    - id: step_5_validation
      purpose: "Run hub validation, registry coverage, and the one-identity invariant"
    - id: step_5b_save_context
      purpose: "Persist spec-folder documentation and index the implementation summary for this parent-skill work"
    - id: step_6_completion
      purpose: "Emit deterministic completion report"

# ─────────────────────────────────────────────────────────────────
# CONTEXT LOADING
# ─────────────────────────────────────────────────────────────────
context_loading:
  trigger: "During UNIFIED SETUP PHASE, non-interactive resolution before Step 1"
  applies_when: "spec_path resolves to an existing spec folder (Q3 choice A - Existing, C - Update related, or D - Extend phased packet) that contains handover.md or _memory.continuity in implementation-summary.md; not applicable to a freshly created spec folder (Q3 choice B - New) or when spec_choice is E (Skip)"
  auto_resolution:
    default: "If prior context exists (handover.md <24h old, or _memory.continuity present in {spec_path}), load it automatically via memory_context (mode: resume); sets memory_loaded: handover+continuity. Otherwise skip; sets memory_loaded: skipped."
    override: "Honor memory_choice if explicitly supplied as a command argument or pre-bound setup answer (A/B/C)"
  mcp_integration:
    tool: memory_context
    note: "Call MCP tools directly - NEVER through Code Mode"
    parameters: { input: "resume previous work on {spec_path}", mode: "resume", profile: "resume", specFolder: "{spec_path}", includeContent: true }
    transport_fallback: "If MCP tools are missing or erroring while the daemon is otherwise warm, use: node .opencode/bin/spec-memory.cjs memory_context --json '{\"input\":\"resume previous work\",\"mode\":\"resume\"}' --format json --timeout-ms 3000 --warm-only. Exit 75 = retryable backend unavailability."
  output: memory_loaded

workflow:
  step_1_preflight:
    purpose: Normalize and verify required fields
    activities:
      - Normalize skill_path to default when omitted
      - Derive skill_root as "[skill_path]/[skill_name]"
      - Validate operation token to supported value
      - Parse modes into a normalized hyphen-case list
      - Validate execution_mode is :auto
      - Check whether skill_root already exists
      - Resolve memory_choice via the context_loading block (Q4 if applicable); record result as memory_loaded
    outputs:
      - normalized_inputs
      - mode_list
      - target_existence_state
      - memory_loaded

  step_1b_spec_folder_setup:
    purpose: Resolve spec_choice into spec_path and create/confirm the documentation folder for tracking this work
    condition: "spec_choice != E (Skip)"
    activities:
    - IF spec_choice == B (Create new):
      - Find next available spec number
      - Command: "ls -d specs/[0-9]*/ | sed 's/.*\\/\\([0-9]*\\)-.*/\\1/' | sort -n | tail -1"
      - Create folder: specs/[NNN]-[skill_name]-parent/
    - IF spec_choice == A, C, or D (Existing, Update related, or Extend phased packet):
      - Use selected spec_path
    - "Route spec.md, plan.md, tasks.md, and checklist.md creation through distributed governance (AGENTS.md Rule 5), matching this family's Level 2 documentation_level"
    templates:
    # Use Level 2 templates as default for parent-skill scaffolding
    - .opencode/skills/system-spec-kit/templates/examples/level-2/spec.md
    - .opencode/skills/system-spec-kit/templates/examples/level-2/plan.md
    - .opencode/skills/system-spec-kit/templates/examples/level-2/tasks.md
    - .opencode/skills/system-spec-kit/templates/examples/level-2/checklist.md
    outputs:
    - spec_path_resolved
    - spec.md: created_or_updated
    - plan.md: created_or_updated
    - tasks.md: created_or_updated
    - checklist.md: created_or_updated

  step_2_mode_planning:
    purpose: Resolve the mode list and per-packet plan
    activities:
      - "For a net-new single-mode workflow packet, default packetSkillName = \"[hub-prefix]-[mode]\" and a packet folder of the same name (recommended, not enforced); plan any --surfaces as bare-noun surface packets"
      - "Allow several modes to share one packet folder (canonical: 4 improvement modes -> deep-improvement); allow a grandfathered packet whose folder != packetSkillName (rare; record the rationale via grandfatheredFolderMismatch)"
      - "Set each mode's top-level packet field to its packet sub-directory and plan the two-axis discriminator (workflowMode + packetKind + backendKind; runtimeLoopType only for runtime-loop workflow modes) plus toolSurface and grandfatheredFolderMismatch"
      - Plan the advisorRouting block per mode (routingClass, legacyAdvisorId for lexical/alias-fold, advisorDefaultMode, legacyAliases, packetSkillName)
      - Preserve existing packet names, registry keys, and routing blocks when update mode
      - "When several modes intentionally share one packet folder, log it as an assumption — do not treat it as a duplicate-folder failure"
    outputs:
      - packet_plan
      - registry_plan

  step_3_template_loading:
    purpose: Load standards and templates before generation
    activities:
      - Read parent-skill/parent-skills-nested-packets.md for the Parent Skills with Nested Mode Packets pattern
      - Read references/parent-skill/parent-hub-router-schema.md for the hub-router.json contract
      - Read parent_skill_hub_template.md
      - Read parent_skill_registry_template.json
      - Read parent_skill_hub_router_template.json
      - Read parent_skill_description_template.json
      - Read parent_skill_graph_metadata_template.json
      - Extract the hub SKILL.md, registry, hub-router, description, and hub graph-metadata contracts
    outputs:
      - template_contract_loaded

  step_4_package_generation:
    purpose: Generate or update the parent-skill package
    activities:
      - Ensure skill_root exists
      - Create or update the thin hub SKILL.md (routing only)
      - "Create or update mode-registry.json with the two-axis discriminator (workflowMode + packetKind + backendKind), toolSurface and grandfatheredFolderMismatch per mode, a top-level packet, and one advisorRouting block per mode"
      - "Create or update hub-router.json from parent_skill_hub_router_template.json (routerSignals for every mode, typed vocabularyClasses, tieBreak covering all modes; keep any catch-all class (hub-identity) on the default mode only, never specialized modes (route-gold over-emission); surface packets get metadata routerSignals plus a surfaceBundle outcome)"
      - "Create or update description.json from parent_skill_description_template.json"
      - "Create or update exactly one hub graph-metadata.json from parent_skill_graph_metadata_template.json (skill_id == hub folder, family in the allowed set)"
      - "Create or update one workflow packet dir per distinct packet value (default folder == packetSkillName == [hub-prefix]-<mode>; reuse a shared packet folder when several modes map to one), each with its own SKILL.md, README.md, and changelog/"
      - "When --surfaces <names> is given, generate each surface as a read-only evidence-base packet: bare-noun folder, packetKind surface, backendKind evidence-base, read-only toolSurface, routingClass metadata, with its own SKILL.md, README.md, and changelog/"
      - "Create the hub changelog/ and manual-testing-playbook/ (changelog files are real files, never symlinks)"
      - Create the non-discoverable shared/ dir with a shared/README.md
      - Never write a graph-metadata.json inside any packet or inside shared/
      - "When any mode is routingClass lexical or alias-fold, run advisor_projection_emit to emit/update the advisor routing projection from the finalized mode-registry.json and refresh the embedded projection hash"
    outputs:
      - generated_hub
      - generated_registry
      - generated_packets
      - generated_shared
      - advisor_projection_emitted

  step_5_validation:
    purpose: Validate the generated package against the canonical structural gate (success gate == the /doctor parent-skill-check gate)
    activities:
      - Run validate_document.py on the hub SKILL.md
      - "Run the canonical structural gate and REQUIRE exit 0: node .opencode/commands/doctor/scripts/parent-skill-check.cjs [skill_root] — the same gate /doctor parent-skill runs, owning hub identity, the two-axis discriminator, toolSurface, hub-router validity, description.json, changelog shape, and registry/directory reverse consistency"
      - "For a net-new hub (create), the default gate now blocks on checks 5-9 (canon-promoted): node .opencode/commands/doctor/scripts/parent-skill-check.cjs [skill_root] must exit 0, so a fresh hub must carry no canon gaps in hub-router, description.json, changelog shape, playbook, or benchmark baseline"
      - "Assert the hub graph-metadata.json has skill_id == hub folder name AND family in {cli, mcp, sk-code, deep-loop, sk-util, system}"
      - Check mode-registry.json is valid JSON and has one advisorRouting block per mode
      - "Per mode, assert the two-axis discriminator: workflowMode is a non-empty string; packetKind is \"workflow\" or \"surface\"; backendKind is present; runtimeLoopType appears only for runtime-loop workflow modes; toolSurface and grandfatheredFolderMismatch are present; surface packets are read-only evidence-base"
      - "Per mode, assert an advisorRouting block with routingClass in {lexical, alias-fold, metadata, command-bridge}"
      - "Check each mode's top-level packet resolves to an existing direct-child sub-directory (no absolute or ../ paths) that contains its own SKILL.md; workflow folder == [hub-prefix]-<mode> and surface folder == bare noun are recommended, grandfathered mismatches allowed via grandfatheredFolderMismatch"
      - Count graph-metadata.json files under skill_root; assert exactly 1 (the hub) and 0 inside packets/shared
      - "If any mode is routingClass lexical or alias-fold, run the advisor projection drift guard from system-skill-advisor and require a pass"
    outputs:
      - hub_validation_passed
      - parent_skill_check_passed
      - hub_identity_passed
      - registry_coverage_passed
      - discriminator_passed
      - packet_structure_passed
      - one_identity_passed
      - advisor_projection_guard_passed

  step_5b_save_context:
    purpose: Preserve spec-folder documentation and index the implementation summary for this parent-skill work
    condition: "spec_path is not null"
    activities:
    - Invoke system-spec-kit skill
    - Document parent-skill decisions (mode list, packet plan, advisorRouting choices, validation results)
    - Record any logged assumptions from mode planning or generation
    - Create or update implementation-summary.md with timestamp
    - Index implementation-summary.md for immediate search availability
    tool_invocation:
      command: 'Read(".opencode/skills/system-spec-kit/SKILL.md")'
      note: "Activate context saving via memory skill"
    outputs:
    - implementation_summary: "[spec_path]/implementation-summary.md"
    validation: context_saved

    post_save_indexing:
      purpose: "Index the canonical spec document immediately for search availability"
      mcp_tool: memory_save
      invocation: |
        memory_save({
          filePath: "[spec_path]/implementation-summary.md"
        })
      critical_note: "Call semantic memory MCP DIRECTLY - NEVER through Code Mode. The save target is a canonical spec document; standalone memory/*.md files are retired and the runtime rejects them."
      when: "Immediately after implementation-summary.md is written to disk"

  step_6_completion:
    purpose: Emit completion status
    activities:
      - Summarize operation, mode list, and generated paths
      - Report identity counts and validation results
      - "Report advisor projection emission when any mode is routingClass lexical or alias-fold (see advisor_map_sync_note)"
      - "Report spec-folder tracking status: [spec_path] ([created|existing|skipped])"
      - Return STATUS=OK PATH=[skill_root]
    outputs:
      - completion_report
      - spec_folder_status

  advisor_map_sync_note:
    when: "any generated mode has advisorRouting.routingClass == lexical or alias-fold"
    warning: |
      Advisor routing for lexical/alias-fold modes is registry-declared and then
      emitted into the advisor projection constants with a freshness hash.
      The advisor does NOT read mode-registry.json at runtime. After emission,
      the system-skill-advisor drift guard must pass before reporting success.
      metadata and command-bridge modes need no advisor-map entry.

error_recovery:
  missing_skill_on_update:
    action: "Stop and recommend reroute to create"
  existing_skill_on_create:
    action: "Stop and recommend reroute to update"
  missing_hub_template:
    action: "Stop because the parent-skill contract cannot be enforced"
  rogue_packet_identity:
    action: "Remove the per-packet or shared graph-metadata.json and re-validate"
  hub_validation_failure:
    action: "Enter fix-and-revalidate loop"

circuit_breaker:
  trigger_threshold: 3
  reset_condition: "Hub validation passes, registry coverage passes, and exactly one graph-metadata.json resolves"
  actions:
    - "Stop autonomous generation"
    - "Report the failing gate and affected path"
    - "Return STATUS=FAIL with next-step guidance"

autonomous_execution:
  principle: "Advance automatically once hard gates pass"
  status_reporting:
    cadence: "Report at major workflow boundaries"
    include:
      - operation
      - mode_list
      - target_path
      - identity_count
      - validation_state

completion_report_template: |
  Parent Skill Command Complete

  Skill: [skill_name]
  Operation: [operation]
  Modes: [mode_list]
  Mode: :auto
  Target: [skill_root]

  Spec Folder: [spec_path] ([created|existing|skipped])
  Context saved: [yes/no]

  Identity:
  - Hub graph-metadata.json count: [count, must be 1]
  - Per-packet graph-metadata.json count: [count, must be 0]

  Validation:
  - parent-skill-check.cjs (canonical gate): [exit 0 / FAIL]
  - Hub structure: [passed/failed]
  - Hub identity (skill_id == folder, family in allowed set): [passed/failed]
  - Canon files (hub-router.json, description.json, changelogs): [present/missing]
  - Registry advisorRouting: registry-declared (advisor map sync required) [present/missing per mode]
  - Mode discriminator (workflowMode/packetKind/backendKind + toolSurface): [passed/failed]
  - Per-packet structure: [passed/failed]
  - One-identity invariant: [passed/failed]

  Advisor map sync (lexical/alias-fold modes only):
  - [none | emitted with projection hash and drift guard passed]

  STATUS=[OK|FAIL] PATH=[skill_root]

termination:
  success_signal: "STATUS=OK PATH=[skill_root]"
  failure_signal: "STATUS=FAIL PATH=[skill_root]"
  rule: "Do not claim completion until identity counts and validation output are included"

rules:
  must:
    - "Load the creation reference and all canon templates (hub, registry, hub-router, description, graph-metadata) before writing"
    - "Keep the hub SKILL.md thin and routing-only"
    - "Resolve modes through the registry; keep per-mode contracts in packets"
    - "Emit the full canon set: mode-registry.json, hub-router.json, description.json, graph-metadata.json, and changelogs (real files) at hub and packet level"
    - "Gate completion on parent-skill-check.cjs exit 0"
    - "Keep exactly one graph-metadata.json (the hub's)"
  must_not:
    - "Add a graph-metadata.json inside a packet or inside shared/"
    - "Emit runtimeLoopType for a mode that is not a runtime-loop workflow mode"
    - "Give a surface packet write or mutate tools — surfaces are read-only evidence bases"
