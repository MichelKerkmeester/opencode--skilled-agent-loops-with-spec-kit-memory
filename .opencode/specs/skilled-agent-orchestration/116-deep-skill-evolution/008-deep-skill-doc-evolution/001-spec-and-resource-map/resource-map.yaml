# resource-map.yaml — artifact inventory + per-skill delta for the 008 deep-skill doc-evolution cluster.
#
# This file is the single source of truth that phases 002-009 read from.
# Row schema for each artifact entry:
#   path            repo-relative path or glob
#   lines           current line count (live state, 2026-05-25)
#   template        key into the `templates` map below
#   delta           one of delta_status_enum
#   note            optional context
#
# Source of truth is the live skill state under .opencode/skills/<skill>/, NOT the
# 000-release-cleanup frontmatter (which carries a known completion_pct contradiction).

meta:
  cluster: skilled-agent-orchestration/116-deep-skill-evolution/008-deep-skill-doc-evolution
  generated: "2026-05-25"
  source_of_truth: ".opencode/skills/<skill>/ (live filesystem)"
  delta_status_enum:
    - done-by-000          # already shipped by 000-release-cleanup, verified in live state
    - needs-subfolder      # flat references/ to group into thematic subfolders
    - needs-split          # oversized file to split, original deleted after
    - needs-conformance    # exists but not 1:1 with sk-doc template / content drift
    - needs-rewrite        # full rewrite to template (e.g. README to 9-section)
    - needs-create         # artifact missing, must be created
    - no-change            # conforms already; leave as-is
  house_rules:
    skill_md_max_lines: 500   # house rule, NOT enforced by sk-doc package_skill.py (which gates words)
  concurrency_ceiling: 3      # max parallel CLI dispatches

# Verified sk-doc template paths (the conformance contract).
templates:
  skill_md: ".opencode/skills/sk-doc/assets/skill/skill_md_template.md"
  readme: ".opencode/skills/sk-doc/assets/skill/skill_readme_template.md"
  reference: ".opencode/skills/sk-doc/assets/skill/skill_reference_template.md"
  asset: ".opencode/skills/sk-doc/assets/skill/skill_asset_template.md"
  smart_router: ".opencode/skills/sk-doc/assets/skill/skill_smart_router.md"
  feature_catalog: ".opencode/skills/sk-doc/assets/feature_catalog/feature_catalog_template.md"
  feature_catalog_snippet: ".opencode/skills/sk-doc/assets/feature_catalog/feature_catalog_snippet_template.md"
  manual_testing_playbook: ".opencode/skills/sk-doc/assets/testing_playbook/manual_testing_playbook_template.md"
  manual_testing_playbook_snippet: ".opencode/skills/sk-doc/assets/testing_playbook/manual_testing_playbook_snippet_template.md"
  changelog: ".opencode/skills/sk-doc/assets/changelog_template.md"

# Standards every per-skill phase enforces.
standards:
  hvr: ".opencode/skills/sk-doc/references/global/hvr_rules.md"     # pass >= 85
  dqi: ".opencode/skills/sk-doc/references/global/validation.md"    # pass >= 75
  validators:
    - ".opencode/skills/sk-doc/scripts/quick_validate.py"
    - ".opencode/skills/sk-doc/scripts/extract_structure.py"
    - ".opencode/skills/sk-doc/scripts/package_skill.py"
  present_tense_discipline: "SKILL.md / references / README state current behavior only; spec/phase/test citations live ONLY in changelog/"

skills:

  deep-loop-runtime:
    phase: "003-deep-loop-runtime-docs"
    role: "shared read-only runtime library; light touch"
    skill_md:    { path: ".opencode/skills/deep-loop-runtime/SKILL.md", lines: 265, template: skill_md, delta: needs-conformance }
    readme:      { path: ".opencode/skills/deep-loop-runtime/README.md", lines: 467, template: readme, delta: needs-conformance }
    references:
      layout: flat
      files: 4
      proposed_subfolders: none   # 4 files, 4 consumers — kept flat by design
      delta: no-change
      consumers_to_recheck: 4
    feature_catalog: { path: ".opencode/skills/deep-loop-runtime/feature_catalog/", entries: 22, template: feature_catalog, delta: needs-conformance }
    manual_testing_playbook: { path: ".opencode/skills/deep-loop-runtime/manual_testing_playbook/", suites: 8, template: manual_testing_playbook, delta: needs-conformance }
    changelog:   { path: ".opencode/skills/deep-loop-runtime/changelog/", latest: "1.3.0", template: changelog, delta: needs-create }
    assets: none

  deep-research:
    phase: "004-deep-research-docs"
    skill_md:    { path: ".opencode/skills/deep-research/SKILL.md", lines: 499, template: skill_md, delta: needs-conformance, note: "at house cap; trim for headroom decided in 004" }
    readme:      { path: ".opencode/skills/deep-research/README.md", lines: 353, template: readme, delta: needs-conformance }
    references:
