response_excerpt: |
  Three metrics matter for hero animations: LCP, CLS, and INP.
  
  - LCP (< 2.5s). Hiding the hero while waiting for motion.dev to load is the biggest risk. Use an inline safety timeout in `<head>` to force-reveal the page after 2-3s if the script hangs.
  - CLS (< 0.1). Uninitialized animation states cause shifts. Ensure your hero elements have explicit dimensions (`aspect-ratio` or `min-height`) in CSS before JS executes.
  - INP (< 200ms). Layout thrashing blocks the main thread. Animate `transform` and `opacity` exclusively; avoid animating layout properties like `width` or `top`.
  
  Check those three against your baseline.
