---
# ──────────────────────────────────────────────────────────────────────────
# /doctor:skill-budget — autonomous mode (read-only audit)
# Packet 086
# ──────────────────────────────────────────────────────────────────────────

command: /doctor:skill-budget:auto
mode: AUTONOMOUS
read_only: true

inputs:
  execution_mode: AUTONOMOUS
  json_output: bool        # resolved by markdown setup
  top_n: int               # default 10
  fail_over: int|null      # default null
  project_ceiling: int     # default 5600

constants:
  audit_script: .opencode/commands/doctor/scripts/audit_descriptions.py
  reference_doc: .opencode/skills/sk-doc/assets/frontmatter_templates.md

phases:

  phase_0_audit:
    purpose: Run the description-budget audit and surface the report
    activities:
      - "Construct the command line:
          python3 [audit_script] --top-n=[top_n] --project-ceiling=[project_ceiling]
          [--json if json_output] [--fail-over=[fail_over] if fail_over set]"
      - "Execute the audit script via Bash from repo root"
      - "Capture stdout (the report) and the exit code"
    outputs:
      - report_text_or_json
      - exit_code
    success_criteria:
      - exit_code is 0 OR a deliberate fail-over was configured and is the cause
    on_failure:
      - "If exit_code is non-zero AND fail_over was unset: investigate hard-fail items"
      - "If exit_code is non-zero AND fail_over was set: report exceeded threshold; this is a configured signal, not a bug"

final_status:
  ok: STATUS=OK
  fail: STATUS=FAIL ERROR="description budget exceeded threshold"
