# ─────────────────────────────────────────────────────────────────
# DOCTOR: SKILL BUDGET WORKFLOW (INTERACTIVE READ-ONLY MODE)
# ─────────────────────────────────────────────────────────────────
role: Expert Operator running description-budget audit in interactive mode
purpose: Read-only audit of skill, command, and agent description budgets with optional fail-over checkpoint
action: Run audit_descriptions.py -> present report -> prompt for optional fail-over check -> final status

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: sequential_read_only_audit
  compliance: MANDATORY
  execution: interactive
  approvals: checkpoint_prompt
  tracking: audit_report_and_exit_code
  validation: audit_script_exit_code
  read_only: true

# ─────────────────────────────────────────────────────────────────
# SKILL-BUDGET AUDIT INVARIANT
# ─────────────────────────────────────────────────────────────────
skill_budget_doctor_invariant: |
  Skill-budget doctor is strictly read-only. It walks the project surfaces that
  feed Claude Code's available-skills metadata (skills, commands, agents) and
  reports per-item char counts, top-N bloated items, project total, and headroom
  under the configured ceiling. It NEVER modifies frontmatter, never re-indexes
  the advisor, and never writes to spec packet docs. Exit code is non-zero only
  when --fail-over threshold is exceeded or an item exceeds the 1,536-char hard cap.

# ─────────────────────────────────────────────────────────────────
# UPSTREAM ASSETS
# ─────────────────────────────────────────────────────────────────
upstream_assets:
  contract: "local command design contract"
  audit_script: ".opencode/commands/doctor/scripts/audit_descriptions.py"
  reference_doc: ".opencode/skills/sk-doc/assets/frontmatter_templates.md"
  doc_reference: ".opencode/skills/sk-doc/assets/frontmatter_templates.md#description-budget--trim-style"

# ─────────────────────────────────────────────────────────────────
# USER INPUTS
# ─────────────────────────────────────────────────────────────────
user_inputs:
  execution_mode: "INTERACTIVE"
  json_output: "[JSON_OUTPUT] bool"
  top_n: "[TOP_N] int"
  fail_over: "[FAIL_OVER] int|null"
  project_ceiling: "[PROJECT_CEILING] int"

# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  defaults:
    json_output_empty: false
    top_n_empty: 10
    fail_over_empty: null
    project_ceiling_empty: 5600
  validation:
    execution_mode_must_be: INTERACTIVE
    top_n_minimum: 1
    fail_over_nullable_integer: true
    project_ceiling_minimum: 1
  command_mapping:
    json_output_true: "append --json"
    top_n: "append --top-n=[top_n]"
    fail_over_present: "append --fail-over=[fail_over]"
    project_ceiling: "append --project-ceiling=[project_ceiling]"

# ─────────────────────────────────────────────────────────────────
# MUTATION BOUNDARIES
# ─────────────────────────────────────────────────────────────────
mutation_boundaries:
  read_only: true
  allowed_targets: []
  forbidden_targets:
    - "**/*"
  invariant: "This workflow is read-only. It may execute the audit script and print output, but it must not write files, reindex databases, mutate graph metadata, or update descriptions."

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_0_audit:
    purpose: "Run the description-budget audit (read-only)."
    activities:
      - "Construct the command line and execute upstream_assets.audit_script via Bash."
      - "Capture stdout and exit code."
    outputs:
      - report_text_or_json
      - exit_code

  phase_1_checkpoint:
    purpose: "Present the report and ask whether to also run a fail-over check."
    activities:
      - "Print the report or surface JSON output."
      - "Ask the operator: 'Run --fail-over=[project_ceiling] check now?'"
    options:
      - label: A
        description: "Yes - run the fail-over check."
        next_action: "Re-run audit_script with --fail-over=[project_ceiling]; surface exit code."
      - label: B
        description: "No - audit complete."
        next_action: "Return STATUS=OK."

# ─────────────────────────────────────────────────────────────────
# OUTPUT FORMAT
# ─────────────────────────────────────────────────────────────────
output_format: |
  STATUS=OK when the audit exits cleanly and no requested fail-over threshold is exceeded.
  STATUS=FAIL ERROR="description budget exceeded threshold" when the audit script exits non-zero for the configured threshold.
