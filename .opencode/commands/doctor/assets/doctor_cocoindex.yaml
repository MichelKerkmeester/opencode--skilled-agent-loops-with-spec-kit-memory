# ─────────────────────────────────────────────────────────────────
# DOCTOR: COCOINDEX WORKFLOW (INTERACTIVE DIAGNOSTIC MODE)
# ─────────────────────────────────────────────────────────────────
role: Expert Operator running CocoIndex semantic search diagnostics in interactive mode
purpose: Read-only status, drift, and daemon-health classification with user review gates. No mutations.
action: Daemon health probe -> gate -> drift analysis -> gate -> recommendation -> state log

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: sequential
  compliance: MANDATORY
  execution: interactive
  approvals: per_phase
  tracking: phase_by_phase
  validation: continuous_self_validation
  intent: DIAGNOSE


# ─────────────────────────────────────────────────────────────────
# COCOINDEX DOCTOR INVARIANT
# ─────────────────────────────────────────────────────────────────
cocoindex_doctor_invariant: |
  CocoIndex doctor workflows never repair an unhealthy daemon by mutating index
  stores blindly. Apply modes refuse before snapshot or reindex unless daemon
  health is good, then use the single ccc_reindex({full: true}) tool path after
  an idempotent daemon restart. The 3.4.1.0 daemon resilience fix is the basis
  for treating repeated restart as safe.

# ─────────────────────────────────────────────────────────────────
# UPSTREAM ASSETS
# ─────────────────────────────────────────────────────────────────
upstream_assets:
  contract: "local command design contract"
  files:
    spec: "spec.md"  # REQ-017 gold-battery and subsystem coverage
    decision_record: "decision-record.md"  # ADR-004/ADR-007 retry, rollback, cancel safety
    checklist: "checklist.md#doctor-cocoindex"  # CHK-402..CHK-404 daemon/search bars
    daemon_resilience: "spec.md#phase-context"  # 3.4.1.0 daemon resilience context
  pass_policy:
    daemon_health_required: true  # CHK-402 apply refusal gate
    idempotent_restart_required: true  # CHK-403 / 3.4.1.0 fix
    semantic_query_min_results: 5  # CHK-404 and current gold battery threshold
    semantic_query_count: 3  # existing representative query count

# ─────────────────────────────────────────────────────────────────
# COCOINDEX DOCTOR PHILOSOPHY
# ─────────────────────────────────────────────────────────────────
cocoindex_doctor_philosophy:
  principle: "Detect semantic-search drift before it misroutes code discovery; never mutate without explicit :apply mode."
  approach: "Read ccc_status plus read-only filesystem probes, classify drift, and ask before each diagnostic phase."
  mandate: "This command is read-only by contract."

# ─────────────────────────────────────────────────────────────────
# USER INPUTS
# ─────────────────────────────────────────────────────────────────
user_inputs:
  execution_mode: "[EXECUTION_MODE] - INTERACTIVE (this YAML)"
  intent: "[INTENT] - DIAGNOSE (this YAML)"

# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  defaults:
    no_snapshot_empty: "false"
    dry_run_empty: "false"
    intent_empty: "DIAGNOSE"
  no_snapshot_policy:
    true: "skip CocoIndex snapshot; rollback unavailable on reindex regression"
    false: "snapshot CocoIndex DB before reindex; restore on regression"
  dry_run_policy:
    true: "propose reindex actions only; no daemon restart or DB writes"
    false: "execute reindex when daemon health permits"

# ─────────────────────────────────────────────────────────────────
# MUTATION BOUNDARIES
# ─────────────────────────────────────────────────────────────────
mutation_boundaries:
  allowed_targets:
    - ".opencode/skills/mcp-coco-index/mcp_server/database/**  # read-only diagnostic target"
    - "<packet_scratch>/doctor-cocoindex-report.<timestamp>.md"
    - "<packet_scratch>/doctor-cocoindex-state.<timestamp>.json"  # packet-local state log
  forbidden_targets:
    - "<active-spec-folder>/**/*.md"  # never write into spec packet docs from CocoIndex doctor
    - "<active-spec-folder>/description.json"  # spec metadata not semantic index storage
    - "<active-spec-folder>/graph-metadata.json"  # graph metadata is not a CocoIndex target
    - ".opencode/skills/system-spec-kit/mcp_server/database/**"  # system spec-kit DBs are separate
    - ".opencode/skills/**/SKILL.md"
    - ".opencode/skills/**/graph-metadata.json"
    - ".opencode/agents/**/*.md"
    - ".opencode/commands/doctor/*.md"
    - ".opencode/commands/doctor/assets/doctor_*.yaml"
    - ".opencode/skills/mcp-coco-index/mcp_server/database/**"
    - ".cocoindex_code/**"
  enforcement: "This command is READ-ONLY by contract. Only packet-local scratch report/state-log writes are allowed. Any attempted write to an index, spec, skill, agent, or command path halts with STATUS=FAIL."
  validator:
    name: validate_read_only_targets
    runs: "before any file write; diagnostic mode should only write packet-local scratch report/state log"
    steps:
      - "Resolve target via realpath; reject absolute paths, `..`, and symlinks escaping repo root."
      - "Allow CocoIndex database paths only for read-only diagnostics; allow writes only to <packet_scratch>/doctor-cocoindex-report.<timestamp>.md and <packet_scratch>/doctor-cocoindex-state.<timestamp>.json."
      - "Reject all spec folder docs, system-spec-kit databases, skills, agents, commands, and CocoIndex DB/index paths."
    on_pass: "diagnostic reads may continue"
    on_fail: "abort before write; STATUS=FAIL ERROR=\"read-only target validation failed: <path>\""

# ─────────────────────────────────────────────────────────────────
# INTERACTIVE GATES
# ─────────────────────────────────────────────────────────────────
interactive_gates:
  before_phase_2_drift_analysis:
    prompt: "Phase 1 daemon/status probe complete. Continue to drift analysis? (y/n/details)"
    blocking: true
    approvals:
      y: "continue to phase_2_drift_analysis"
      n: "STATUS=CANCELLED; emit state log with phase=phase_1_daemon_health_probe"
      details: "print Phase 1 outputs, then ask again"
  before_phase_3_recommendation:
    prompt: "Phase 2 drift analysis complete. Continue to recommendation? (y/n/details)"
    blocking: true
    approvals:
      y: "continue to phase_3_recommendation"
      n: "STATUS=CANCELLED; emit state log with phase=phase_2_drift_analysis"
      details: "print drift_classes and severity, then ask again"

# ─────────────────────────────────────────────────────────────────
# STALENESS SIGNALS
# ─────────────────────────────────────────────────────────────────
staleness_signals:
  code_drift:
    detection: "Recent source files have mtimes newer than latest CocoIndex DB/index mtime, or ccc_status recommendation asks for reindex."
    severity: medium
  embedding_model_change:
    detection: "Settings file mtime or embedding model identifier changed since indexed DB/vector store mtime."
    severity: high
  daemon_zombie_state:
    detection: "Duplicate daemon processes, stale pid/socket/lock files, or ccc daemon status reports unreachable daemon."
    severity: high
  broken_pipe_accumulation:
    detection: "daemon.log contains recent BrokenPipeError bursts or abnormal log growth."
    severity: high
  missing_index:
    detection: "ccc_status reports indexExists=false or indexSize=null."
    severity: medium
  unavailable_binary:
    detection: "ccc_status reports available=false."
    severity: high

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_1_daemon_health_probe:
    purpose: "Probe CocoIndex availability, index state, and daemon health without mutation."
    activities:
      - "Run: ccc_status({})"
      - "Bash: test -x .opencode/skills/mcp-coco-index/mcp_server/.venv/bin/ccc and record executable status."
      - "Bash: .opencode/skills/mcp-coco-index/mcp_server/.venv/bin/ccc daemon status when binary exists; read-only only."
      - "Bash: pgrep -fc 'ccc run-daemon' || true; classify duplicate daemon count > 1 as daemon_zombie_state."
      - "Bash: inspect ~/.cocoindex_code/daemon.log metadata and recent BrokenPipeError count without modifying it."
      - "Interactive gate: before_phase_2_drift_analysis."
    outputs:
      - available: true|false
      - binaryPath: string
      - indexExists: true|false
      - indexSize: number|null
      - daemon_health: healthy|unhealthy|unknown
      - daemon_process_count: number
      - broken_pipe_recent_count: number
      - recommendation: string
    validation: daemon_probe_complete
    fail_fast:
      - "ccc_status returns status=error -> STATUS=FAIL with diagnostic and no mutation"

  phase_2_drift_analysis:
    purpose: "Classify semantic-index staleness and choose recommended remediation."
    activities:
      - "Compare source file mtimes against index/database mtimes when available."
      - "Compare CocoIndex settings/global_settings.yml mtime against index/database mtimes when available."
      - "Classify staleness_signals into drift_classes."
      - "If daemon_health=unhealthy, recommend manual daemon recovery before any :apply."
      - "Interactive gate: before_phase_3_recommendation."
    outputs:
      - drift_classes:
          code_drift: true|false
          embedding_model_change: true|false
          daemon_zombie_state: true|false
          broken_pipe_accumulation: true|false
          missing_index: true|false
          unavailable_binary: true|false
      - severity_max: low|medium|high
    validation: analysis_complete

  phase_3_recommendation:
    purpose: "Translate drift into a concrete next command."
    rules:
      - "If unavailable_binary=true -> recommend install script, not :apply."
      - "If daemon_health=unhealthy -> recommend 3.4.1.0 daemon recovery checklist, not :apply."
      - "If embedding_model_change=true -> recommend /doctor cocoindex after daemon is healthy."
      - "If code_drift=true OR missing_index=true -> recommend /doctor cocoindex."
      - "If no drift -> status=OK."
    outputs:
      - status: OK|STALE|DEGRADED|MISSING|FAIL|CANCELLED
      - recommended_command: string
      - recommended_when: now|after_daemon_recovery|monitor

  phase_4_report:
    purpose: "Emit report and state log."
    activities:
      - "Run validate_read_only_targets before writing packet-local report/state log."
      - "Compose report following OUTPUT CONTRACT in cocoindex.md."
      - "Write report to <packet_scratch>/doctor-cocoindex-report.<timestamp>.md."
      - "Write state log to <packet_scratch>/doctor-cocoindex-state.<timestamp>.json."
      - "Print summary table to stdout."
    outputs:
      - report_path: "<packet_scratch>/doctor-cocoindex-report.<timestamp>.md"
      - state_log_path: "<packet_scratch>/doctor-cocoindex-state.<timestamp>.json"
      - status: OK|STALE|DEGRADED|MISSING|FAIL|CANCELLED
    validation: report_emitted

# ─────────────────────────────────────────────────────────────────
# OUTPUT FORMAT
# ─────────────────────────────────────────────────────────────────
output_contract:
  format: markdown
  required_sections:
    - status_header
    - index_state_table
    - drift_signals_block
    - recommendation_block
    - state_log_path
  state_log:
    path: "<packet_scratch>/doctor-cocoindex-state.<timestamp>.json"
    schema:
      command: "/doctor cocoindex"
      mode: INTERACTIVE
      intent: DIAGNOSE
      timestamp: ISO_8601
      duration_seconds: number
      status: OK|STALE|DEGRADED|MISSING|FAIL|CANCELLED
      daemon_health: string
      drift_classes: object
      recommendation: string

# ─────────────────────────────────────────────────────────────────
# HALT CONDITIONS
# ─────────────────────────────────────────────────────────────────
halt_conditions:
  - "ccc_status returns status=error -> STATUS=FAIL"
  - "Any attempted mutation outside packet scratch -> STATUS=FAIL with ERROR='confirm-mode-mutation-violation'"
  - "Daemon unhealthy -> STATUS=DEGRADED and recommend recovery; never auto-repair in diagnostic mode"
  - "User answers `n` at an interactive gate -> STATUS=CANCELLED and emit state log"

