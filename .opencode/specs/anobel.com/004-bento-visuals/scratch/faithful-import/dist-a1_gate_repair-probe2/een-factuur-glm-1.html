<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>UNKNOWN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    display:flex;align-items:center;justify-content:center;
    background:#eceef0;
    font-family:'Hanken Grotesk',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    color:#0a1a2f;
  }

  .card{
    width:560px;height:480px;
    background:#ffffff;
    border-radius:22px;
    border:0;
    box-shadow:0 1px 2px rgba(20,28,46,.04),0 26px 52px -22px rgba(20,28,46,.20);
    padding:30px;
    overflow:hidden;
    position:relative;
    font-variant-numeric:tabular-nums;
  }

  /* ===== VISUAL REGION  x[30..530]  y[30..328] ===== */
  .visual{
    height:298px;            /* 30..328 inclusive */
    width:500px;
    position:relative;
    border-radius:16px;
    overflow:hidden;
    background:linear-gradient(180deg,#06458c 0%,#043367 100%);
    color:#E7ECF7;
    display:flex;
    flex-direction:column;
  }
  /* faint nautical grid lines (decorative only) */
  .visual::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(to right,rgba(255,255,255,.05) 1px,transparent 1px),
      linear-gradient(to bottom,rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:50px 41px;
    pointer-events:none;aria-hidden:true;
  }

  .visual-top{
    position:relative;z-index:1;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px 10px;
    gap:10px;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:11px;font-weight:600;letter-spacing:.01em;
    color:#E7ECF7;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    padding:6px 10px;border-radius:999px;
  }
  .eyebrow svg{width:12px;height:12px;display:block}
  .shell-cta{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11.5px;font-weight:600;color:#E7ECF7;
    background:transparent;border:1px solid rgba(255,255,255,.3);
    padding:6px 10px;border-radius:999px;
    cursor:pointer;font-family:inherit;
    transition:background .18s ease,border-color .18s ease;
  }
  .shell-cta:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.5)}
  .shell-cta svg{width:11px;height:11px}

  /* matrix panel — header + MAX 3 rows + "+N more" */
  .matrix{
    position:relative;z-index:1;
    margin:0 14px 12px;
    background:#f6f8fc;
    border:1px solid #cbd0dc;
    border-radius:12px;
    color:#0a1a2f;
    overflow:hidden;
    flex:1;
    display:flex;flex-direction:column;
  }
  .matrix-head{
    display:grid;
    grid-template-columns:1.6fr .9fr .8fr;
    gap:10px;
    padding:8px 14px;
    border-bottom:1px solid #cbd0dc;
    background:#fefefe;
    font-size:10.5px;font-weight:600;color:#0a1a2f;
    letter-spacing:.01em;
  }
  .matrix-body{display:flex;flex-direction:column}
  .row{
    display:grid;
    grid-template-columns:1.6fr .9fr .8fr;
    gap:10px;
    padding:8px 14px;
    border-bottom:1px solid #e7e9ee;
    align-items:center;
    font-size:11.5px;
  }
  .row:last-child{border-bottom:0}
  .row .cell{color:#0a1a2f}
  .row .meta{color:#4e4e4e;font-size:10.5px}
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:10.5px;font-weight:600;
    padding:3px 8px;border-radius:999px;
  }
  .badge.green{background:rgba(54,126,57,.12);color:#367e39;border:1px solid rgba(54,126,57,.25)}
  .badge.red{background:rgba(201,20,15,.10);color:#c9140f;border:1px solid rgba(201,20,15,.25)}
  .badge.neutral{background:#ececec;color:#0a1a2f;border:1px solid #cbd0dc}

  .matrix-more{
    padding:6px 14px;
    font-size:10.5px;font-weight:600;color:#06458c;
    background:#fefefe;
    border-top:1px solid #e7e9ee;
  }
  .legend{
    display:flex;align-items:center;gap:12px;
    margin:0 14px;
    padding-bottom:14px;
    font-size:10.5px;color:#B8C2D6;
  }
  .legend .item{display:inline-flex;align-items:center;gap:6px}
  .legend .dot{width:7px;height:7px;border-radius:50%}
  .legend .dot.g{background:#367e39}
  .legend .dot.r{background:#c9140f}

  /* ===== RESERVED TITLE BAND  x[30..530]  y[356..456] ===== */
  .text-band{
    position:absolute;
    left:30px;right:30px;
    bottom:24px;
    height:100px;            /* y[356..456] */
    display:flex;flex-direction:column;justify-content:flex-end;gap:6px;
  }
  .title{font-size:21px;font-weight:700;color:#0a1a2f;line-height:1.2}
  .description{font-size:13.5px;font-weight:500;color:#4e4e4e;line-height:1.45}

  @media (prefers-reduced-motion:reduce){
    .shell-cta{transition:none}
  }
</style>
</head>
<body>
  <article class="card" aria-label="Vloot-functie">

    <div class="visual" data-a1-role="visual">

      <div class="visual-top">
        <span class="eyebrow" role="eyebrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="5" r="2.2"/>
            <path d="M12 7.2v6"/>
            <path d="M5.5 13h13l-3.2 5h-6.6z"/>
          </svg>
          Vloot-functie
        </span>
        <button class="shell-cta" type="button" role="shell-cta">
          Openen
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </div>

      <div class="matrix" role="matrix">
        <div class="matrix-head" role="label">
          <span>Schip</span><span>Status</span><span>Volgende</span>
        </div>
        <div class="matrix-body">
          <div class="row" role="row">
            <div class="cell">
              <div>Oranjeboom</div>
              <div class="meta">Rotterdam · 14:20</div>
            </div>
            <div><span class="badge green">Actief</span></div>
            <div class="meta">17:05 CET</div>
          </div>
          <div class="row" role="row">
            <div class="cell">
              <div>Maassluis</div>
              <div class="meta">Haven 4 · ligplaats 12</div>
            </div>
            <div><span class="badge red">Vertraging</span></div>
            <div class="meta">18:40 CET</div>
          </div>
          <div class="row" role="row">
            <div class="cell">
              <div>Stad en Lande</div>
              <div class="meta">Vlissingen · loskade</div>
            </div>
            <div><span class="badge neutral">Gepland</span></div>
            <div class="meta">21:10 CET</div>
          </div>
        </div>
        <div class="matrix-more" role="label">+12 meer schepen in de route</div>
      </div>

      <div class="legend" role="label">
        <span class="item"><span class="dot g" aria-hidden="true"></span>Op schema</span>
        <span class="item"><span class="dot r" aria-hidden="true"></span>Vertraging</span>
      </div>

    </div>

    <div class="text-band">
      <h1 class="title" role="title">UNKNOWN</h1>
      <p class="description" role="description">UNKNOWN</p>
    </div>

  </article>
</body>
</html>
