description = "Diagnose deep-loop coverage graphs with an interactive read-only status workflow."
prompt = "<!-- skill_agent: system-spec-kit -->\n\n> ⚠️ **EXECUTION PROTOCOL — READ FIRST**\n>\n> This command runs a structured YAML workflow. Do NOT dispatch agents from this document.\n>\n> **Ownership:** Markdown owns setup (resolves all inputs). YAML owns execution. Setup values resolved here are passed to the YAML workflow.\n>\n> **YOUR FIRST ACTION:**\n> 1. Run the unified setup phase in this Markdown entrypoint and resolve: `execution_mode`, `intent`, `scope`, `no_snapshot`, `dry_run`\n> 2. Load the corresponding YAML file from `assets/` only after all setup values are resolved:\n>    - -> `doctor_deep-loop.yaml` (interactive status)\n> 3. Execute the YAML workflow step by step using those resolved values\n>\n> All content below is reference context for the YAML workflow. Do not treat reference sections as direct instructions to execute.\n\n## CONSTRAINTS\n\n- **ONLY MODE ()**: this doctor command is always interactive by design; deleted mode suffixes are invalid.\n- **DO NOT** dispatch any agent from this document\n- **ALL** workflow execution happens through the YAML - this document is setup + reference only\n- **MARKDOWN OWNS SETUP**: resolve setup inputs here first, then hand off to YAML\n- **YAML START CONDITION**: do not load YAML until ALL required inputs are bound: `execution_mode`, `intent`, `scope`, `no_snapshot`, `dry_run`\n- **CONFIRM WORKFLOW IS READ-ONLY**: zero graph mutations; report goes to packet-local scratch only\n- **confirm workflow ()**: snapshot `deep-loop-graph.sqlite`, rebuild graph nodes/edges from research/review iteration folders, post-verify convergence, rollback on regression\n- **NO MUTATIONS** in `--dry-run` mode - propose only, never write graph rows\n\n> **Format:** `/doctor:deep-loop` [flags]\n> Example: `/doctor:deep-loop`\n\n## GATE 3 STATUS: EXEMPT\n\n| Aspect      | Value                                                                                                                                               |\n| ----------- | --------------------------------------------------------------------------------------------------------------------------------------------------- |\n| Location    | `mcp_server/database/deep-loop-graph.sqlite`                                                                                                        |\n| Reason      | Mutations target a stable runtime coverage graph database, not a spec folder packet                                                                 |\n| Alternative | Mutation boundaries validated by Phase 3 canonical-path validator (allowlist exact-match); rollback via `VACUUM INTO` snapshot generated by Phase 2 |\n\n---\n\n# SINGLE CONSOLIDATED PROMPT - ONE USER INTERACTION\n\nThis workflow gathers ALL inputs in ONE prompt. Only the suffix is supported; doctor commands are interactive by design.\n\n---\n\n## 1. UNIFIED SETUP PHASE\n\n**FIRST MESSAGE PROTOCOL**: This prompt MUST be your FIRST response when no mode suffix is given. No mutating tool calls before asking. Lightweight read-only discovery is allowed (`deep_loop_graph_status`, `Glob` for iteration folders), then ask ALL questions immediately and wait.\n\n**STATUS: BLOCKED**\n\n```\nEXECUTE THIS SINGLE CONSOLIDATED PROMPT:\n\n1. CHECK mode suffix:\n   - default -> execution_mode = \"INTERACTIVE\", yaml = \"doctor_deep-loop.yaml\"\n   - No suffix -> execution_mode = \"INTERACTIVE\", yaml = \"doctor_deep-loop.yaml\" (confirm is the only supported mode)\n\n2. PARSE flags from $ARGUMENTS:\n   |- --scope=research|review|both -> scope = parsed (default: both)\n   |- --no-snapshot                -> no_snapshot = TRUE (advanced opt-out; only honored in interactive workflow)\n   |- --dry-run                    -> dry_run = TRUE (propose only, no writes; only honored in interactive workflow)\n   `- Defaults: scope=both, no_snapshot=FALSE, dry_run=FALSE\n\n3. Lightweight discovery (read-only):\n   - Glob: .opencode/specs/**/research/iterations/*.md when scope includes research\n   - Glob: .opencode/specs/**/review/iterations/*.md when scope includes review\n   - Run: deep_loop_graph_status({specFolder, loopType, sessionId}) for sampled active packets when sessionId is known\n   - Store: iteration_folder_count, sampled_status, empty_graph_signals, last_write_age_days\n\n4. ASK with a single prompt only for unresolved flags:\n\n   Q1. Scope (always ask if not flagged):\n     A) both - research and review coverage graphs\n     B) research - research iteration folders only\n     C) review - review iteration folders only\n\n   Q2. Snapshot opt-out (always ask if --no-snapshot not flagged):\n     A) Take snapshot before rebuild (default; recommended)\n     B) Skip snapshot (advanced; rollback unavailable on failure)\n\n   Reply format: answer only unresolved flag questions, or confirm defaults.\n\n5. WAIT only when an unresolved flag question was asked\n\n6. Parse and store:\n   - execution_mode | intent | scope | no_snapshot | dry_run\n\n7. SET STATUS: PASSED\n\nDO NOT proceed until any required flag prompt is answered\nNEVER mutate deep-loop-graph without snapshot unless --no-snapshot was explicitly set\nNEVER split questions into multiple prompts\n```\n\n**Phase Output:**\n- `execution_mode` | `intent` | `scope` | `no_snapshot` | `dry_run` | `iteration_folder_count` | `sampled_status` | `empty_graph_signals`\n\n---\n\n# SpecKit Doctor - Deep Loop Coverage Graph\n\nDiagnose and rebuild `mcp_server/database/deep-loop-graph.sqlite`, the research/review coverage graph used by deep-research and deep-review loops for convergence signals, gap detection, provenance, contradictions, and coverage momentum.\n\n```yaml\nrole: Expert Operator running deep-loop coverage graph diagnostics + rebuild\npurpose: Detect empty/stale coverage graphs and rebuild nodes/edges from iteration folders\naction: Discovery -> analysis -> (run: snapshot -> upsert graph rows -> verify convergence -> rollback-on-regression)\n```\n\n## 2. PURPOSE\n\nRestore the deep-loop coverage graph to match current research and review iteration artifacts. The graph can drift when deep-loop runs predate graph events, when iteration folders move during packet consolidation, or when graph writes were skipped because reducers produced no `graphEvents`.\n\nThis command exposes drift through the interactive workflow and reports the actions needed for rebuilding from the packet-local iteration set. It uses `deep_loop_graph_upsert` for node/edge writes and validates that `deep_loop_graph_convergence` returns a non-empty signal for any packet with at least three iterations.\n\n## SUBSYSTEM CONTRACT\n\n| Aspect               | Value                                                                                        |\n| -------------------- | -------------------------------------------------------------------------------------------- |\n| Command              | `/doctor:deep-loop`                                                                          |\n| Modes                | (status), , (rebuild from iteration set),        |\n| Target database      | `mcp_server/database/deep-loop-graph.sqlite`                                                 |\n| Snapshot             | YES - snapshots host graph DB before any rebuild                                             |\n| Lazy-init            | Detects empty graph, offers init-from-iteration-folders if research/review packets exist     |\n| Coverage             | Research + review iteration node/edge integrity                                              |\n| Status MCP tool      | `deep_loop_graph_status({specFolder, loopType, sessionId})`                                  |\n| Query MCP tool       | `deep_loop_graph_query({specFolder, loopType, queryType, sessionId})`                        |\n| Upsert MCP tool      | `deep_loop_graph_upsert({specFolder, loopType, sessionId, nodes, edges})`                    |\n| Convergence MCP tool | `deep_loop_graph_convergence({specFolder, loopType, sessionId, iteration, persistSnapshot})` |\n| Gold-battery         | Convergence signal returns non-empty for any packet with >= 3 iterations                     |\n\n## STALENESS SIGNALS\n\nThe diagnostic phase detects:\n\n1. **Empty graph** - graph status reports no nodes while `.opencode/specs/**/{research,review}/iterations/*.md` exists\n2. **Stale graph** - graph database last write is older than 7 days or older than the newest iteration file\n3. **Orphan nodes** - questions without claims, claims without evidence, findings without dimensions, or files without findings\n4. **Missing convergence signal** - active packets with at least 3 iterations return empty convergence signals\n5. **Coverage gaps** - `deep_loop_graph_query` returns uncovered questions or unverified claims for active packets\n6. **Namespace mismatch** - research/review session IDs do not align with discovered iteration folders\n\n## WHEN TO RUN CONFIRM\n\n| Symptom                                               | Recommended Mode   |\n| ----------------------------------------------------- | ------------------ |\n| Routine coverage graph check                          |            |\n| Reviewing graph gaps before any write                 |         |\n| After a deep-research/deep-review iteration completes |           |\n| First rebuild on a packet with many iterations        |   |\n| You only want the proposed upsert plan                | `--dry-run` |\n\n## MUTATION BOUNDARIES (Phase 3 enforced)\n\n| Allowed Targets                                                         | Forbidden Targets                                                                                                    |\n| ----------------------------------------------------------------------- | -------------------------------------------------------------------------------------------------------------------- |\n| `mcp_server/database/deep-loop-graph.sqlite`                            | Any spec folder doc (`.opencode/specs/**/*.md`, `.opencode/specs/**/*.json`) as a mutation target                    |\n| `mcp_server/database/deep-loop-graph.sqlite.pre-doctor-deep-loop.*.bak` | Any skill, agent, or command file                                                                                    |\n| Rows written through `deep_loop_graph_upsert` only                      | Any other database, including context-index, voyage vector, code graph, skill graph, eval, causal, and cocoindex DBs |\n|                                                                         | Direct SQL mutation except `VACUUM INTO` snapshot and snapshot restore                                               |\n\nPhase 3 first activity (`validate_targets_and_policy`) runs canonical-path validation before any write: resolved targets via `realpath`, exact-match against allowed_targets, no `..` escapes, no symlinks outside repo root, and no forbidden operation strings. Iteration markdown files are read-only inputs, never mutation targets.\n\n## WORKFLOW PHASES (delegated to YAML)\n\n```\nPhase 0 - Discovery\n  Purpose: detect empty graph, stale graph, iteration folders, and sampled status\n  Tools: Glob, Bash(stat), deep_loop_graph_status, deep_loop_graph_query\n  Lazy-init detection: if graph is empty and iteration folders exist, mark init_from_iteration_folders_available=true\n  Output: { graph_status, iteration_inventory, empty_graph, stale_graph, orphan_signals[] }\n\nPhase 1 - Analysis\n  Purpose: map iteration files to packet/session namespaces and propose rebuild plan\n  Tools: Read, Grep, deep_loop_graph_query, deep_loop_graph_convergence\n  Output: { rebuild_plan, candidate_packets[], convergence_baseline, recommended_action }\n\nPhase 2 - Snapshot\n  Purpose: VACUUM INTO snapshot of deep-loop-graph.sqlite before any graph write\n  Tools: Bash(sqlite3 ... 'VACUUM INTO ...'), disk-free preflight\n  Output: { snapshot_path, snapshot_bytes }\n  Halt-on: disk-free < 2x current DB size\n\nPhase 3 - run\n  First activity: validate_targets_and_policy\n  Then: deep_loop_graph_upsert() per iteration node + edge from the source packet's iteration files\n  Output: { packets_processed, nodes_upserted, edges_upserted, skipped }\n\nPhase 4 - Post-verify\n  Purpose: gold-battery convergence check\n  Tools: deep_loop_graph_status, deep_loop_graph_query, deep_loop_graph_convergence\n  Gold-battery: convergence signal must be non-empty for every rebuilt packet with >= 3 iterations\n  Output: { gold_battery_pass, convergence_results, regressions[] }\n\nPhase 5 - Rollback\n  Purpose: restore snapshot on interactive regression, or prompt in interactive workflow\n  Tools: Bash(cp -p)\n  Output: { rolled_back, restored_at, rollback_reason }\n\nPhase 6 - Report\n  Purpose: emit final status + state log\n  Output: { status, state_log_path, recommendation }\n```\n\n## 3. INSTRUCTIONS\n\nThe orchestrator (`assets/doctor_deep-loop.yaml`) executes the workflow phases above. As the operator running this command:\n\n1. **Resolve mode + flags** via the Unified Setup Phase prompt above. Do not advance until ALL inputs are bound (`execution_mode`, `intent`, `scope`, `no_snapshot`, `dry_run`).\n2. **Load the matching YAML** from `assets/`. The surviving YAML file is `doctor_deep-loop.yaml`.\n3. **Execute the YAML phases sequentially**. Phase 0 and Phase 1 are read-only. Phase 2-5 only run in modes.\n4. **In modes, never skip the snapshot phase** unless the user passed `--no-snapshot` explicitly. The validator records the waiver and rollback becomes unavailable.\n5. **Honor lazy-init detection**. If the graph is empty and research/review iteration folders exist, propose init-from-iteration-folders in diagnostic modes and execute it in confirm workflow.\n6. **Honor the gold-battery threshold**. Any packet with at least three iterations must return a non-empty `deep_loop_graph_convergence` signal after rebuild.\n7. **Always emit the state log** in Phase 6, regardless of success or failure. The log path is `<packet_scratch>/doctor-deep-loop-state.<timestamp>.json`.\n\nRead the YAML file end-to-end before starting Phase 0. Do not paraphrase; the YAML defines exact tool sequences, parameters, halt conditions, and rollback behavior.\n\n## OUTPUT CONTRACT\n\n```markdown\n## Deep Loop Coverage Graph Health Report\n\n### Status\n[OK | EMPTY | STALE | ATTENTION | APPLIED | ROLLED_BACK | FAIL]\n\n### Graph State\n| Metric                     | Value                                      |\n| -------------------------- | ------------------------------------------ |\n| Database                   | mcp_server/database/deep-loop-graph.sqlite |\n| Total Nodes                | N                                          |\n| Total Edges                | N                                          |\n| Research Iteration Folders | N                                          |\n| Review Iteration Folders   | N                                          |\n| Last Write Age             | N days                                     |\n\n### Drift Signals\n[N drift signals detected]\n- empty_graph: true|false\n- stale_graph: true|false\n- orphan_nodes: N\n- missing_convergence_signal: N packets\n\n### Action Taken\n- Snapshot: <path>\n- Rebuild: scope=research|review|both, packets=N, nodes=N, edges=N\n- Gold-battery: PASS|FAIL\n- Rollback: not_needed|restored|unavailable\n\n### Recommendation\n[next operator action]\n```\n\n## RELATED FILES\n\n- `assets/doctor_deep-loop.yaml`\n\n\nUser request: {{args}}"
