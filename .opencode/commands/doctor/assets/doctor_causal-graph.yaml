# ─────────────────────────────────────────────────────────────────
# DOCTOR: CAUSAL GRAPH WORKFLOW (INTERACTIVE DIAGNOSTIC MODE)
# ─────────────────────────────────────────────────────────────────
role: Expert Operator running causal-edges diagnostics in interactive mode
purpose: Read-only causal graph stats and drift sampling with user review gates. No mutations.
action: Discovery -> gate -> analysis -> gate -> recommendation -> report

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: sequential
  compliance: MANDATORY
  execution: interactive
  approvals: per_phase
  tracking: phase_by_phase
  validation: continuous_self_validation
  intent: DIAGNOSE


# ─────────────────────────────────────────────────────────────────
# CAUSAL GRAPH DOCTOR INVARIANT
# ─────────────────────────────────────────────────────────────────
causal_graph_doctor_invariant: |
  Causal-graph doctor is read-only by contract and treats causal_edges as
  add-only evidence that it inspects but never deletes, updates, or drops. It
  samples coverage and surfaces candidate links (confidence >= 0.7) as
  recommendations only; it never calls memory_causal_link. Adding edges is the
  job of memory-save tooling, not this diagnostic.

# ─────────────────────────────────────────────────────────────────
# UPSTREAM ASSETS
# ─────────────────────────────────────────────────────────────────
upstream_assets:
  contract: "local command design contract"
  files:
    spec: "spec.md"  # REQ-010 and REQ-017 cover causal coverage + validation
    decision_record: "decision-record.md"  # ADR set governs update orchestration safety
    checklist: "checklist.md#doctor-causal-graph"  # CHK-203/CHK-204 thresholds
    prior_threshold: "checklist.md#chk-204"  # CHK-065 carry-forward: coverage >= 60%
  pass_policy:
    confidence_floor: 0.7  # CHK-203 and candidate_selection.minimum
    coverage_target: 0.60  # CHK-204 / gold_battery.minimum_coverage_ratio
    add_only_required: true  # never delete or update causal_edges

# ─────────────────────────────────────────────────────────────────
# CAUSAL GRAPH DOCTOR PHILOSOPHY
# ─────────────────────────────────────────────────────────────────
causal_graph_doctor_philosophy:
  principle: "Coverage should improve lineage recall, but existing causal evidence is never destroyed."
  approach: "Read memory_causal_stats -> let user review -> sample drift -> let user review -> emit recommendation."
  mandate: "This command is read-only by contract."

# ─────────────────────────────────────────────────────────────────
# USER INPUTS
# ─────────────────────────────────────────────────────────────────
user_inputs:
  execution_mode: "[EXECUTION_MODE] - INTERACTIVE (this YAML)"
  intent: "[INTENT] - DIAGNOSE (this YAML)"
  confidence_threshold: "[CONFIDENCE_THRESHOLD] - informational only in diagnostic mode; minimum recommendation threshold is 0.7"


# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  defaults:
    confidence_threshold_empty: "0.7"
  confidence_threshold_policy:
    "0.7": "diagnostic recommendation floor for candidate links"
    ">0.7": "stricter diagnostic recommendation floor for candidate review"

# ─────────────────────────────────────────────────────────────────
# MUTATION BOUNDARIES
# ─────────────────────────────────────────────────────────────────
mutation_boundaries:
  allowed_targets:
    - "mcp_server/database/context-index__*.sqlite"  # active profile DB for causal_edges table
    - "mcp_server/database/context-index__*.sqlite.pre-doctor-causal-graph.*.bak"  # causal-edge snapshot files only
  forbidden_targets:
    - "<active-spec-folder>/**/*.md"  # never write into spec packet docs from causal doctor
    - "<active-spec-folder>/description.json"  # metadata updates belong to memory-save tooling
    - "<active-spec-folder>/graph-metadata.json"  # metadata not causal edge storage
    - ".opencode/skills/**/SKILL.md"  # never edit skill bodies
    - ".opencode/skills/**/graph-metadata.json"
    - ".opencode/agents/**/*.md"
    - ".opencode/commands/doctor/*.md"
    - ".opencode/commands/doctor/assets/doctor_*.yaml"
    - "mcp_server/database/context-index.sqlite*"  # legacy singleton DB path and snapshots
    - "mcp_server/database/*code-graph*"
    - "mcp_server/database/*deep-loop*"
    - "mcp_server/database/*eval*"
    - "mcp_server/database/*skill*"
    - "causal_edges row deletions"
    - "memory_causal_unlink"
    - "DELETE FROM causal_edges"
    - "UPDATE causal_edges"
    - "DROP TABLE causal_edges"
  policy: "read-only diagnostic; edge writes are owned by memory-save tooling (add-only); deletion is forbidden"
  enforcement: "This command is READ-ONLY by contract. Any attempted write or delete halts with STATUS=FAIL and ERROR='confirm-mode-mutation-violation'."
  validator:
    name: validate_targets
    runs: "before any file or database write; diagnostic mode should never reach a write path"
    steps:
      - "Resolve candidate target through realpath under repo_root."
      - "Assert target is one of mutation_boundaries.allowed_targets."
      - "Reject forbidden_targets even when a glob would otherwise match."
      - "Reject any operation containing DELETE FROM causal_edges or memory_causal_unlink."

# ─────────────────────────────────────────────────────────────────
# INTERACTIVE GATES
# ─────────────────────────────────────────────────────────────────
interactive_gates:
  before_phase_1_analysis:
    prompt: "Phase 0 causal stats complete. Continue to Phase 1 drift sampling? (y/n/details)"
    blocking: true
    approvals:
      y: "continue to phase_1_analysis"
      n: "STATUS=CANCELLED; emit state log with phase=phase_0_discovery"
      details: "print Phase 0 coverage, health, relation balance, and hints, then ask again"
  before_phase_2_recommendation:
    prompt: "Phase 1 drift sampling complete. Continue to Phase 2 recommendation? (y/n/details)"
    blocking: true
    approvals:
      y: "continue to phase_2_recommendation"
      n: "STATUS=CANCELLED; emit state log with phase=phase_1_analysis"
      details: "print sampled records and drift classes, then ask again"
  before_phase_3_report:
    prompt: "Phase 2 recommendation ready. Emit report and state log? (y/n/details)"
    blocking: true
    approvals:
      y: "emit report and state log"
      n: "STATUS=CANCELLED; emit minimal state log"
      details: "print recommendation, then ask again"

# ─────────────────────────────────────────────────────────────────
# STALENESS SIGNALS
# ─────────────────────────────────────────────────────────────────
staleness_signals:
  low_coverage:
    detection: "memory_causal_stats.data.meetsTarget == false OR coverage < 60%"
    severity: high
  orphan_records:
    detection: "memory_causal_stats.hints lists top unlinked records OR drift sample has no incoming/outgoing edges"
    severity: medium
  divergent_edge_weights:
    detection: "avg_strength outside expected range OR relationBalance.balanceStatus == relation_skewed"
    severity: medium
  stale_observations:
    detection: "sampled edges have last_observed_at equivalent (extracted_at or last_accessed) older than active packet edits"
    severity: low

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_0_discovery:
    purpose: "Read causal graph coverage and baseline stats."
    activities:
      - "Run: memory_causal_stats({})"
      - "Bash: stat -f '%m %z' mcp_server/database/context-index__*.sqlite"
      - "Capture total_edges, by_relation, avg_strength, unique_sources, unique_targets, link_coverage_percent, orphanedEdges, health, relationCoverage."
      - "Interactive gate: before_phase_1_analysis"
    outputs:
      - total_edges: N
      - coverage_percent: number
      - target_coverage_percent: 60
      - health: healthy|attention|has_orphans
      - orphaned_edges: N
      - relation_balance_status: balanced|relation_skewed|insufficient_data
    validation: discovery_complete
    fail_fast:
      - "memory_causal_stats returns error -> STATUS=FAIL with diagnostic"
      - "context-index__*.sqlite missing -> STATUS=MISSING with recommendation to run /doctor memory"

  phase_1_analysis:
    purpose: "Sample up to 10 records around drift signals using read-only traversal."
    activities:
      - "Extract up to 10 candidate memory IDs from memory_causal_stats hints, low-coverage hints, and memory_search({query: '013 doctor causal graph causal_edges'}) results."
      - "Run memory_drift_why({memoryId, maxDepth: 2, direction: 'both', includeMemoryDetails: true}) per sampled record."
      - "Classify each sampled record as linked, orphan_like, sparse, stale_observation, or relation_skewed."
      - "Never call memory_causal_link in diagnostic mode."
      - "Interactive gate: before_phase_2_recommendation"
    outputs:
      - sampled_records: "up to 10"
      - drift_classes:
          low_coverage: N
          orphan_records: N
          divergent_edge_weights: N
          stale_observations: N
      - sample_drift_explanations: "up to 10 entries"
      - severity_max: low|medium|high
    validation: analysis_complete

  phase_2_recommendation:
    purpose: "Translate drift signals into a safe operator action."
    rules:
      - "If coverage_percent < 60 -> recommend a causal-edges rebuild via /doctor:update (candidate floor 0.7)."
      - "If this is a first-time packet with no edges -> recommend a causal-edges rebuild via /doctor:update (stricter candidate floor 0.9)."
      - "If orphan_records > 0 but coverage >= 60 -> recommend manual review."
      - "If no drift -> status=OK, no action needed."
    outputs:
      - status: OK|ATTENTION|STALE|MISSING
      - recommended_command: string
      - recommended_when: now|after-packet-save|monitor
    validation: recommendation_complete
    activities:
      - "Interactive gate: before_phase_3_report"

  phase_3_report:
    purpose: "Emit packet-local report + state log."
    activities:
      - "Compose report following OUTPUT CONTRACT in causal-graph.md."
      - "Write state log to <packet_scratch>/doctor-causal-graph-state.<timestamp>.json."
      - "Print summary table to stdout."
    outputs:
      - state_log_path: "<packet_scratch>/doctor-causal-graph-state.<timestamp>.json"
      - status: STATUS_OK|STATUS_ATTENTION|STATUS_STALE|STATUS_MISSING|STATUS_FAIL|STATUS_CANCELLED
    validation: report_emitted

# ─────────────────────────────────────────────────────────────────
# OUTPUT FORMAT
# ─────────────────────────────────────────────────────────────────
output_contract:
  format: markdown
  required_sections:
    - status_header
    - stats_table
    - drift_signals_block
    - recommendation_block
    - next_steps_block
  state_log:
    path: "<packet_scratch>/doctor-causal-graph-state.<timestamp>.json"
    schema:
      command: "/doctor causal-graph"
      mode: INTERACTIVE
      intent: DIAGNOSE
      timestamp: ISO_8601
      duration_seconds: number
      status: OK|ATTENTION|STALE|MISSING|FAIL|CANCELLED
      coverage_percent: number
      target_coverage_percent: 60
      drift_classes: object
      recommendation: string

# ─────────────────────────────────────────────────────────────────
# HALT CONDITIONS
# ─────────────────────────────────────────────────────────────────
halt_conditions:
  - "Phase 0 fails to read memory_causal_stats -> STATUS=FAIL"
  - "context-index__*.sqlite missing -> STATUS=MISSING; recommend /doctor memory"
  - "Any phase emits a write attempt -> STATUS=FAIL with ERROR='confirm-mode-mutation-violation'"
  - "Any operation attempts causal_edges deletion -> STATUS=FAIL with ERROR='causal-delete-forbidden'"
  - "User answers n at any interactive gate -> STATUS=CANCELLED and emit state log"
