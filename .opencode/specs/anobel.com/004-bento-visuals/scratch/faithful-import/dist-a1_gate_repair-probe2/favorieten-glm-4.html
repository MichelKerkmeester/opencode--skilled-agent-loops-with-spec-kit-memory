<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>UNKNOWN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:#eceef0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Hanken Grotesk',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
    color:#0a1a2f;
  }

  .card{
    position:relative;
    width:560px;
    height:480px;
    margin-bottom:24px;
    background:#ffffff;
    border-radius:22px;
    border:none;
    box-shadow:0 1px 2px rgba(20,28,46,.04),0 26px 52px -22px rgba(20,28,46,.20);
    padding:30px;
    overflow:hidden;
  }

  /* Visual region — clipped strictly within card; content height ≈ 298px */
  .visual{
    position:relative;
    width:500px;
    height:298px;
    background:linear-gradient(135deg,#06458c 0%,#043367 100%);
    border-radius:16px;
    padding:18px 20px 16px;
    color:#E7ECF7;
    overflow:hidden;
  }

  /* Decorative wave — pure decoration, no overlap with text now */
  .visual::after{
    content:"";
    position:absolute;
    right:-30px;
    bottom:-40px;
    width:180px;
    height:180px;
    border:1px solid rgba(171,179,201,.18);
    border-radius:50%;
    pointer-events:none;
    aria-hidden:true;
  }

  .visual-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:7px;
    padding:5px 10px;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(231,236,247,.18);
    border-radius:999px;
    font-size:11.5px;
    font-weight:600;
    color:#E7ECF7;
    line-height:1;
    white-space:nowrap;
  }
  .eyebrow svg{width:12px;height:12px;display:block;flex:none;color:#E7ECF7;}

  .meta{
    font-size:11.5px;
    font-weight:500;
    color:#B8C2D6;
    line-height:1;
    white-space:nowrap;
  }

  /* Vloot-status board: compact 3 rows + caption, all inside visual */
  .status-board{
    display:flex;
    flex-direction:column;
    gap:7px;
  }

  .status-row{
    display:grid;
    grid-template-columns:1fr auto;
    align-items:center;
    gap:12px;
    padding:8px 12px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(231,236,247,.10);
    border-radius:10px;
  }

  .status-row .label{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:12.5px;
    font-weight:600;
    color:#E7ECF7;
    line-height:1.2;
  }
  .status-row .node{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#acb3c9;
    flex:none;
    box-shadow:0 0 0 3px rgba(171,179,201,.18);
  }
  .status-row .node.green{background:#367e39;box-shadow:0 0 0 3px rgba(54,126,57,.28);}
  .status-row .node.red{background:#c9140f;box-shadow:0 0 0 3px rgba(201,20,15,.28);}

  .status-row .value{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:600;
    color:#E7ECF7;
    white-space:nowrap;
  }
  .status-row .value .pill{
    font-size:10.5px;
    padding:3px 8px;
    border-radius:999px;
    line-height:1;
  }
  .pill.green{background:rgba(54,126,57,.20);color:#E7ECF7;border:1px solid rgba(54,126,57,.45);}
  .pill.red{background:rgba(201,20,15,.20);color:#E7ECF7;border:1px solid rgba(201,20,15,.45);}
  .pill.muted{background:rgba(255,255,255,.08);color:#B8C2D6;border:1px solid rgba(184,194,214,.25);}

  .status-caption{
    margin-top:8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    font-size:11px;
    color:#B8C2D6;
    line-height:1;
  }

  .legend{
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:nowrap;
  }
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{
    display:inline-block;
    width:7px;height:7px;border-radius:50%;
    background:#367e39;
  }
  .legend i.r{background:#c9140f;}

  .more{
    font-size:11px;
    font-weight:600;
    color:#E7ECF7;
  }

  /* Reserved title band — title + description ONLY */
  .title-band{
    position:absolute;
    left:30px;
    top:356px;
    width:500px;
    height:100px;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    gap:5px;
  }
  .title{
    margin:0;
    font-size:21px;
    font-weight:700;
    color:#0a1a2f;
    line-height:1.15;
    letter-spacing:-0.2px;
  }
  .description{
    margin:0;
    font-size:13.5px;
    font-weight:500;
    color:#4e4e4e;
    line-height:1.4;
    max-width:480px;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;animation:none!important;}
  }
</style>
</head>
<body>
  <section class="card">
    <div class="visual" data-a1-role="visual">
      <div class="visual-head">
        <span class="eyebrow" data-a1-role="eyebrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="5" r="3"/>
            <line x1="12" y1="22" x2="12" y2="8"/>
            <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
          </svg>
          Vloot-functie
        </span>
        <span class="meta">Rotterdam · 24 u</span>
      </div>

      <div class="status-board">
        <div class="status-row" data-a1-role="row">
          <span class="label" data-a1-role="label">
            <span class="node green" data-a1-role="node"></span>
            AIS-posities
          </span>
          <span class="value">
            <span class="pill green">Online</span>
            314
          </span>
        </div>
        <div class="status-row" data-a1-role="row">
          <span class="label" data-a1-role="label">
            <span class="node green" data-a1-role="node"></span>
            Motormonitor
          </span>
          <span class="value">
            <span class="pill green">Nominaal</span>
            286
          </span>
        </div>
        <div class="status-row" data-a1-role="row">
          <span class="label" data-a1-role="label">
            <span class="node red" data-a1-role="node"></span>
            Onderhoudssignalen
          </span>
          <span class="value">
            <span class="pill red">Actie vereist</span>
            7
          </span>
        </div>
        <div class="status-caption">
          <span class="legend">
            <span><i></i>Online</span>
            <span><i class="r"></i>Actie vereist</span>
          </span>
          <span class="more">+N meer</span>
        </div>
      </div>
    </div>

    <div class="title-band">
      <h2 class="title" data-a1-role="title">UNKNOWN</h2>
      <p class="description" data-a1-role="description">UNKNOWN</p>
    </div>
  </section>
</body>
</html>
