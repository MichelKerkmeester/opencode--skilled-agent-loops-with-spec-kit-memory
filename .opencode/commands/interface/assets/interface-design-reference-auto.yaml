# ─────────────────────────────────────────────────────────────────
# SK-DESIGN INTERFACE: DESIGN-REFERENCE CREATION WORKFLOW (AUTO MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: autonomous (no user approval gates)
# Delegates shared lifecycle/envelope/authority/proof vocabulary to
# creation-contract.md; this file carries only the style-reference
# extraction workflow and the command-standard scaffolding.
# ─────────────────────────────────────────────────────────────────
role: sk-design design-reference creation command, autonomous execution
purpose: Extract a provenance-rich validated Style Reference DESIGN.md from a canonical live source
action: Apply workflowMode=md-generator to $ARGUMENTS through the shared creation contract

operating_mode:
  workflow: sequential_creation_contract
  workflow_compliance: MANDATORY
  workflow_execution: autonomous
  approvals: none
  intake: progressive
  tracking: progressive_step_outputs
  validation: continuous_self_validation
  confirmation: "Only for route, identity, access, destructive action, or acceptance changes"
  description: |
    Runs the style-reference extraction workflow end to end without step-by-step
    approval, delegating shared lifecycle/envelope/authority/proof vocabulary to
    creation-contract.md. Pauses only when a confirmation-required field is
    unresolved or confidence drops below threshold.

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with citable source" }
    medium: { range: "40-79%", action: "Proceed with caution, record bounded assumptions" }
    low: { range: "0-39%", action: "STOP - resolve the confirmation-required field before extraction work" }
  scoring_weights:
    brief_clarity: 0.30
    grounding_fit: 0.25
    coverage_and_provenance: 0.25
    proof_bar: 0.20
  escalation:
    timebox_minutes: 10
    failed_attempts_threshold: 2
    action: "Present the unresolved field to the operator with current findings"

# ─────────────────────────────────────────────────────────────────
# INPUT CONTRACT
# ─────────────────────────────────────────────────────────────────
input_contract:
  required:
  - source
  optional:
  - access
  - output
  - overwrite
  - coverage

# ─────────────────────────────────────────────────────────────────
# CHECKPOINT OPTIONS
# ─────────────────────────────────────────────────────────────────
checkpoint_options:
  standard:
  - label: "Approve"
    description: "Approve the resolved brief and continue"
  - label: "Review"
    description: "Show the resolved brief and grounding record"
  - label: "Modify"
    description: "Adjust source, coverage, or overwrite policy before proceeding"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW ENFORCEMENT
# ─────────────────────────────────────────────────────────────────
workflow_enforcement:
  mode: strict
  step_order: sequential_mandatory
  skip_allowed: false
  creation_contract_gate:
    location: "Between step_2 and step_3"
    purpose: "Verify the shared creation contract is loaded before route proof and extraction work"
    requirements:
    - "creation-contract.md read (lifecycle, source trust, evidence vocabulary)"
    - "route proof recorded (command, workflowMode, canonical source)"
    action_if_failed: "STOP and return to the contract-load step"
  critical_steps:
    step_5_progressive_brief:
      enforcement: "MUST classify every field as resolved, auto-resolvable, or confirmation-required"
      verification: "No confirmation-required field left unresolved before extraction work"
    step_9_run_extraction_work:
      enforcement: "MUST run the owned extract-write-validate pipeline before any handoff"
      verification: "Deliverable visible_blocks are populated, not placeholders"
    step_11_proof:
      enforcement: "MUST qualify evidence with typed levels and an explicit ceiling"
      verification: "Evidence ledger present with an honest proof bar"

gate_logic:
  hard:
    H0_route_proof:
      description: "The canonical /interface:design-reference route + workflowMode=md-generator must be proven"
      fail_action: "STOP and record the route proof"
    H1_creation_contract:
      description: "The shared creation contract must be loaded before extraction work"
      fail_action: "STOP and load creation-contract.md"
    H2_required_input:
      description: "A resolvable canonical source must be present"
      fail_action: "STATUS=ASK MISSING=source"
    H3_acceptance_before_handoff:
      description: "Implementation handoff only after accepted design output"
      fail_action: "Hold handoff until acceptance"
  soft:
    S1_bounded_assumptions:
      description: "Auto-resolvable fields may proceed with recorded bounded assumptions"
      fail_action: "Proceed with rationale"

# ─────────────────────────────────────────────────────────────────
# CIRCUIT BREAKER
# ─────────────────────────────────────────────────────────────────
circuit_breaker:
  consecutive_failure_threshold: 3
  states:
    closed: "Normal operation"
    open: "3+ failures - pause and report to the operator"
    half_open: "Single retry before resuming"
  on_open:
    action: "Report failures with a summary of the unresolved brief"
    suggest: "Resolve the blocked field or defer to a sibling route"

# ─────────────────────────────────────────────────────────────────
# AUTONOMOUS EXECUTION
# ─────────────────────────────────────────────────────────────────
autonomous_execution:
  principle: "Execute the workflow steps sequentially without approval gates"
  decision_making: "Use the confidence framework to self-assess at each step"
  self_validation_approach:
    continuous: "Self-validate at each step output"
    confidence_threshold: "Stop only if confidence < 40%"
    error_handling: "Apply error_recovery strategies automatically"
  uncertainty_handling: "If a confirmation-required field is unresolved, pause and report"
  progress_tracking: "Record each step output"
  completion_criteria: "All steps validated, deliverable produced, status contract emitted"

# ─────────────────────────────────────────────────────────────────
# QUALITY STANDARDS
# ─────────────────────────────────────────────────────────────────
quality_standards:
  proof_first: true
  anti_default_critique: required
  evidence_typing: "Typed evidence levels with an explicit ceiling; no-fit is a valid outcome"
  contract_references:
    creation_contract: ".opencode/skills/sk-design/shared/creation-contract.md"
    context_loading_contract: ".opencode/skills/sk-design/shared/context-loading-contract.md"
    handoff_contract: ".opencode/skills/sk-design/shared/sk-code-handoff.md"

backend_boundary:
  mutation: "Only the owned extract-write-validate pipeline may write artifacts"
  pipeline: "design-md-generator/backend/scripts/guided-run.ts"

workflow:
  step_1_load_hub:
    purpose: Load the registry-driven design hub
    action: "Read .opencode/skills/sk-design/SKILL.md and mode-registry.json"
    output: hub_context
  step_2_load_creation_contract:
    purpose: Establish the shared lifecycle, source trust, and evidence vocabulary
    action: "Read .opencode/skills/sk-design/shared/creation-contract.md"
    output: creation_contract
  step_3_route_proof:
    purpose: Prove the canonical extraction route and output policy
    action: "Record command=/interface:design-reference, workflowMode=md-generator, canonical source, and proof environment"
    output: route_proof
  step_4_context_manifest:
    purpose: Load source origin, representative routes/states/viewports/themes, access, dynamic loading, output, and overwrite policy
    action: "Name the capture matrix and every loaded source"
    output: context_manifest
  step_5_progressive_brief:
    purpose: Resolve source identity, access, output, overwrite, coverage, and validation bar
    action: "Hard-stop for missing canonical target, private access without consent, or overwrite without confirmation"
    output: resolved_brief
  step_6_grounding:
    purpose: Treat the canonical website as the primary exemplar
    action: "Record URL, origin, observed time, capture role, coverage, and limitations; no unrelated fallback is allowed"
    output: grounding_record
  step_7_load_mode:
    purpose: Load the stable md-generator mode and owned backend
    action: "Read .opencode/skills/sk-design/design-md-generator/SKILL.md, then references/ and assets as required"
    output: mode_context
  step_8_select_procedure_card:
    purpose: Select the extraction procedure card
    action: "Choose procedures/design-system-extraction.md for measured extraction; otherwise state 'Procedure applied: none - baseline md-generator pipeline' and stop if no canonical extraction job remains"
    output: mode_plan
  step_9_run_extraction_work:
    purpose: Run the owned extract-write-validate pipeline
    action: "Capture measured CSS and tokens, write v3 DESIGN.md, validate provenance and schema, and label inferred semantics and gaps"
    output: style_reference_design_md
  step_10_critique_revision:
    purpose: Compare artifact coverage with the capture matrix
    action: "Correct only source-traceable gaps; never add unrelated inspiration or generic replacement content"
    output: critique_validation
  step_11_proof:
    purpose: Validate schema, provenance, and available sampled visual coverage
    action: "Record sourceUrl, extractedTokensDigest, fidelityScore, capture failures, and the evidence ceiling"
    output: evidence_ledger
  step_12_prepare_handoff:
    purpose: Prepare implementation handoff only when accepted design output moves to code
    action: "Read .opencode/skills/sk-design/shared/sk-code-handoff.md and preserve source provenance and inferred-field labels"
    output: next_action_handoff

deliverable:
  name: "Style Reference DESIGN.md"
  visible_blocks: [Route Proof, Resolved Brief, Context Manifest, Grounding Record, Creation/Remediation Artifact, Critique/Validation, Evidence Ledger, Next Action/Handoff]
  required_fields: [sourceUrl, extractedTokensDigest, fidelityScore]
  file_outputs: ["<output>/DESIGN.md"]

status_contract:
  success: 'STATUS=OK PRODUCES="Style Reference DESIGN.md" NEXT=/interface:foundations,/interface:design,/interface:audit PROOF=sourceUrl,extractedTokensDigest,fidelityScore'
  missing_input: "STATUS=ASK MISSING=<input>"
  cannot_run: "STATUS=FAIL ERROR=<named-cause>"
  route_instead: "STATUS=DEFER ROUTE=<hub|sibling>"

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY
# ─────────────────────────────────────────────────────────────────
error_recovery:
  missing_source:
    action: "Emit STATUS=ASK MISSING=source and wait"
  no_fit_grounding:
    action: "Stop; the canonical source is required and no unrelated fallback is allowed"
  contract_not_loaded:
    action: "Return to the creation-contract load step before continuing"
  acceptance_conflict:
    action: "Request explicit amendment for conflicting accepted decisions"

# ─────────────────────────────────────────────────────────────────
# TERMINATION
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: step_12_prepare_handoff
  message: "Style reference extraction workflow complete."
  next_steps:
  - action: "Run /interface:foundations to build a static system from the measured evidence"
  - action: "Run /interface:design to frame direction from the measured evidence"
  - action: "Run /interface:audit to QA against the extracted reference"
  - action: "Hand to sk-code via sk-code-handoff.md after artifact acceptance"

# ─────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────
rules:
  ALWAYS:
  - "Load creation-contract.md before extraction work"
  - "Prove the canonical route before producing artifacts"
  - "Treat the canonical website as the primary exemplar; no unrelated fallback"
  - "Validate artifact coverage against the capture matrix"
  - "Qualify evidence with typed levels and an explicit ceiling"
  NEVER:
  - "Write artifacts outside the owned extract-write-validate pipeline"
  - "Skip the creation contract or route proof"
  - "Add unrelated inspiration or generic replacement content"
  - "Leave a confirmation-required field unresolved in autonomous mode"

pipeline:
  stage: "extract - the pipeline origin for measured source evidence before design judgment or audit"
  accepts_from: []
  hands_to_next: ["/interface:foundations", "/interface:design", "/interface:audit"]
  recommend_only: true
  hands_to_build: "sk-code, via .opencode/skills/sk-design/shared/sk-code-handoff.md, only after artifact acceptance"
