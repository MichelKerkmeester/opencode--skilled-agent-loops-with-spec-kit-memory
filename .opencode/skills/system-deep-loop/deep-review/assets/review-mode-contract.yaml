# entry's enumParityChecked list is mechanically enforced (not aspirational):
# deep-review-contract-parity.vitest.ts confirms every id in those families
# still appears literally in the target file, as a lightweight drift
# tripwire that does not require full rendering.
authoredArtifacts:
