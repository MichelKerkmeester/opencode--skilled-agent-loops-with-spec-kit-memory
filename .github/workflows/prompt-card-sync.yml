name: Prompt-Knowledge Card Sync
on:
  pull_request:
    branches: [main]

jobs:
  card-sync:
    name: 3-layer prompt-knowledge drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run prompt-quality card-sync guard
        run: |
          set -euo pipefail
          GUARD=".opencode/skills/system-skill-advisor/mcp_server/scripts/check-prompt-quality-card-sync.sh"
          if [ ! -f "$GUARD" ]; then
            echo "::warning::card-sync guard not found at $GUARD — skipping"
            exit 0
          fi
          # Structural drift guard for the sk-prompt / sk-prompt-models / cli-* layers:
          # table inlining, Tier-3 escalation-rule drift, registry/profile/_index completeness,
          # and per-model discovery reachability. python3 is preinstalled on ubuntu-latest.
          bash "$GUARD" .
          echo "All clear — prompt-knowledge layers are in sync."
