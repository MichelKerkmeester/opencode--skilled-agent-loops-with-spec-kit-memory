<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clean Critique Copy</title>
  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      color: #182033;
      font-family: Inter, system-ui, sans-serif;
    }

    .review-note {
      max-width: 640px;
      margin: 56px auto;
      padding: 24px;
      border: 1px solid #d8dee6;
      border-radius: 14px;
      background: #ffffff;
    }

    .review-note h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      line-height: 1.1;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <article class="review-note">
    <h1>Release review</h1>
    <p>The launch page spends too much space praising the process. Replace that framing with the user task, the proof point, and the next action.</p>
  </article>
</body>
</html>
