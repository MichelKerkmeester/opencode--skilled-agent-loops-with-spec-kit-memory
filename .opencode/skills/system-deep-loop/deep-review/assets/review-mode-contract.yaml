# Validator contract for CI, render verification, and drift detection.
validation:
  schemaVersion: 1
  checks:
    - id: schema
      description: Validate this manifest against the canonical review-mode contract schema.
    - id: render-verify
      description: "Re-render the single review-contract-snapshot artifact (node render-contract-snapshot.cjs --check) and fail on drift. The five authoredArtifacts entries are hand-maintained and are not re-rendered by this check."
    - id: marker-integrity
      description: Ensure the review-contract-snapshot artifact contains intact begin/end markers with no overlapping generated blocks.
    - id: enum-parity
      description: "Confirm the dimension, severity, and verdict ids (plus cross-reference-protocol ids for the two workflow YAMLs) declared in each authoredArtifacts entry's enumParityChecked are still literally present in that file; see deep-review-contract-parity.vitest.ts."
    - id: jsonl-parity
      description: Ensure JSONL iteration and synthesis-event fields match the outputs contract.
    - id: lifecycle-parity
      description: "Ensure lifecycle mode docs and workflow branches agree on the three supported modes: new, resume, and restart."
    - id: reducer-contract
      description: Ensure reducer inputs, outputs, and findings-registry metrics are documented consistently across assets and runtime mirrors.
    - id: duplicate-literal-lint
      description: Detect duplicated hard-coded review taxonomy literals outside generated sections.
    - id: runtime-coverage
      description: Ensure every supported runtime deep-review agent has a declared authoredArtifacts entry and parity coverage.
    - id: playbook-assertions
      description: Assert manual testing playbook scenarios reference the canonical simplified contract where applicable.
