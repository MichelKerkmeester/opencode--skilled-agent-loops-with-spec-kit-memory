# ─────────────────────────────────────────────────────────────────
# OPENCODE CREATE: BENCHMARK WORKFLOW (AUTO MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: autonomous execution (no approval checkpoints)
# Entrypoint: /create:benchmark
# Operations: create | update
# ─────────────────────────────────────────────────────────────────
role: Benchmark Folder Creator using sk-doc
purpose: Create or update MCP benchmark folders with the shipped sk-doc create-benchmark contract
action: Normalize inputs, load benchmark standards, generate the package, validate structure, and report completion

# ─────────────────────────────────────────────────────────────────
# PREREQUISITE: @markdown AGENT VERIFICATION
# ─────────────────────────────────────────────────────────────────
# This workflow REQUIRES the @markdown agent for:
#   - Template-first benchmark report and SOURCE.md generation
#   - sk-doc standards enforcement
#   - Benchmark folder validation
#
# PHASE 0 in the command markdown verifies @markdown agent BEFORE
# this YAML workflow loads. If you are executing this workflow,
# @markdown verification has already passed.
# ─────────────────────────────────────────────────────────────────

operating_mode:
  workflow: unified_6_step
  workflow_compliance: MANDATORY
  workflow_execution: autonomous
  approvals: none
  tracking: progressive_status_logging
  validation: continuous_self_validation
  supports_operations:
    - create
    - update
  description: |
    Executes the 6-step benchmark promotion workflow without step-by-step approval.
    Pauses only if confidence drops below threshold or promotion evidence conflicts.

development_philosophy:
  principle: "One benchmark promotion contract, one command entrypoint"
  approach: "Normalize -> Verify -> Load -> Promote -> Validate -> Report"
  mandate: "Prefer the shipped sk-doc benchmark package shape over ad-hoc evidence summaries"

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with deterministic defaults" }
    medium: { range: "40-79%", action: "Proceed with caution and log assumptions" }
    low: { range: "0-39%", action: "STOP and request clarification" }
  scoring_weights:
    input_completeness: 0.30
    routing_clarity: 0.20
    contract_alignment: 0.30
    validation_readiness: 0.20
  low_confidence_behavior:
    action: "Stop before generation and ask one consolidated clarification"

# ─────────────────────────────────────────────────────────────────
# REQUEST ANALYSIS FRAMEWORK
# ─────────────────────────────────────────────────────────────────
request_analysis_framework:
  code_search_note: "Use Code Graph structural queries (code_graph_query) + Grep for concept discovery; verify hits with Read. memory_search is for spec docs/memory, not arbitrary code."
  solution_flow:
    - "Parse command arguments and normalize execution mode"
    - "Verify create/update semantics against the real benchmark folder path"
    - "Load the create-benchmark SKILL, references, and both templates before writing"
    - "Confirm the source packet decision, implementation summary, benchmark evidence, fixture, and replay commands"
    - "Generate the benchmark folder package using current-reality evidence"
    - "Validate report structure, SOURCE.md navigation, copied artifacts, and README index consistency"
  pre_change_validation:
    items:
      - "create_benchmark_verified is true"
      - "skill_name is present"
      - "source_packet_path is present"
      - "operation is create or update"
      - "source_strategy is present"
      - "benchmark_date is present"
      - "execution_mode is :auto"
    stop_conditions:
      - "Any required input missing"
      - "Operation does not match real benchmark folder existence"
      - "Source packet lacks accepted decision, stable fixture, replay commands, or benchmark evidence"
      - "Target skill lacks mcp_server/ or a measurable MCP surface"
    stop_action: "STOP and correct setup before generation"

input_contract:
  required:
    - create_benchmark_verified
    - skill_name
    - source_packet_path
    - operation
    - source_strategy
    - benchmark_date
    - execution_mode
  optional:
    - skill_path
    - benchmarks_root
    - benchmark_folder
    - memory_choice

field_handling:
  skill_name:
    validation: "hyphen-case folder name"
    required: true
  source_packet_path:
    validation: "existing spec packet folder with decision-record.md, implementation-summary.md, and benchmark evidence"
    required: true
  operation:
    validation: "must be one of: create, update"
    required: true
  source_strategy:
    validation: "must be one of: promote-benchmark, rerun-update, retirement-update"
    required: true
  benchmark_date:
    validation: "ISO execution date used for benchmark-YYYY-MM-DD"
    required: true
  execution_mode:
    validation: "must be :auto"
    required: true

documentation_level:
  default: "Level 2 (Verification)"
  required_files:
    - spec.md
    - plan.md
    - tasks.md
    - checklist.md
  note: "Benchmark package creation typically needs verification because it promotes spec evidence into a skill-local MCP operator surface"

defaults:
  skill_path: .opencode/skills/
  benchmarks_dirname: mcp_server/benchmarks
  execution_mode: :auto
  dqi_hard_minimum: 75

operation_router:
  create:
    requires_existing_benchmark_folder: false
    output_scope:
      - mcp_server/benchmarks/README.md
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/benchmark_report.md
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/SOURCE.md
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/results.csv
  update:
    requires_existing_benchmark_folder: true
    output_scope:
      - mcp_server/benchmarks/README.md
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/benchmark_report.md
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/SOURCE.md
      - mcp_server/benchmarks/benchmark-YYYY-MM-DD/results.csv

reference_sources:
  specific_creation: .opencode/skills/sk-doc/create-benchmark/SKILL.md
  reference_map: .opencode/skills/sk-doc/create-benchmark/references/README.md
  case_studies: .opencode/skills/sk-doc/create-benchmark/references/case_studies.md
  pitfalls: .opencode/skills/sk-doc/create-benchmark/references/pitfalls.md
  worked_example: .opencode/skills/sk-doc/create-benchmark/references/worked_example.md
  core_standards: .opencode/skills/sk-doc/shared/references/core_standards.md
  validation: .opencode/skills/sk-doc/shared/references/validation.md

template_sources:
  benchmark_report: .opencode/skills/sk-doc/create-benchmark/assets/benchmark_report_template.md
  source_file: .opencode/skills/sk-doc/create-benchmark/assets/source_template.md

validation_scripts:
  validate_document: .opencode/skills/sk-doc/shared/scripts/validate_document.py
  extract_structure: .opencode/skills/sk-doc/shared/scripts/extract_structure.py

quality_standards:
  template_first: required
  frontmatter_required: true
  report_requirements:
    - fixed ten-section benchmark_report.md structure
    - section 1 is HEADLINE / OVERVIEW
    - section 10 is RELATED RESOURCES
  source_file_requirements:
    - frontmatter
    - OVERVIEW
    - SPEC PACKET LOCATION
    - WHEN TO READ WHAT
    - EVIDENCE FILE MAP
  current_reality_rule: "Promote accepted benchmark evidence, not speculative or in-flight measurements"
  validation_pipeline:
    - "python3 .opencode/skills/sk-doc/shared/scripts/validate_document.py [benchmark_folder]/benchmark_report.md --type readme"
    - "python3 .opencode/skills/sk-doc/shared/scripts/validate_document.py [benchmarks_root]/README.md --type readme"

gate_logic:
  hard:
    H0_write_verified:
      description: "create_benchmark_verified must be true"
      fail_action: "STOP and return to setup"
    H1_required_fields:
      description: "All required setup fields must be present"
      fail_action: "STOP and collect missing fields"
    H2_existence_semantics:
      description: "create/update must match real benchmark folder existence"
      fail_action: "STOP and reroute or correct target"
    H3_contract_shape:
      description: "Generated package must match MCP benchmark folder contract"
      fail_action: "Fix structure before continuing"
    H4_validation_gate:
      description: "Report validation, SOURCE.md navigation, copied artifacts, and README index checks must pass"
      fail_action: "Run fix-and-revalidate loop"
  soft:
    S1_source_strategy:
      description: "Prefer true promotion only when an accepted decision and replayable evidence exist"
      fail_action: "Proceed only with logged provisional or retirement status"

workflow_overview:
  steps:
    - id: step_1_preflight
      purpose: "Normalize inputs and enforce H0-H2"
    - id: step_2_source_discovery
      purpose: "Resolve promotion evidence, target MCP surface, and dated folder"
    - id: step_3_template_loading
      purpose: "Load create-benchmark references and both report/source templates"
    - id: step_4_package_generation
      purpose: "Create or update benchmark artifacts"
    - id: step_5_validation
      purpose: "Run markdown validation and path/artifact consistency checks"
    - id: step_6_completion
      purpose: "Emit deterministic completion report"

# ─────────────────────────────────────────────────────────────────
# CONTEXT LOADING
# ─────────────────────────────────────────────────────────────────
context_loading:
  trigger: "During UNIFIED SETUP PHASE, non-interactive resolution before Step 1"
  applies_when: "source_packet_path contains handover.md or _memory.continuity in implementation-summary.md, or operation is update and benchmark_folder already has a prior benchmark_report.md/SOURCE.md; not applicable to a fresh promote-benchmark with no prior continuity"
  auto_resolution:
    default: "If prior context exists (handover.md <24h old, or _memory.continuity present in {source_packet_path}), load it automatically via memory_context (mode: resume); sets memory_loaded: handover+continuity. Otherwise skip; sets memory_loaded: skipped."
    override: "Honor memory_choice if explicitly supplied as a command argument or pre-bound setup answer (A/B/C)"
  mcp_integration:
    tool: memory_context
    note: "Call MCP tools directly - NEVER through Code Mode"
    parameters: { input: "resume previous work on {source_packet_path}", mode: "resume", profile: "resume", specFolder: "{source_packet_path}", includeContent: true }
    transport_fallback: "If MCP tools are missing or erroring while the daemon is otherwise warm, use: node .opencode/bin/spec-memory.cjs memory_context --json '{\"input\":\"resume previous work\",\"mode\":\"resume\"}' --format json --timeout-ms 3000 --warm-only. Exit 75 = retryable backend unavailability."
  output: memory_loaded

workflow:
  step_1_preflight:
    purpose: Normalize and verify required fields
    activities:
      - Normalize skill_path to default when omitted
      - Derive benchmarks_root as "[skill_path]/[skill_name]/mcp_server/benchmarks"
      - Derive benchmark_folder as "[benchmarks_root]/benchmark-[benchmark_date]"
      - Validate operation token to supported value
      - Validate execution_mode is :auto
      - Check whether target benchmark folder exists
      - Resolve memory_choice via the context_loading block (Q5 if applicable); record result as memory_loaded
    outputs:
      - normalized_inputs
      - target_existence_state

  step_2_source_discovery:
    purpose: Resolve source packet evidence and benchmark promotion inputs
    activities:
      - Read source packet decision-record.md, implementation-summary.md, and benchmark evidence
      - Verify accepted decision, stable headline, stable fixture, replay commands, and expected outcome
      - Verify target skill has mcp_server/ and a measurable MCP surface
      - Identify aggregate CSV, optional per-probe JSONL, optional runtime sidecars, and README index needs
    outputs:
      - promotion_gate_state
      - artifact_copy_plan
      - benchmark_index_plan

  step_3_template_loading:
    purpose: Load standards and templates before generation
    activities:
      - Read create-benchmark/SKILL.md
      - Read references/README.md, case_studies.md, pitfalls.md, and worked_example.md
      - Read benchmark_report_template.md
      - Read source_template.md
      - Extract the canonical report and SOURCE.md section contracts
    outputs:
      - template_contract_loaded

  step_4_package_generation:
    purpose: Generate or update benchmark package
    activities:
      - Ensure benchmarks_root and README.md exist
      - Create or update benchmark_folder
      - Copy required results.csv and applicable benchmark artifacts
      - Create or update benchmark_report.md from the ten-section template
      - Create or update SOURCE.md from the wayfinding template
      - Add or update the README index row with date, folder link, winner or status, headline metric, and source packet path
    outputs:
      - generated_benchmark_report
      - generated_source_file
      - copied_artifacts
      - updated_index_row

  step_5_validation:
    purpose: Verify generated package
    activities:
      - Run validate_document.py on benchmark_report.md with --type readme
      - Run validate_document.py on benchmarks/README.md with --type readme
      - Check SOURCE.md maps the authoritative spec packet and evidence files
      - Check required artifacts exist and optional omissions are documented
      - Check benchmark_report.md keeps all ten required sections without placeholders
    outputs:
      - report_validation_passed
      - index_validation_passed
      - consistency_checks_passed

  step_6_completion:
    purpose: Emit completion status
    activities:
      - Summarize operation, source strategy, and generated paths
      - Report validation results
      - Return STATUS=OK PATH=[benchmark_folder]
    outputs:
      - completion_report

error_recovery:
  missing_benchmark_on_update:
    action: "Stop and recommend reroute to create"
  existing_benchmark_on_create:
    action: "Stop and recommend reroute to update"
  missing_benchmark_template:
    action: "Stop because the benchmark report or SOURCE.md contract cannot be enforced"
  report_validation_failure:
    action: "Enter fix-and-revalidate loop"

circuit_breaker:
  trigger_threshold: 3
  reset_condition: "Report validation passes and all required paths resolve"
  actions:
    - "Stop autonomous generation"
    - "Report the failing gate and affected path"
    - "Return STATUS=FAIL with next-step guidance"

autonomous_execution:
  principle: "Advance automatically once hard gates pass"
  status_reporting:
    cadence: "Report at major workflow boundaries"
    include:
      - operation
      - source_strategy
      - benchmark_folder
      - validation_state

completion_report_template: |
  Benchmark Command Complete

  Skill: [skill_name]
  Operation: [operation]
  Source strategy: [source_strategy]
  Mode: :auto
  Target: [benchmark_folder]

  Validation:
  - Report validation: [passed/failed]
  - README index validation: [passed/failed]
  - SOURCE/artifact consistency checks: [passed/failed]

  STATUS=[OK|FAIL] PATH=[benchmark_folder]

termination:
  success_signal: "STATUS=OK PATH=[benchmark_folder]"
  failure_signal: "STATUS=FAIL PATH=[benchmark_folder]"
  rule: "Do not claim completion until validation output is included"

rules:
  must:
    - "Load the create-benchmark reference and both templates before writing"
    - "Keep SOURCE.md as navigation, not a duplicate audit trail"
    - "Use the benchmark execution date for benchmark-YYYY-MM-DD"
  must_not:
    - "Promote in-flight or unreplayable benchmark evidence"
    - "Compare numeric results across different MCP stacks as if equivalent"
    - "Leave template placeholders in shipped benchmark files"
