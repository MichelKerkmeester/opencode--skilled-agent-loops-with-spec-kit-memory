<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Factuurregel · 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #eceef0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Hanken Grotesk', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #0a1a2f;
  }

  .card {
    width: 560px;
    height: 480px;
    background: #ffffff;
    border-radius: 22px;
    border: none;
    box-shadow: 0 1px 2px rgba(20,28,46,.04), 0 26px 52px -22px rgba(20,28,46,.20);
    padding: 30px;
    overflow: hidden;
    position: relative;
    font-variant-numeric: tabular-nums;
    margin-bottom: 24px;
  }

  /* ===== VISUAL REGION: x[30..530] y[30..328] ===== */
  .visual {
    position: relative;
    width: 500px;
    height: 298px;          /* y[30..328] — nothing visual below 328 */
    background: linear-gradient(180deg, #043367 0%, #053b77 55%, #06458c 100%);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 16px 18px 14px;
  }

  /* Decorative grid lines (absolute OK: aria-hidden, pointer-events none) */
  .grid-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    aria-hidden: true;
    background-image:
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(0deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 37px;
    opacity: 0.6;
  }
  .horizon {
    position: absolute;
    left: 0; right: 0;
    top: 70%;
    height: 1px;
    background: rgba(184,194,214,0.18);
    pointer-events: none;
  }

  /* ===== Header row (eyebrow + legend) ===== */
  .header-row {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px 5px 8px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(184,194,214,0.28);
    border-radius: 999px;
    color: #E7ECF7;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .eyebrow svg { width: 12px; height: 12px; display: block; }

  .legend {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: #B8C2D6;                 /* on-navy muted — WCAG AA pass */
    font-size: 11px;
    font-weight: 500;
  }
  .legend-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .dot-ok    { background: #367e39; }
  .dot-alert { background: #c9140f; }

  /* ===== Matrix (header + 3 rows + "+N more") ===== */
  .matrix {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }

  .matrix-header,
  .row {
    display: grid;
    grid-template-columns: 26px 1fr auto auto;
    align-items: center;
    column-gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(184,194,214,0.10);
  }

  .matrix-header {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(184,194,214,0.18);
    border-radius: 0;
    padding: 4px 10px 6px;
  }

  .col-head {
    font-size: 10.5px;
    font-weight: 600;
    color: #B8C2D6;                 /* on-navy muted */
    letter-spacing: 0.01em;
  }
  .col-head.right { text-align: right; }

  .row { padding: 6px 10px; }

  .row .num {
    font-size: 11.5px;
    font-weight: 600;
    color: #B8C2D6;
    font-variant-numeric: tabular-nums;
  }

  .row .name {
    font-size: 12.5px;
    font-weight: 600;
    color: #E7ECF7;                 /* on-navy body */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row .amount {
    font-size: 12.5px;
    font-weight: 600;
    color: #E7ECF7;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 72px;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    min-width: 70px;
    justify-content: flex-end;
  }
  .status svg { width: 11px; height: 11px; }
  .status-ok    { color: #7BC97E; }   /* lightened green for on-navy contrast */
  .status-alert { color: #F4A6A4; }   /* lightened red for on-navy contrast */

  .row.total {
    background: rgba(255,255,255,0.07);
    border-color: rgba(184,194,214,0.22);
    margin-top: 2px;
  }
  .row.total .name  { color: #E7ECF7; font-weight: 700; }
  .row.total .amount { color: #ffffff; font-weight: 700; }
  .row.total .num   { color: #B8C2D6; }

  .more {
    margin-top: 2px;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #B8C2D6;
    font-size: 11.5px;
    font-weight: 500;
  }
  .more .link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #E7ECF7;
    font-weight: 600;
  }
  .more .link svg { width: 10px; height: 10px; }

  /* ===== RESERVED TITLE BAND: x[30..530] y[356..456] ===== */
  .title-band {
    position: absolute;
    left: 30px;
    right: 30px;
    top: 356px;
    bottom: 24px;                  /* 480 - 24 = 456 */
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .title-block { min-width: 0; flex: 1; }

  .title {
    font-size: 21px;
    font-weight: 700;
    color: #0a1a2f;
    line-height: 1.15;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .description {
    font-size: 13.5px;
    font-weight: 500;
    color: #4e4e4e;
    line-height: 1.4;
    margin: 6px 0 0;
  }

  .shell-cta {
    flex-shrink: 0;
    align-self: center;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #ffffff;
    border: 1px solid #cbd0dc;
    border-radius: 999px;
    color: #06458c;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color .15s ease, border-color .15s ease;
  }
  .shell-cta:hover { background: #f6f8fc; border-color: #8591b3; }
  .shell-cta:focus-visible { outline: 2px solid #06458c; outline-offset: 2px; }
  .shell-cta svg { width: 11px; height: 11px; }

  @media (prefers-reduced-motion: reduce) {
    .shell-cta { transition: none; }
    .shell-cta:hover { background: #ffffff; }
  }
</style>
</head>
<body>
  <section class="card" role="article" aria-label="Factuurregel 1">

    <!-- VISUAL: y[30..328] -->
    <div class="visual" data-a1-role="visual">
      <div class="grid-lines" aria-hidden="true"></div>
      <div class="horizon" aria-hidden="true"></div>

      <div class="header-row">
        <span class="eyebrow" role="eyebrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="5" r="2.4"/>
            <line x1="12" y1="7.4" x2="12" y2="20"/>
            <line x1="6" y1="11" x2="18" y2="11"/>
            <line x1="6" y1="11" x2="6" y2="15"/>
            <line x1="18" y1="11" x2="18" y2="15"/>
          </svg>
          Vloot-functie
        </span>
        <span class="legend">
          <span class="legend-item"><span class="legend-dot dot-ok" aria-hidden="true"></span>Verwerkt</span>
          <span class="legend-item"><span class="legend-dot dot-alert" aria-hidden="true"></span>Open</span>
        </span>
      </div>

      <div class="matrix" role="matrix">
        <div class="matrix-header">
          <span class="col-head">#</span>
          <span class="col-head">Regel</span>
          <span class="col-head right">Bedrag</span>
          <span class="col-head right">Status</span>
        </div>

        <div class="row" role="row">
          <span class="num">01</span>
          <span class="name">Huur ligplaats A12</span>
          <span class="amount">€ 1.240,00</span>
          <span class="status status-ok" role="label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            Verwerkt
          </span>
        </div>

        <div class="row" role="row">
          <span class="num">02</span>
          <span class="name">Kraanbeurten · 3×</span>
          <span class="amount">€ 480,00</span>
          <span class="status status-ok" role="label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            Verwerkt
          </span>
        </div>

        <div class="row" role="row">
          <span class="num">03</span>
          <span class="name">Dieselboeking · 680 L</span>
          <span class="amount">€ 912,40</span>
          <span class="status status-alert" role="label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.8" fill="currentColor"/></svg>
            Open
          </span>
        </div>

        <div class="more" role="label">
          <span>Nog 2 regels verborgen</span>
          <span class="link">
            +2 meer
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 6 15 12 9 18"/></svg>
          </span>
        </div>
      </div>
    </div>

    <!-- RESERVED TITLE BAND: y[356..456] -->
    <div class="title-band">
      <div class="title-block">
        <h1 class="title">UNKNOWN</h1>
        <p class="description">UNKNOWN</p>
      </div>
      <button class="shell-cta" type="button" role="shell-cta">
        Bekijk PDF
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>

  </section>
</body>
</html>
