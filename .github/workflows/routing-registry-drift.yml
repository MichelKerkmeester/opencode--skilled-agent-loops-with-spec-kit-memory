name: Routing Registry Drift Guard

# Makes the C-plus guarantee real: a change to the advisor's hardcoded routing
# maps without a matching mode-registry.json change (or vice-versa) fails CI here.
# Pairs with the local drift-guard test; this is the authoritative gate.
on:
  pull_request:
    branches: [main]
    paths:
      - '.opencode/skills/deep-loop-workflows/mode-registry.json'
      - '.opencode/skills/system-skill-advisor/mcp_server/**'
      - '.opencode/commands/doctor/scripts/parent-skill-check.cjs'

jobs:
  routing-drift:
    name: Registry == advisor maps; parent-skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install advisor deps
        working-directory: .opencode/skills/system-skill-advisor/mcp_server
        run: npm ci
      - name: Routing-registry drift-guard + parity suites
        working-directory: .opencode/skills/system-skill-advisor/mcp_server
        # The drift-guard asserts the hardcoded Python/TS routing maps equal the
        # registry projection; the parity suites assert per-mode routing. Both shell
        # to python3 (the routing paths are stdlib-only), preinstalled on the runner.
        run: |
          set -euo pipefail
          npx vitest run \
            tests/routing-registry-drift-guard.vitest.ts \
            tests/routing-parity-deep-skills.vitest.ts \
            tests/routing-parity-deep-council.vitest.ts
      - name: Parent-skill structural invariants (one identity, registry coverage)
        run: node .opencode/commands/doctor/scripts/parent-skill-check.cjs
