# ─────────────────────────────────────────────────────────────────
# OPENCODE CREATE: COMMAND AUTHORING WORKFLOW (CONFIRM MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: confirm-only (interactive step-by-step approval)
# Note: This workflow mirrors auto mode and adds user approval gates
#       at each checkpoint. Workflow behavior must stay equivalent
#       to create_command_auto.yaml except for checkpoint handling.
# ─────────────────────────────────────────────────────────────────
role: Expert Slash Command Author using sk-doc create-command packet
purpose: Create production-ready OpenCode slash command 4-file sets with router/presentation separation
action: Guide command creation from invocation contract through validation with frontmatter, routing, YAML workflow, and presentation verification

# ─────────────────────────────────────────────────────────────────
# PREREQUISITE: CREATE-COMMAND PACKET VERIFICATION
# ─────────────────────────────────────────────────────────────────
# This workflow REQUIRES the sk-doc create-command packet for:
#   • Command invocation and path rules
#   • Argument-hint and allowed-tools standards
#   • Router/presentation separation
#   • Canonical command and presentation templates
#
# PHASE 0 in the presentation contract verifies packet resources BEFORE
# this YAML workflow loads. If you're executing this workflow,
# create-command verification has already passed.
#
# To invoke correctly: /create:command <command-invocation>
# ─────────────────────────────────────────────────────────────────

operating_mode:
  workflow: sequential_6_step
  workflow_compliance: MANDATORY
  workflow_execution: interactive
  approvals: step_by_step
  tracking: progressive_task_checklists
  validation: checkpoint_based_with_structural_validation
  permission_configuration: least_privilege_allowed_tools
  description: |
    Executes the 6-step command authoring workflow with approval gates at each checkpoint.
    User confirms, reviews, or modifies at each step before the workflow advances.

development_philosophy:
  principle: "Resolve invocation and repeatable workflow before writing files"
  approach: "Understand → Plan → Generate → Validate"
  mandate: "Command contract first, then routing assets, then presentation text"

runtime_command_path_resolution:
  root_command: .opencode/commands/[command].md
  namespace_command: .opencode/commands/[namespace]/[action].md
  split_assets: .opencode/commands/[namespace]/assets/[namespace]_[action]_[kind]

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with citable source" }
    medium: { range: "40-79%", action: "Proceed with caution, document assumptions" }
    low: { range: "0-39%", action: "STOP - Ask clarification with A/B/C options" }

  scoring_weights:
    invocation_clarity: 0.30
    workflow_specificity: 0.25
    tool_permission_clarity: 0.25
    presentation_boundary_defined: 0.20

  clarification_format: |
    "I need clarity (confidence: [NN%]). Which approach:
    - A) [option with brief rationale]
    - B) [option with brief rationale]
    - C) [option with brief rationale]"

  escalation:
    timebox_minutes: 10
    failed_attempts_threshold: 2
    action: "Present options to user with current findings"

# ─────────────────────────────────────────────────────────────────
# REQUEST ANALYSIS FRAMEWORK
# ─────────────────────────────────────────────────────────────────
request_analysis_framework:
  code_search_note: "Use Grep/Glob for existing command files and direct Read for exact contents. memory_search is for spec docs/memory, not arbitrary code."
  solution_flow:
  - "Parse carefully: What slash command is ACTUALLY requested?"
  - "Gather Context: Read target packet resources and nearby commands"
  - "Identify Approach: SIMPLEST command set that matches the workflow"
  - "Validate Choice: Follow create-command packet patterns"
  - "Clarify If Needed: If <80% confidence, ask"
  - "Scope Check: Solving ONLY what was asked?"
  - "Execute: Implement with minimal complexity"

  pre_change_validation:
    items:
    - "Command invocation format validated? (/name or /namespace:action)"
    - "Command output paths confirmed?"
    - "Spec folder created or selected?"
    - "Workflow purpose and inputs gathered?"
    - "Confidence >=80%? (if not: ask)"
    stop_conditions: [ "Any item unchecked", "No spec folder" ]
    stop_action: "STOP and address before proceeding"

# ─────────────────────────────────────────────────────────────────
# USER INPUTS (From gate outputs)
# ─────────────────────────────────────────────────────────────────
user_inputs:
  command_invocation: |
    [COMMAND_INVOCATION]
    Slash command invocation, either /command or /namespace:action.
    FROM UNIFIED SETUP PHASE (Q0 or command argument).

  command_path: |
    [COMMAND_PATH]
    Output router path derived from command_invocation.
    FROM UNIFIED SETUP PHASE (derived path or explicit --path override).

  spec_path: |
    [SPEC_PATH]
    Spec folder for tracking this work.
    FROM UNIFIED SETUP PHASE (Q1 choice A/B/C/D).

  memory_loaded: |
    [MEMORY_LOADED]
    Whether previous context was loaded.
    FROM UNIFIED SETUP PHASE (Q3 if applicable).

# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  command_invocation:
    validation: "must start with /; root commands use lowercase hyphen-case; namespace commands use /namespace:action"
    required: true

  command_package_shape:
    validation: "must be split_4_file_set for this workflow"
    default: "split_4_file_set"
    note: "Creates router .md plus _auto.yaml, _confirm.yaml, and _presentation.txt assets"

  defaults:
    commands_root: ".opencode/commands/"
    execution_mode: "confirm_when_omitted"
    spec_path_from_phase: "FROM USER CHOICE IN SETUP PHASE"

input_contract:
  required:
    - create_command_verified
    - command_invocation
    - command_path
    - spec_path
  optional:
    - memory_loaded
    - command_package_shape

# ─────────────────────────────────────────────────────────────────
# DOCUMENTATION LEVEL
# ─────────────────────────────────────────────────────────────────
documentation_level:
  default: "Level 1 (Baseline)"
  required_files:
  - spec.md
  - plan.md
  - tasks.md
  note: "Command creation typically Level 1 unless destructive behavior, broad routing, or multi-command orchestration increases risk"

# ─────────────────────────────────────────────────────────────────
# COMMAND CREATION TEMPLATES
# ─────────────────────────────────────────────────────────────────
command_templates:
  command_markdown: .opencode/skills/sk-doc/create-command/assets/command/command_template.md
  presentation_contract: .opencode/skills/sk-doc/create-command/assets/command/command_presentation_template.md

command_scripts:
  packet_local: "No packet-local scripts are wired; follow create-command/SKILL.md validation instructions."

command_references:
  command_creation: .opencode/skills/sk-doc/create-command/SKILL.md
  route_map: .opencode/skills/sk-doc/create-command/references/README.md
  worked_example: .opencode/skills/sk-doc/create-command/references/worked_example.md
  router_presentation_split: .opencode/skills/sk-doc/create-command/references/router_presentation_split.md
  argument_hints_and_modes: .opencode/skills/sk-doc/create-command/references/argument_hints_and_modes.md
  common_pitfalls: .opencode/skills/sk-doc/create-command/references/common_pitfalls.md

# ─────────────────────────────────────────────────────────────────
# CHECKPOINT OPTIONS
# ─────────────────────────────────────────────────────────────────
checkpoint_options:
  standard:
  - label: "Approve"
    description: "Approve and continue to next step"
  - label: "Review"
    description: "Show more details"
  - label: "Modify"
    description: "Make changes before proceeding"
  - label: "Skip"
    description: "Skip this step only when marked optional"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW ENFORCEMENT (CRITICAL)
# ─────────────────────────────────────────────────────────────────
workflow_enforcement:
  mode: strict
  step_order: sequential_mandatory
  skip_allowed: false

  phase_gate:
    location: "Between Step 2 and Step 3"
    purpose: "Verify command contract complete before package planning"
    requirements:
    - "Invocation and output paths clearly defined"
    - "Repeatable command workflow captured"
    - "Tool and presentation boundaries documented"
    action_if_failed: "STOP and return to incomplete step"

  critical_steps:
    step_2_understanding:
      enforcement: "MUST gather purpose, inputs, modes, tools, and safety boundaries"
      verification: "Cannot proceed without user confirmation of command contract"
    step_3_planning:
      enforcement: "MUST define frontmatter, routing assets, and presentation boundary"
      verification: "All command package decisions documented and approved"
    step_4_generation:
      enforcement: "MUST use create-command templates and real resource paths"
      verification: "Router is thin; assets own workflow and presentation"
    step_5_validation:
      enforcement: "MUST run structural and path validation"
      verification: "Frontmatter parses, assets exist, and no placeholders remain"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW (6 STEPS WITH CHECKPOINTS)
# ─────────────────────────────────────────────────────────────────
gate_logic:
  hard:
    H0_create_command_verified:
      description: "create-command packet verification must have passed in Phase 0"
      fail_action: "STOP and return to the command setup phase"
    H1_required_fields:
      description: "Required setup fields must be present before generation"
      fail_action: "STOP and collect missing inputs"
    H2_generation_contract:
      description: "Generated command set must follow the create-command template and router/presentation contract"
      fail_action: "Fix the generated output before continuing"
  soft:
    S1_existing_command:
      description: "Warn when a command already exists at the target path"
      fail_action: "Proceed only after explicit update intent"

workflow_overview:
  steps:
    - id: step_1_request_analysis
      purpose: "Normalize inputs, validate invocation, and resolve output paths"
    - id: step_2_understanding
      purpose: "Capture the command purpose, workflow, inputs, tools, and boundaries"
    - id: step_3_planning
      purpose: "Define frontmatter, routing assets, mode behavior, and presentation boundary"
    - id: step_4_generation
      purpose: "Generate the command 4-file set from canonical templates"
    - id: step_5_validation
      purpose: "Validate frontmatter, YAML, paths, placeholders, and router thinness"
    - id: step_6_save_context
      purpose: "Persist spec context and emit completion status"

workflow:
  # ═══════════════════════════════════════════════════════════════
  # PHASE A: PLANNING (Steps 1-3)
  # ═══════════════════════════════════════════════════════════════

  step_1_request_analysis:
    purpose: Parse inputs and validate command invocation (from UNIFIED SETUP PHASE)
    activities:
    - Confirm command_invocation from UNIFIED SETUP PHASE (Q0 or argument)
    - Derive command_path from command_invocation unless explicit path is provided
    - Confirm spec_path from UNIFIED SETUP PHASE (Q1 choice A/B/C/D)
    - Confirm memory_loaded from UNIFIED SETUP PHASE (Q3 if applicable)
    - Verify command invocation format and path mapping
    - Check if command router or owned assets already exist at target paths
    validation:
      invocation_format: "root /command or namespace /namespace:action"
      check_exists: true
      command: "ls [command_path] 2>/dev/null"
    outputs:
    - command_invocation_validated
    - command_path_confirmed
    - command_exists_check
    checkpoint:
      question: "Creating command '[command-invocation]' at [command-path]. Proceed?"
      options:
      - label: "A) Proceed"
        description: "Create or update command with these settings"
      - label: "B) Change invocation"
        description: "Use a different command invocation"
      - label: "C) Change output path"
        description: "Use a different command path"

  step_1b_command_discovery:
    purpose: Search for similar existing commands before creating or updating (MANDATORY)
    gate_type: SOFT_BLOCK
    enforcement: "Warn if similar command exists, allow user override"
    activities:
    - "Use Glob to list .opencode/commands/**/*.md"
    - "Use Grep to search for matching invocation names, descriptions, and workflow phrases"
    - "Read exact matches and nearby namespace commands before planning"
    validation:
      similar_exists_threshold: "same invocation, same namespace/action, or significant description overlap"
      action_if_found: "SOFT_BLOCK - Present findings to user"
    outputs:
    - similar_commands_found: list_of_matching_commands
    - reusable_patterns: patterns_to_consider
    - proceed_recommendation: boolean
    checkpoint:
      condition: "similar_commands_found.length > 0"
      question: "Found similar command(s): [command_names]. Continue creating or updating this command?"
      options:
      - label: "A) Proceed anyway"
        description: "Continue despite similar existing command"
      - label: "B) Review existing first"
        description: "Load and review the similar command before deciding"
      - label: "C) Abort"
        description: "Cancel command creation"
    skip_condition: "User explicitly skips discovery"

  step_1c_spec_folder_setup:
    purpose: Create documentation folder for tracking (if user chose B or C in Q1)
    condition: "spec_choice != D (Skip)"
    activities:
    - IF spec_choice == B (Create new):
      - Find next available spec number in the selected spec root
      - "Create folder: [spec-root]/[NNN]-[command-slug]/"
    - IF spec_choice == A or C (Use existing):
      - Use selected spec_path
    - "Create or update Level 1 spec.md, plan.md, and tasks.md through the active spec-folder workflow; do not wire non-target packet template paths here"
    outputs:
    - spec.md: created_or_updated
    - plan.md: created_or_updated
    - tasks.md: created_or_updated
    checkpoint:
      question: "Spec folder created/confirmed. Continue to command contract phase?"
      options: checkpoint_options.standard

  step_2_understanding:
    purpose: Gather command purpose, workflow, inputs, tools, and boundaries (CRITICAL - DO NOT SKIP)
    enforcement: MANDATORY
    activities:
    - Ask focused questions about the command's repeatable workflow
    - Gather invocation purpose and expected user inputs
    - Identify :auto and :confirm behavior
    - Define least-privilege allowed-tools
    - Identify visible prompts, dashboards, result templates, and next-step wording
    - Identify destructive or privileged actions and required safety gates
    questions:
    - "What should this slash command create, update, or route?"
    - "What arguments and modes should it accept?"
    - "Which tools does the workflow actually need?"
    - "What user-facing prompts and results must be separated into presentation?"
    outputs:
    - purpose_defined: "clear repeatable command workflow"
    - inputs_defined: "required arguments, optional flags, and modes"
    - tools_defined: "least-privilege allowed-tools list"
    - boundaries_defined: "router, YAML, and presentation ownership"
    validation: understanding_complete
    checkpoint:
      question: "I've identified: Purpose=[purpose], Inputs=[inputs], Tools=[tools]. Is this command contract correct?"
      options:
      - label: "A) Approve"
        description: "Command contract is correct"
      - label: "B) Add more"
        description: "Add additional workflow details"
      - label: "C) Modify"
        description: "Change existing command contract"

  # ═══════════════════════════════════════════════════════════════
  # 🔒 PHASE GATE: UNDERSTANDING → CONFIGURATION
  # ═══════════════════════════════════════════════════════════════
  phase_gate_understanding_to_configuration:
    trigger: "After Step 2 completes"
    enforcement: HARD_BLOCK
    verification: |
      BEFORE proceeding to Configuration Phase (Step 3):

      VERIFY all understanding artifacts exist:
      ├─ [ ] Invocation and output path clearly defined
      ├─ [ ] Repeatable workflow purpose captured
      ├─ [ ] Required arguments, modes, and tools documented
      ├─ [ ] Router/YAML/presentation boundaries identified

      IF any artifact missing:
      └─ STOP → Return to Step 2 → Complete it → Return here

      WHEN all artifacts verified:
      └─ SET PHASE GATE STATUS: PASSED → Proceed to Step 3
    action_if_failed: "Return to incomplete step"

  # ═══════════════════════════════════════════════════════════════
  # PHASE B: IMPLEMENTATION (Steps 3-6)
  # ═══════════════════════════════════════════════════════════════

  step_3_planning:
    purpose: Define command package, frontmatter, routing assets, and behavioral rules
    activities:
    - Confirm split 4-file package shape for workflow-backed command creation
    - Define router frontmatter: description, argument-hint, allowed-tools
    - Define asset paths for _auto.yaml, _confirm.yaml, and _presentation.txt
    - Define :auto and :confirm behavior; confirm must equal auto plus checkpoints
    - Define presentation sections for prompts, dashboard, result, and failure display
    - Plan validation commands and grep checks
    outputs:
    - command_package_selected
    - frontmatter_configured
    - routing_assets_defined
    - presentation_boundary_defined
    - validation_plan_defined
    validation: configuration_planned
    checkpoint:
      question: "Configuration: Package=[package], Allowed Tools=[tools], Assets=[paths]. Approve?"
      options:
      - label: "A) Approve"
        description: "Configuration is correct"
      - label: "B) Modify tools"
        description: "Adjust allowed-tools"
      - label: "C) Modify assets"
        description: "Adjust command asset plan"

  step_4_generation:
    purpose: Create command 4-file set with router markdown, workflow YAML, and presentation contract
    activities:
    - Load command_template.md for command structure reference
    - Load command_presentation_template.md for presentation structure reference
    - Generate thin router markdown with asset table, execution order, routing rules, and presentation boundary
    - Generate _auto.yaml with the workflow steps and no user approval checkpoints
    - Generate _confirm.yaml with the same workflow plus checkpoint blocks
    - Generate _presentation.txt with startup, setup, dashboard, completion, and failure displays
    - Write files to the resolved command paths
    - Verify each file exists and is readable
    outputs:
    - router_file_created
    - auto_yaml_created
    - confirm_yaml_created
    - presentation_file_created
    validation: files_created
    checkpoint:
      question: "Command files generated. Review before validation?"
      options:
      - label: "A) Show router"
        description: "Display router markdown summary"
      - label: "B) Show assets"
        description: "Display YAML and presentation summaries"
      - label: "C) Proceed"
        description: "Continue to validation"

  step_5_validation:
    purpose: Frontmatter, YAML, path, structure, and leftover-source validation
    enforcement: HARD_BLOCK
    activities:
    - Parse router frontmatter and verify required fields
    - Parse _auto.yaml and _confirm.yaml as YAML when parser is available
    - Verify all resource paths referenced in workflow assets exist on disk
    - Verify confirm workflow mirrors auto workflow except checkpoint blocks and interactive execution settings
    - Verify router stays thin and presentation owns visible templates
    - Run validate_document.py if available
    - Grep generated files for copied source workflow names
    - IF validation fails: Fix issues and re-run
    - Repeat until passing
    outputs:
    - frontmatter_validation_result: pass_or_fail
    - yaml_validation_result: pass_or_fail
    - path_validation_result: pass_or_fail
    - leftover_source_check: pass_or_fail
    validation: command_set_valid
    checkpoint:
      question: "Validation complete. [PASS/FAIL]. Proceed?"
      options:
      - label: "A) Continue to save context"
        description: "Validation passed, finalize command"
      - label: "B) Review errors"
        description: "Show detailed validation errors"
      - label: "C) Fix issues"
        description: "Address validation failures and revalidate"

  step_5b_quality_validation:
    purpose: Quality-validate the created command artifact set
    activities:
    - "Run command structural validation against the router markdown"
    - "Validate frontmatter description budget and allowed-tools accuracy"
    - "Review router/presentation split against create-command references"
    - "Confirm the output package has exactly the expected owned files"
    on_low_score:
      threshold: 70
      action: "Log warnings and suggest improvements; do not block workflow unless structural rules fail"
    outputs:
    - quality_score: number
    - validation_findings: list
    - improvement_suggestions: list (if score < 70)
    - description_length_warnings: list
    checkpoint:
      question: "Quality validation complete (score: [quality_score]/100). Continue?"
      options:
      - label: "A) Accept and continue"
        description: "Proceed to save context"
      - label: "B) View findings"
        description: "Show detailed review findings"
      - label: "C) Address issues"
        description: "Fix issues before continuing"

  step_6_save_context:
    purpose: Preserve workflow decisions and context
    condition: "spec_path is not null"
    activities:
    - Invoke system-spec-kit skill
    - Document command creation decisions
    - Record routing, frontmatter, tools, and presentation-boundary rationale
    - Save validation results
    - Update canonical spec documents
    - Index canonical spec document for immediate search availability
    outputs:
    - implementation_summary: "[spec_path]/implementation-summary.md"
    validation: context_saved
    checkpoint:
      question: "Context saved. Command creation complete!"
      options:
      - label: "Done"
        description: "Complete workflow"
      - label: "View summary"
        description: "Show final summary"

# ─────────────────────────────────────────────────────────────────
# CIRCUIT BREAKER
# ─────────────────────────────────────────────────────────────────
circuit_breaker:
  consecutive_failure_threshold: 3
  states:
    closed: "Normal operation"
    open: "3+ failures — pause and report to user"
    half_open: "Test with single retry before resuming"
  on_open:
    action: "Report failures to user with summary"
    suggest: "Review inputs and try again, or escalate"

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY
# ─────────────────────────────────────────────────────────────────
error_recovery:
  invalid_command_invocation:
    action: "Show valid format (/command or /namespace:action), prompt for correction"
    example: "Expected: /create:thing or /memory-save"
  command_already_exists:
    action: "Offer to update existing or choose a new invocation"
    options: [ "Update existing", "Choose new invocation", "Cancel" ]
  yaml_parse_error:
    action: "Check workflow asset syntax, fix and re-validate"
    common_issues:
    - "Missing colon after field name"
    - "Incorrect indentation (use 2 spaces)"
    - "Unquoted strings with special characters"
    - "Invalid block scalar indentation"
  missing_required_field:
    action: "Add the missing router frontmatter or workflow field and re-validate"
    required_fields: [ "description", "argument-hint", "allowed-tools" ]
  missing_resource_path:
    action: "Remove fabricated path or replace with a verified on-disk path"
  presentation_boundary_violation:
    action: "Move prompts, dashboards, results, and next-step text from router into presentation asset"

# ─────────────────────────────────────────────────────────────────
# INTERACTIVE EXECUTION
# ─────────────────────────────────────────────────────────────────
interactive_execution:
  principle: "Execute workflow steps with user approval at each checkpoint"
  user_feedback_handling:
    approve: "Continue to next step"
    review: "Show detailed output before proceeding"
    modify: "Apply requested changes and re-validate"
    skip: "Mark step as skipped with reason only when optional, continue"

# ─────────────────────────────────────────────────────────────────
# QUALITY STANDARDS
# ─────────────────────────────────────────────────────────────────
quality_standards:
  frontmatter_validation: MANDATORY
  yaml_validation: MANDATORY
  router_presentation_separation: MANDATORY
  validation_pipeline:
    stage_1: "Router frontmatter parsing"
    stage_2: "Required field check (description, argument-hint, allowed-tools)"
    stage_3: "YAML workflow asset parsing"
    stage_4: "Resource path existence check"
    stage_5: "Leftover source-name grep"
  template_adherence: required
  core_standards_reference: ".opencode/skills/sk-doc/create-command/SKILL.md"

# ─────────────────────────────────────────────────────────────────
# COMPLETION REPORT TEMPLATE
# ─────────────────────────────────────────────────────────────────
completion_report:
  template: |
    Command Creation Complete

    Command: [command-invocation]
    Router: [command-path]
    Assets:
    - Auto workflow: [auto-yaml-path]
    - Confirm workflow: [confirm-yaml-path]
    - Presentation: [presentation-path]

    Configuration:
    - Allowed Tools: [allowed-tools]
    - Modes: :auto and :confirm
    - Router Boundary: thin router verified

    Spec Folder: [spec path or none]
    Memory: [saved/indexed/not applicable]

    Validation:
    - Router frontmatter: PASSED
    - YAML workflows: PASSED
    - Resource paths: PASSED
    - Source leftovers: PASSED

    Invocation:
    - Type [command-invocation] [arguments]
    - Add :auto for autonomous execution
    - Add :confirm for checkpointed execution

    Next Steps:
    - Run the command with a small sample request
    - Review generated prompts and result displays
    - Tighten allowed-tools if validation finds unused tools

    STATUS=OK PATH=[command-path]

# ─────────────────────────────────────────────────────────────────
# TERMINATION
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: step_6_save_context
  message: "Command creation workflow complete."
  next_steps:
    - condition: "Command needs testing"
      action: "Run with a sample request matching the intended workflow"
    - condition: "Command needs refinement"
      action: "Iterate on prompts, routing, or allowed-tools based on testing"
    - condition: "Context should be saved"
      action: "Run /memory:save"

# ─────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────
rules:
  ALWAYS:
    - "Copy templates from canonical paths, never create from memory"
    - "Run structural validation before claiming completion"
    - "Pause at checkpoints for user approval"
    - "Respect user feedback and modification requests"
    - "Reference core_standards.md for formatting rules"
    - "Validate workflow YAML syntax when parser support is available"
    - "Keep routers thin when presentation assets exist"
    - "Save context after successful completion when a spec path is present"
  NEVER:
    - "Skip validation steps"
    - "Create documents without loading templates first"
    - "Proceed without user approval at checkpoints"
    - "Leave placeholder text in final output"
    - "Invent template, script, or reference paths"
    - "Ignore YAML parse errors"
    - "Put presentation templates inside the router"
