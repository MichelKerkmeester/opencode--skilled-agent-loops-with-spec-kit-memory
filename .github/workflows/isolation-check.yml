name: Isolation Check
on:
  pull_request:
    branches: [main]
    paths:
      - '.opencode/skills/system-spec-kit/mcp-server/**'
      - '.opencode/skills/system-spec-kit/shared/**'

jobs:
  no-cross-skill-imports:
    name: No cross-skill imports from spec-kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Audit spec-kit MCP source for system-code-graph imports
        run: |
          set -euo pipefail
          # Fail if any TS/JS source file in spec-kit MCP server imports from system-code-graph.
          # The /dist/ directory is excluded (stale compiled output regenerates on next tsc).
          # The test/stress files are also excluded because they may mock the boundary.
          MATCHES=$(rg -n "from ['\"]?.*system-code-graph" \
            .opencode/skills/system-spec-kit/mcp-server/ \
            --type ts --type js \
            --glob '!**/dist/**' \
            --glob '!**/node_modules/**' \
            --glob '!**/tests/**' \
            --glob '!**/stress-test/**' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Cross-skill imports detected in spec-kit/mcp-server/."
            echo "$MATCHES"
            echo ""
            echo "Per the 015 isolation arc + 018 remediation, spec-kit MUST NOT import from system-code-graph at the TypeScript source level."
            echo "Use the boundary wrapper (mcp-server/lib/code-graph-boundary.ts) or @spec-kit/shared types instead."
            exit 1
          fi
          echo "✅ No cross-skill imports found."
      # TODO(packet 040 or follow-on): flip to blocking once full decoupling lands.
      - name: Audit code-graph MCP source for system-spec-kit imports (reverse direction)
        run: |
          set -euo pipefail
          # Audit code-graph MCP source for system-spec-kit imports.
          # Blocking: code-graph MUST NOT import from system-spec-kit after Path-1 isolation refactor.
          # Only production source files are checked; tests and stress_test are excluded.
          MATCHES=$(rg -n "from ['\"][^'\"]*system-spec-kit" \
            .opencode/skills/system-code-graph/mcp-server/ \
            --type ts \
            --glob '!**/dist/**' \
            --glob '!**/node_modules/**' \
            --glob '!**/tests/**' \
            --glob '!**/stress-test/**' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Cross-skill imports detected in code-graph/mcp-server/ (reverse direction)."
            echo "$MATCHES"
            echo ""
            echo "Per the Path-1 isolation refactor, system-code-graph MUST NOT import from system-spec-kit at the TypeScript source level."
            echo "Use the local utility copies under lib/shared/ instead."
            exit 1
          fi
          echo "✅ No reverse-direction cross-skill imports found."
      - name: Audit skill-advisor MCP source for system-spec-kit imports (reverse direction)
        run: |
          set -euo pipefail
          MATCHES=$(rg -n "from ['\"][^'\"]*system-spec-kit" \
            .opencode/skills/system-skill-advisor/mcp-server/ \
            --type ts \
            --glob '!**/dist/**' \
            --glob '!**/node_modules/**' \
            --glob '!**/tests/**' \
            --glob '!**/stress-test/**' \
            --glob '!**/lib/shared/embeddings/**' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Cross-skill imports detected in skill-advisor/mcp-server/ (reverse direction)."
            echo "$MATCHES"
            echo ""
            echo "Per the three-way-isolation contract (packet 040), system-skill-advisor MUST NOT"
            echo "import from system-spec-kit at the TypeScript source level."
            echo "Use the local utility copies under lib/shared/ instead."
            echo "Exception: lib/shared/embeddings/ is an intentional symlink to system-spec-kit/"
            echo "shared/embeddings/ — visible cross-skill marker per user direction."
            exit 1
          fi
          echo "✅ No reverse-direction cross-skill imports in skill-advisor."
      - name: Audit skill-advisor for @spec-kit/* workspace-alias imports
        run: |
          set -euo pipefail
          # @spec-kit/shared/embeddings/* is the documented exception (visible via the
          # lib/shared/embeddings symlink). All other @spec-kit/* imports are blocked.
          MATCHES=$(rg -n "from ['\"]@spec-kit/" \
            .opencode/skills/system-skill-advisor/mcp-server/ \
            --type ts \
            --glob '!**/dist/**' \
            --glob '!**/node_modules/**' \
            --glob '!**/tests/**' \
            --glob '!**/stress-test/**' \
            | grep -v "@spec-kit/shared/embeddings/" \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::@spec-kit/* workspace-alias imports detected in skill-advisor production .ts (excluding the documented embeddings exception)."
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ No @spec-kit/* workspace-alias imports in skill-advisor (embeddings exception OK)."
      - name: Audit code-graph for @spec-kit/* workspace-alias imports
        run: |
          set -euo pipefail
          MATCHES=$(rg -n "from ['\"]@spec-kit/" \
            .opencode/skills/system-code-graph/mcp-server/ \
            --type ts \
            --glob '!**/dist/**' \
            --glob '!**/node_modules/**' \
            --glob '!**/tests/**' \
            --glob '!**/stress-test/**' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::@spec-kit/* workspace-alias imports detected in code-graph production .ts."
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ No @spec-kit/* workspace-alias imports in code-graph."
      - name: Audit spec-kit MCP source for system-skill-advisor imports
        run: |
          set -euo pipefail
          MATCHES=$(rg -n "from ['\"]?.*system-skill-advisor" \
            .opencode/skills/system-spec-kit/mcp-server/ \
            --type ts --type js \
            --glob '!**/dist/**' \
            --glob '!**/node_modules/**' \
            --glob '!**/tests/**' \
            --glob '!**/stress-test/**' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Cross-skill imports detected in spec-kit/mcp-server/."
            echo "$MATCHES"
            echo ""
            echo "Per the 016 isolation arc, spec-kit MUST NOT import from system-skill-advisor at the TypeScript source level."
            exit 1
          fi
          echo "✅ No skill-advisor imports found."
