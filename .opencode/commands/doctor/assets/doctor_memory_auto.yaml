# ─────────────────────────────────────────────────────────────────
# DOCTOR: MEMORY CONTINUITY-INDEX WORKFLOW (AUTONOMOUS DIAGNOSTIC MODE)
# ─────────────────────────────────────────────────────────────────
role: Expert Operator running memory continuity-index diagnostics in autonomous mode
purpose: Read-only health check + drift detection. No mutations. Report goes to packet-local scratch.
action: Discovery → analysis → drift classification → recommendation → state log

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: sequential
  compliance: MANDATORY
  execution: autonomous
  approvals: none
  tracking: phase_by_phase
  validation: continuous_self_validation
  intent: DIAGNOSE  # never APPLY in this YAML

memory_doctor_philosophy:
  principle: "Detect drift before it breaks memory_search; never mutate without explicit :apply mode"
  approach: "Read memory_health + memory_stats → classify drift signals → emit recommendations"
  mandate: "Mutations are forbidden in :auto. Apply mode lives in doctor_memory_apply.yaml."

# ─────────────────────────────────────────────────────────────────
# USER INPUTS (passed from Markdown setup phase)
# ─────────────────────────────────────────────────────────────────
user_inputs:
  execution_mode: "[EXECUTION_MODE] - AUTONOMOUS (this YAML)"
  intent: "[INTENT] - DIAGNOSE (this YAML)"
  incremental: "[INCREMENTAL] - true|false (informational; no rebuild in :auto)"

# ─────────────────────────────────────────────────────────────────
# MUTATION BOUNDARIES (READ-ONLY)
# ─────────────────────────────────────────────────────────────────
mutation_boundaries:
  allowed_targets:
    - "<packet_scratch>/doctor-memory-report.md  # report-only, packet-local"
  forbidden_targets:
    - ".opencode/skills/system-spec-kit/mcp_server/database/*.sqlite"
    - ".opencode/skills/system-spec-kit/mcp_server/database/*.sqlite-wal"
    - ".opencode/skills/system-spec-kit/mcp_server/database/*.sqlite-shm"
    - "Any spec folder doc (*.md, *.json)"
    - "Any skill SKILL.md or graph-metadata.json"
  enforcement: ":auto mode is READ-ONLY by contract. No mutation phases exist in this YAML. Any attempted write to a forbidden_target halts with STATUS=FAIL and ERROR='auto-mode-mutation-violation'."

# ─────────────────────────────────────────────────────────────────
# STALENESS SIGNALS
# ─────────────────────────────────────────────────────────────────
staleness_signals:
  embedding_drift:
    detection: "memory_health reports `embedding_health: degraded` OR records with `last_indexed_at` older than source file mtime"
    severity: medium
  fts_miss:
    detection: "memory_health reports `fts_health: degraded` OR new spec-doc files not in FTS index"
    severity: medium
  chunk_boundary_drift:
    detection: "Anchors moved or sections renumbered since last index"
    severity: low
  trigger_phrase_drift:
    detection: "Frontmatter trigger_phrases updated but indexed alias rows stale"
    severity: low
  embedding_provider_change:
    detection: "Vector DB rows with old provider id (voyage-2 vs voyage-4)"
    severity: high
  divergent_alias_groups:
    detection: "Same canonical name routed to different record IDs"
    severity: high

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_0_discovery:
    purpose: Probe memory_health + memory_stats; capture baseline
    activities:
      - "Run: memory_health({reportMode: 'full'})"
      - "Run: memory_stats({})"
      - "Bash: stat -f '%m %z' database/context-index.sqlite (mtime + size)"
      - "Bash: stat -f '%m %z' database/context-index__voyage__voyage-4__1024.sqlite"
    outputs:
      - total_records: N
      - last_index_at: ISO_timestamp
      - fts_health: ok|degraded|missing
      - embedding_health: ok|degraded|missing
      - context_index_size: bytes
      - voyage_db_size: bytes
      - context_index_mtime: epoch_seconds
    validation: discovery_complete
    fail_fast:
      - "memory_health returns error → STATUS=FAIL with diagnostic"
      - "Database file missing → STATUS=DEGRADED, message='index not initialized'"

  phase_1_analysis:
    purpose: Classify drift signals + identify suspect records
    activities:
      - "Cross-reference memory_health output with mtime: any spec-doc file with mtime > last_index_at signals staleness"
      - "Sample up to 5 records flagged as drift candidates"
      - "Run memory_drift_why per sampled record (read-only)"
      - "Aggregate drift signals into drift_classes count map"
    outputs:
      - drift_classes:
          embedding_drift: N
          fts_miss: M
          chunk_boundary_drift: K
          trigger_phrase_drift: L
          embedding_provider_change: P
          divergent_alias_groups: Q
      - sample_drift_explanations: [up to 5 entries]
      - severity_max: low|medium|high
    validation: analysis_complete

  phase_2_recommendation:
    purpose: Translate drift signals into recommended action
    rules:
      - "If severity_max == high (provider change OR divergent aliases) → recommend :apply --incremental=false"
      - "If severity_max == medium (embedding OR fts drift) → recommend :apply --incremental=true"
      - "If severity_max == low (boundary OR trigger drift) → recommend monitoring; rerun in 1-2 weeks"
      - "If no drift → status=OK, no action needed"
    outputs:
      - status: OK|DEGRADED|STALE|MISSING
      - recommended_command: string
      - recommended_when: now|low-activity-window|monitor

  phase_3_report:
    purpose: Emit packet-local report + state log
    activities:
      - "Compose report following OUTPUT CONTRACT in memory.md"
      - "Write to <packet_scratch>/doctor-memory-report.<timestamp>.md"
      - "Print summary table to stdout"
    outputs:
      - report_path: string
      - status: STATUS_OK | STATUS_DEGRADED | STATUS_STALE | STATUS_MISSING
    validation: report_emitted

# ─────────────────────────────────────────────────────────────────
# OUTPUT CONTRACT
# ─────────────────────────────────────────────────────────────────
output_contract:
  format: markdown
  required_sections:
    - status_header
    - database_state_table
    - drift_signals_block
    - recommendation_block
  optional_sections:
    - sample_drift_explanations
  state_log:
    path: "<packet_scratch>/doctor-memory-state.<timestamp>.json"
    schema:
      command: "/doctor:memory:auto"
      mode: AUTONOMOUS
      intent: DIAGNOSE
      timestamp: ISO_8601
      duration_seconds: number
      status: OK|DEGRADED|STALE|MISSING|FAIL
      drift_classes: object
      recommendation: string

# ─────────────────────────────────────────────────────────────────
# HALT CONDITIONS
# ─────────────────────────────────────────────────────────────────
halt_conditions:
  - "Phase 0 fails to read memory_health (MCP unavailable) → STATUS=FAIL"
  - "Database files missing entirely → STATUS=MISSING (not FAIL); recommend :apply to bootstrap"
  - "Any phase emits a write attempt → STATUS=FAIL with ERROR='auto-mode-mutation-violation'"

# ─────────────────────────────────────────────────────────────────
# RELATED YAML
# ─────────────────────────────────────────────────────────────────
related:
  confirm: "doctor_memory_confirm.yaml (interactive review of same diagnostic flow)"
  apply: "doctor_memory_apply.yaml (autonomous rebuild with snapshot)"
  apply_confirm: "doctor_memory_apply-confirm.yaml (interactive rebuild)"
