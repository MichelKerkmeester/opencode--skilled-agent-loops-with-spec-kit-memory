# -----------------------------------------------------------------------------
# Phase-5 Augmentation (RESERVED) - populated after step 5b merge.
# Each entry = one novel logic gap surfaced by the deep-research iterations that
# is NOT already in spec.md or audit-findings.jsonl. If 10 iterations converge
# with no novel gaps, record a single entry noting the empty result.
# -----------------------------------------------------------------------------
phase5_augmentation:
  meta:
    loop: "10-cap deep-research; converged at iter 7 (adjudication) after full surface coverage"
    executor: "cli-devin swe-1.6 (read-only research-iter recipe)"
    iterations_run: 7   # 6 breadth + 1 adjudication
    verified_verdict: "0 P0, 5 P1, 1 P2 (by-design)"
    summary_doc: "research/convergence-summary.md"
    state_log: "research/deep-research-state.jsonl"
    note: "All 6 gaps are NOVEL (none in spec.md or audit-findings.jsonl, which were doc-conformance). LG-0001 downgraded P0->P1 by orchestrator verification."
  gaps:
    - gap_id: LG-0001
      severity: P1
      class: doc-vs-code
      source_iter: iteration-01
      description: "SKILL.md §6 Dimension Trajectory claimed a +/-2 tolerance band, but reduce-state.cjs:767-770 implements exact-equality plateau (last 3 scores identical), matching the README. Doc inaccuracy, not a runtime bug (downgraded from Devin's P0)."
      disposition: FIXED
      fix: "SKILL.md §6 reworded to exact-repeat; if a +/-2 tolerance was intended per the ADR-003 design note, that is a code feature escalated as a follow-on."
    - gap_id: LG-0002
      severity: P1
      class: doc-gap
      source_iter: iteration-01
      description: "reduce-state.cjs:732-745 stop counters (maxConsecutiveTies, maxInfraFailuresPerProfile, maxWeakBenchmarkRunsPerProfile) default to Infinity (no cap); SKILL.md §6 did not document this."
      disposition: FIXED
      fix: "SKILL.md §6 now documents the no-cap defaults and that only configured counters trigger blockedStop."
    - gap_id: LG-0003
      severity: P2
      class: by-design
      source_iter: iteration-01
      description: "score-candidate.cjs:604-628 evaluates promotion gates but only reports them; promote-candidate.cjs:243-247 enforces. Intentional scoring-reports / promotion-enforces separation."
      disposition: NO_ACTION
      fix: "By design (confirmed at adjudication). No change."
    - gap_id: LG-0004
      severity: P1
      class: config-drift
      source_iter: iteration-02
      description: "Three benchmark thresholds: generate-profile.cjs:270 requiredAggregateScore=75, benchmark-profiles/default.json:15 requiredAggregateScore=80, improvement_config.json:57 minimumAggregateScore=85 (docs/gate contract also 85). A candidate could pass benchmark at 75/80 but fail the 85 gate."
      disposition: ESCALATED
      fix: "Reconcile to one authoritative threshold in code/config. Out of packet scope (spec §3: no .cjs/config changes). Follow-on sub-task T120."
    - gap_id: LG-0005
      severity: P1
