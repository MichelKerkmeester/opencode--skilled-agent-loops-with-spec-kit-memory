description = "Analyze skills and optimize advisor scoring through the interactive confirm workflow."
prompt = "<!-- skill_agent: system-spec-kit -->\n\n> ⚠️ **EXECUTION PROTOCOL — READ FIRST**\n>\n> This command runs a structured YAML workflow. Do NOT dispatch agents from this document.\n>\n> **Ownership:** Markdown owns setup (resolves all inputs). YAML owns execution. Setup values resolved here are passed to the YAML workflow.\n>\n> **YOUR FIRST ACTION:**\n> 1. Run the unified setup phase in this Markdown entrypoint and resolve: `execution_mode`, `scope`, `skip_tests`, `dry_run`\n> 2. Load the corresponding YAML file from `assets/` only after all setup values are resolved:\n>    - Confirm: `doctor_skill-advisor.yaml`\n> 3. Execute the YAML workflow step by step using those resolved values\n>\n> All content below is reference context for the YAML workflow. Do not treat reference sections as direct instructions to execute.\n\n## CONSTRAINTS\n\n- **ONLY MODE ()**: this doctor command is always interactive by design; deleted mode suffixes are invalid.\n- **DO NOT** dispatch any agent from this document\n- **ALL** workflow execution happens through the YAML — this document is setup + reference only\n- **MARKDOWN OWNS SETUP**: resolve setup inputs here first, then hand off to YAML\n- **YAML START CONDITION**: do not load YAML until ALL required inputs are bound: `execution_mode`, `scope`, `skip_tests`, `dry_run`\n- **NO MUTATIONS** in confirm workflow without explicit user approval at each gate\n- **READ-ONLY DEFAULT** when `--dry-run` flag is present — propose only, never write\n\n> **Format:** `/doctor:skill-advisor` [flags]\n> Example: `/doctor:skill-advisor`\n\n## GATE 3 STATUS: EXEMPT\n\n| Aspect | Value |\n| ------ | ----- |\n| Location | `lib/scorer/lanes/explicit.ts`, `lib/scorer/lanes/lexical.ts`, `.opencode/skills/*/graph-metadata.json` |\n| Reason | Mutations target stable runtime configuration files, not a spec folder packet |\n| Alternative | Mutation boundaries validated by Phase 3 canonical-path validator (allowlist exact-match); rollback via per-run script generated by Phase 3 |\n\n---\n\n# SINGLE CONSOLIDATED PROMPT - ONE USER INTERACTION\n\nThis workflow gathers ALL inputs in ONE prompt. Only the suffix is supported; doctor commands are interactive by design.\n\n---\n\n## 0. UNIFIED SETUP PHASE\n\n**FIRST MESSAGE PROTOCOL**: This prompt MUST be your FIRST response when no mode suffix is given. No mutating tool calls before asking. Lightweight read-only discovery is allowed (skill list, graph status), then ask ALL questions immediately and wait.\n\n**STATUS: BLOCKED**\n\n```\nEXECUTE THIS SINGLE CONSOLIDATED PROMPT:\n\n1. CHECK mode suffix:\n   - default -> execution_mode = \"INTERACTIVE\", yaml = \"doctor_skill-advisor.yaml\"\n   - No suffix -> execution_mode = \"INTERACTIVE\", yaml = \"doctor_skill-advisor.yaml\" (confirm is the only supported mode)\n\n2. PARSE flags from $ARGUMENTS:\n   ├─ --skip-tests → skip_tests = TRUE (default FALSE)\n   ├─ --dry-run    → dry_run = TRUE (propose only, no writes)\n   ├─ --scope=X    → scope = X (default \"all\"; values: all|explicit|derived|lexical)\n   └─ Defaults: skip_tests=FALSE, dry_run=FALSE, scope=\"all\"\n\n3. Lightweight discovery (read-only):\n   - List skills: $ ls -d .opencode/skills/*/ 2>/dev/null\n   - Check graph status: skill_graph_status({})\n   - Store: skill_count = N, graph_health = healthy|stale|missing\n\n4. ASK with a single prompt only for unresolved flags:\n\n   Q1. Scope (always ask if not flagged):\n     A) all (default) - tune explicit + derived + lexical lanes\n     B) explicit - tune TOKEN_BOOSTS and PHRASE_BOOSTS only\n     C) derived - tune graph-metadata.json triggers/keywords only\n     D) lexical - tune CATEGORY_HINTS only\n\n   Q2. Test Suite (always ask if not flagged):\n     A) Run advisor tests after changes (default - 220+ tests, ~30s)\n     B) Skip tests (faster, but no regression check)\n\n   Q3. Dry Run (always ask if not flagged):\n     A) run changes (default)\n     B) Dry-run only (propose, show diff, do not write)\n\n   Reply format: \"A, A, A, A\" or \"B, all, A, B\"\n\n5. WAIT for user response (DO NOT PROCEED)\n\n6. Parse and store:\n   - execution_mode | scope | skip_tests | dry_run\n\n7. SET STATUS: PASSED\n\nDO NOT proceed until user explicitly answers\nNEVER mutate scoring files without scope confirmation\nNEVER split questions into multiple prompts\n```\n\n**Phase Output:**\n- `execution_mode` | `scope` | `skip_tests` | `dry_run` | `skill_count` | `graph_health`\n\n---\n\n# SpecKit Skill Advisor\n\nInteractively analyze all skills in the repo, propose optimized scoring (TOKEN_BOOSTS, PHRASE_BOOSTS, graph-metadata triggers/keywords, CATEGORY_HINTS), run approved changes, re-index the skill graph, and validate with the advisor test suite.\n\n```yaml\nrole: Expert Operator running interactive skill-advisor optimization\npurpose: Analyze skill coverage, optimize scoring tables, re-index graph, validate\naction: Run 5-phase workflow from discovery through verification\n\noperating_mode:\n  workflow: sequential_5_phase\n  workflow_compliance: MANDATORY\n  workflow_execution: interactive\n  approvals: per_phase\n  tracking: phase_by_phase\n  validation: tests_pass_after_changes\n```\n\n---\n\n## 1. PURPOSE\n\nDeliver a guided optimization pass over the skill advisor scoring system without requiring users to know the internal scoring architecture. The command reads all skills from `.opencode/skills/*/SKILL.md`, current scoring source (`explicit.ts`, `lexical.ts`, `weights-config.ts`, `graph-metadata.json`), and detects coverage gaps. It proposes optimized trigger phrases, tokens, and phrase boosts; in confirm workflow the user approves each mutation; in confirm workflow it applies all proposals; then explicitly rebuilds via `advisor_rebuild({ force: true })` and validates with the advisor test suite. The rebuild tool is canonical at `.opencode/skills/system-spec-kit/mcp_server/skill_advisor/tools/advisor-rebuild.ts:8`.\n\n---\n\n## 2. USER INPUT\n\n```text\n$ARGUMENTS\n```\n\n---\n\n## 3. CONTRACT\n\n**Inputs:** `$ARGUMENTS` — Optional mode suffix and flags (no positional args required)\n**Outputs:** Updated scoring source files + refreshed `graph-metadata.json` files + re-indexed skill graph + test report + `STATUS=<OK|FAIL|CANCELLED>`\n\n---\n\n## 4. WORKFLOW OVERVIEW\n\n| Phase | Name      | Purpose                                          | Outputs                       |\n| ----- | --------- | ------------------------------------------------ | ----------------------------- |\n| 0     | Discovery | List skills, check graph health, detect repo context | discovery_report          |\n| 1     | Analysis  | Read SKILL.md + graph-metadata.json + scoring tables | analysis_report           |\n| 2     | Proposal  | Generate optimized triggers, tokens, phrases     | proposal_diff                 |\n| 3     | run     | Write graph-metadata.json, edit scoring files, run advisor_rebuild | files_updated           |\n| 4     | Verify    | Run advisor_rebuild, inspect graph status, run advisor tests | verification_report           |\n\n---\n\n## 5. KEY BEHAVIORS\n\n### interactive workflow ()\n\n- Executes all 5 phases without user approval gates\n- Self-validates at each phase boundary (Discovery → Analysis → Proposal → run → Verify)\n- Applies all proposals that pass quality gates and lack collision warnings\n- Skips skills with low-confidence proposals (marks as needs-review)\n- Stops on phase failure with rollback hint, no retry\n\n### Interactive Workflow ()\n\n- Pauses at four approval gates: pre-Phase 2, pre-Phase 3, pre-Phase 4, post-Phase 4\n- Phase 3 supports per-skill or per-lane review loops (`A` run all / `B` per-skill / `C` per-lane / `D` reject / `E` dry-run)\n- Presents diff before any mutation; `advisor_rebuild` + validation happen only after explicit approval\n- Offers rollback option at the post-Phase 4 gate when tests fail\n- Documents user decisions at each checkpoint\n\n### Dry-Run Mode (`--dry-run`)\n\n- Available in both interactive and interactive workflows\n- Generates the full proposal diff and writes it to a packet-local scratch path: `<spec-folder>/scratch/skill-advisor-proposal-<timestamp>.md` (or `.opencode/scratch/skill-advisor-proposal-<timestamp>.md` when invoked outside a spec folder)\n- Skips Phase 3 entirely; no source files or `graph-metadata.json` are modified\n- Phase 4 is also skipped (nothing to verify); status returns `STATUS=OK` with the diff path\n\n---\n\n## 6. INSTRUCTIONS\n\nAfter all setup phases pass, load and execute the appropriate YAML prompt:\n\n- **INTERACTIVE**: `.opencode/commands/doctor/assets/doctor_skill-advisor.yaml`\n\nThe YAML contains the full 5-phase workflow with discovery, analysis, proposal, run, and verify steps.\n\n---\n\n## 7. OUTPUT FORMATS\n\n**Success (confirm workflow):**\n```\nSkill Advisor Optimization Complete - All 5 phases executed.\nSkills analyzed: [N] | Proposals applied: [N] | Tests: [PASS|FAIL] [220/220]\nFiles modified: [list]\nGraph re-indexed: skill_count=[N] node_count=[N] edge_count=[N]\nSTATUS=OK\n```\n\n**Success (confirm workflow):**\n```\nSkill Advisor Optimization Complete (Interactive)\nSkills analyzed: [N] | Proposals approved: [N]/[N] | Rejected: [N] | Skipped: [N]\nTests: [PASS|FAIL] [220/220]\nSTATUS=OK\n```\n\n**Dry Run:**\n```\nSkill Advisor Dry Run Complete\nSkills analyzed: [N] | Proposals: [N]\nDiff written to: scratch/skill-advisor-proposal-<timestamp>.md\nNo files modified.\nSTATUS=OK\n```\n\n**Failure:**\n```\nSkill Advisor Optimization Failed\nError: [description] | Phase: [number] | Rollback: [available|not-needed]\nSTATUS=FAIL ERROR=\"[message]\"\n```\n\n---\n\n## 8. REFERENCE\n\n**Full details in YAML prompts:** Phase activities, scoring file paths, proposal diff format, approval gate semantics, rollback rules, error recovery.\n\n### See also\n- `.opencode/skills/system-spec-kit/mcp_server/skill_advisor/SET-UP_GUIDE.md` — operator setup, validation, rollback\n- `.opencode/skills/system-spec-kit/mcp_server/skill_advisor/lib/scorer/lanes/explicit.ts` — TOKEN_BOOSTS and PHRASE_BOOSTS source\n- `.opencode/skills/system-spec-kit/mcp_server/skill_advisor/lib/scorer/lanes/lexical.ts` — CATEGORY_HINTS source\n- `.opencode/skills/system-spec-kit/mcp_server/skill_advisor/lib/scorer/weights-config.ts` — lane weights\n- `.opencode/install_guides/SET-UP - Skill Advisor.md` — user-facing setup guide\n\n### Five Scoring Lanes\n\n| Lane | Source | Weight | Tunable Field |\n| ---- | ------ | ------ | ------------- |\n| explicit | `explicit.ts` (TOKEN_BOOSTS, PHRASE_BOOSTS) | configured | tokens, phrases |\n| derived | `graph-metadata.json` per skill | 0.15 | derived.trigger_phrases, derived.key_topics |\n| lexical | `lexical.ts` (CATEGORY_HINTS) | configured | category hints |\n| semantic | embedding similarity | configured | (read-only) |\n| graph | skill graph relationships | configured | (read-only) |\n\n### Mutation Boundaries\n\nThe command modifies **only** these files:\n- `lib/scorer/lanes/explicit.ts` — TOKEN_BOOSTS / PHRASE_BOOSTS dictionaries\n- `lib/scorer/lanes/lexical.ts` — CATEGORY_HINTS dictionary\n- `.opencode/skills/*/graph-metadata.json` — `intent_signals`, `derived.trigger_phrases`, `derived.key_topics` arrays\n\nThe command **never** modifies: SKILL.md content, weights-config.ts (lane weights), fusion scorer logic, daemon code.\n\n### Indexing Sequence (Phase 3 internal contract)\n\nPhase 3 (run) runs three steps in order — manual editors must replicate all three for changes to take effect:\n1. **Write** the source files listed above.\n2. **Recompile graph** via `python3 .opencode/skills/system-spec-kit/mcp_server/skill_advisor/scripts/skill_graph_compiler.py --export-json --pretty` (regenerates `skill-graph.json` from per-skill `graph-metadata.json` files).\n3. **Re-index SQLite** via `advisor_rebuild({ force: true })` or `skill_graph_scan({})` (upserts into `database/skill-graph.sqlite`, which the runtime advisor actually reads).\n\nSkipping step 3 is the most common cause of \"I edited my signals but scores didn't change\" — the advisor never reads `graph-metadata.json` or `skill-graph.json` directly at runtime.\n\n---\n\n## 9. EXAMPLES\n\n```\n/doctor:skill-advisor                        # Default - asks all setup questions\n/doctor:skill-advisor                   # Run full optimization without prompts\n/doctor:skill-advisor                # Interactive with per-phase approval\n/doctor:skill-advisor --dry-run         # Generate proposal, write to scratch, do not run\n/doctor:skill-advisor --scope=explicit  # Only tune TOKEN_BOOSTS / PHRASE_BOOSTS\n/doctor:skill-advisor --skip-tests      # Skip post-run test suite (faster)\n```\n\n---\n\n## 10. RELATED COMMANDS\n\n| Command | Relationship |\n| ------- | ------------ |\n| `/spec_kit:plan` | Plan a new skill that the advisor will route to |\n| `create:sk-skill` | Create new skill (new skills should be re-tuned afterwards) |\n| `/spec_kit:resume` | Resume an in-progress optimization session |\n| `/memory:save` | Refresh canonical continuity after running optimization |\n\n---\n\n## 11. COMMAND CHAIN\n\n```\n[create:sk-skill new-skill] → /doctor:skill-advisor → [/memory:save]\n```\n\nRun skill-advisor after adding a new skill to ensure routing covers it.\n\n---\n\n## 12. NEXT STEPS\n\n| Condition | Suggested Command | Reason |\n| --------- | ----------------- | ------ |\n| Optimization complete, tests pass | Use the advisor normally | Routing is now tuned |\n| Tests failed after changes | Review diff in `scratch/skill-advisor-proposal-<timestamp>.md` and run the per-run rollback script generated by Phase 3 (`scratch/rollback-<timestamp>.sh`) | Restore working state |\n| Want to inspect graph state | `skill_graph_status({})` | Show indexed skill count + freshness |\n| New skill added later | `/doctor:skill-advisor` | Re-tune routing for new skill |\n| Want broader audit | `/spec_kit:deep-review skill:skill-advisor` | Iterative review pass |\n\n**ALWAYS** end with: \"What would you like to do next?\"\n\n\nUser request: {{args}}"
