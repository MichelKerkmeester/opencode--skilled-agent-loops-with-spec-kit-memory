<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Uniform Section Reveal</title>
  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      font-family: Inter, system-ui, sans-serif;
    }

    .reveal {
      max-width: 720px;
      margin: 40px auto;
      padding: 24px;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 420ms ease, transform 420ms ease;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <section class="reveal">
    <h2>Inbound</h2>
  </section>
  <section class="reveal">
    <h2>Picking</h2>
  </section>
  <section class="reveal">
    <h2>Dispatch</h2>
  </section>
</body>
</html>
