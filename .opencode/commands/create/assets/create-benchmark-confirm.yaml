# ─────────────────────────────────────────────────────────────────
# OPENCODE CREATE: BENCHMARK WORKFLOW (CONFIRM MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: interactive execution with checkpoints
# Entrypoint: /create:benchmark
# Operations: create | update
# ─────────────────────────────────────────────────────────────────
role: Family-Keyed Benchmark Author using sk-doc
purpose: Author or update registered benchmark packages with explicit checkpoints and validation gates
action: Normalize the family, confirm source inputs, load standards, generate the package, validate structure, and report completion

# ─────────────────────────────────────────────────────────────────
# PREREQUISITE: @markdown AGENT VERIFICATION
# ─────────────────────────────────────────────────────────────────
# This workflow REQUIRES the @markdown agent for:
#   - Template-first benchmark report and SOURCE.md generation
#   - sk-doc standards enforcement
#   - Benchmark folder validation
#
# PHASE 0 in the command markdown verifies @markdown agent BEFORE
# this YAML workflow loads. If you are executing this workflow,
# @markdown verification has already passed.
# ─────────────────────────────────────────────────────────────────

operating_mode:
  workflow: unified_6_step
  workflow_compliance: MANDATORY
  workflow_execution: interactive
  approvals: step_by_step
  tracking: checkpoint_decision_log
  validation: checkpoint_based
  supports_operations:
    - create
    - update
  description: |
    Executes the 6-step family-keyed authoring workflow with approval gates at each checkpoint.
    User confirms, reviews, or modifies at each step before the workflow advances.

development_philosophy:
  principle: "Confirm the family, source inputs, and target path before writing the benchmark package"
  approach: "Normalize -> Verify -> Preview -> Author -> Validate -> Report"
  mandate: "Ask for approval at the source-input plan and family-package preview checkpoints"

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with checkpoint proposal" }
    medium: { range: "40-79%", action: "Proceed with caution and note assumptions" }
    low: { range: "0-39%", action: "STOP and request clarification" }
  scoring_weights:
    input_completeness: 0.30
    routing_clarity: 0.20
    contract_alignment: 0.30
    validation_readiness: 0.20
  low_confidence_behavior:
    action: "Pause before the next checkpoint and request clarification"

# ─────────────────────────────────────────────────────────────────
# REQUEST ANALYSIS FRAMEWORK
# ─────────────────────────────────────────────────────────────────
request_analysis_framework:
  code_search_note: "Use Code Graph structural queries (code_graph_query) + Grep for concept discovery; verify hits with Read. memory_search is for spec docs/memory, not arbitrary code."
  solution_flow:
    - "Parse command arguments and resolve benchmark_family from --family or consolidated setup"
    - "Verify create/update semantics against the selected family's target path"
    - "Load the create-benchmark SKILL, selected family guide, and family templates before writing"
    - "Propose family-specific source inputs and target changes before generation"
    - "Generate the selected family package after checkpoint approval"
    - "Validate the selected package and stop at its authoring boundary"
  pre_change_validation:
    items:
      - "create_benchmark_verified is true"
      - "benchmark_family is a create-benchmark FAMILIES key with a registered command branch"
      - "skill_name is present"
      - "source_packet_path is present"
      - "operation is create or update"
      - "mcp_promotion has source_strategy and benchmark_date"
      - "conformance_benchmark has benchmark_id and a derived benchmark_package"
      - "execution_mode is :confirm"
    stop_conditions:
      - "Any required input missing"
      - "benchmark_family is not command-bound"
      - "Operation does not match the selected target's real existence"
      - "MCP source packet lacks accepted decision, stable fixture, replay commands, or benchmark evidence"
      - "MCP target skill lacks mcp-server/ or a measurable MCP surface"
      - "Conformance target mode or one of the four source templates is missing"
    stop_action: "STOP and correct setup before generation"

checkpoint_options:
  proceed:
    label: "Proceed"
    description: "Approve and continue"
  review:
    label: "Review"
    description: "Show more detail before deciding"
  modify:
    label: "Modify"
    description: "Adjust the current step before continuing"
  abort:
    label: "Abort"
    description: "Stop the workflow"

# ─────────────────────────────────────────────────────────────────
# CONTEXT LOADING
# ─────────────────────────────────────────────────────────────────
context_loading:
  trigger: "During UNIFIED SETUP PHASE, when memory_choice is answered and prior context exists"
  applies_when: "source_packet_path contains handover.md or _memory.continuity in implementation-summary.md, or operation is update and the selected target already exists; not applicable to fresh authoring with no prior continuity"
  mcp_integration:
    tool: memory_context
    note: "Call MCP tools directly - NEVER through Code Mode"
    parameters: { input: "resume previous work on {source_packet_path}", mode: "resume", profile: "resume", specFolder: "{source_packet_path}", includeContent: true }
    transport_fallback: "If MCP tools are missing or erroring while the daemon is otherwise warm, use: node .opencode/bin/spec-memory.cjs memory_context --json '{\"input\":\"resume previous work\",\"mode\":\"resume\"}' --format json --timeout-ms 3000 --warm-only. Exit 75 = retryable backend unavailability."
  behavior:
    memory_choice_A: "Load handover.md (if <24h old) plus _memory.continuity from implementation-summary.md in {source_packet_path}; sets memory_loaded: handover+continuity"
    memory_choice_B: "Load canonical spec docs (decision-record.md, implementation-summary.md, tasks.md) in {source_packet_path} up to a recent cap (3 most recently modified); sets memory_loaded: spec-docs"
    memory_choice_C: "Skip context loading; sets memory_loaded: skipped"
  when_to_skip: ["New spec packet with no prior context", "User says 'skip context' or 'fresh start'"]
  output: memory_loaded

input_contract:
  required:
    - create_benchmark_verified
    - benchmark_family
    - skill_name
    - source_packet_path
    - operation
    - execution_mode
  required_by_family:
    mcp_promotion:
      - source_strategy
      - benchmark_date
    conformance_benchmark:
      - benchmark_id
  optional:
    - skill_path
    - benchmarks_root
    - benchmark_folder
    - target_mode_path
    - conformance_package_root
    - benchmark_package
    - memory_choice

field_handling:
  benchmark_family:
    validation: "must be a create-benchmark FAMILIES key; command branches exist for mcp_promotion and conformance_benchmark"
    required: true
  skill_name:
    validation: "hyphen-case folder name"
    required: true
  source_packet_path:
    validation: "existing spec packet folder with decision-record.md, implementation-summary.md, and benchmark evidence"
    required: true
  operation:
    validation: "must be one of: create, update"
    required: true
  source_strategy:
    validation: "must be one of: promote-benchmark, rerun-update, retirement-update"
    required_when: "benchmark_family is mcp_promotion"
  benchmark_date:
    validation: "ISO execution date used for benchmark-YYYY-MM-DD"
    required_when: "benchmark_family is mcp_promotion"
  benchmark_id:
    validation: "stable lowercase-hyphen identifier describing the conformance corpus"
    required_when: "benchmark_family is conformance_benchmark"
  execution_mode:
    validation: "must be :confirm"
    required: true

documentation_level:
  default: "Level 2 (Verification)"
  required_files:
    - spec.md
    - plan.md
    - tasks.md
    - checklist.md
  note: "Benchmark package creation needs verification because it publishes stable authoring inputs into a skill or mode surface"

defaults:
  skill_path: .opencode/skills/
  benchmarks_dirname: mcp-server/benchmarks
  execution_mode: :confirm
  dqi_hard_minimum: 75

family_router:
  mcp_promotion:
    target: "[skill_path]/[skill_name]/mcp-server/benchmarks/benchmark-[benchmark_date]"
    workflow: "existing MCP promotion path"
    terminal_boundary: "validated report, SOURCE.md, copied evidence, and README index"
  conformance_benchmark:
    target: "[skill_path]/[skill_name]/assets/conformance-benchmark/[benchmark_id]"
    workflow: "copy and fill the four conformance templates"
    terminal_boundary: "authored Markdown and JSON validated; no adapter or deep-alignment invocation"
  unsupported_family:
    action: "STOP and route to the live create-benchmark SKILL until a command branch is registered"

operation_router:
  applies_to: "mcp_promotion; conformance_benchmark applies the same create/update existence semantics to benchmark_package"
  create:
    requires_existing_benchmark_folder: false
    output_scope:
      - mcp-server/benchmarks/README.md
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/benchmark-report.md
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/SOURCE.md
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/results.csv
    conformance_output_scope:
      - assets/conformance-benchmark/README.md
      - assets/conformance-benchmark/BENCHMARK-ID/conformance-benchmark.md
      - assets/conformance-benchmark/BENCHMARK-ID/lane-config.json
      - assets/conformance-benchmark/BENCHMARK-ID/fixtures/fixture-manifest.json
  update:
    requires_existing_benchmark_folder: true
    output_scope:
      - mcp-server/benchmarks/README.md
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/benchmark-report.md
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/SOURCE.md
      - mcp-server/benchmarks/benchmark-YYYY-MM-DD/results.csv
    conformance_output_scope:
      - assets/conformance-benchmark/README.md
      - assets/conformance-benchmark/BENCHMARK-ID/conformance-benchmark.md
      - assets/conformance-benchmark/BENCHMARK-ID/lane-config.json
      - assets/conformance-benchmark/BENCHMARK-ID/fixtures/fixture-manifest.json

reference_sources:
  specific_creation: .opencode/skills/sk-doc/create-benchmark/SKILL.md
  reference_map: .opencode/skills/sk-doc/create-benchmark/references/shared/README.md
  case_studies: .opencode/skills/sk-doc/create-benchmark/references/shared/case-studies.md
  pitfalls: .opencode/skills/sk-doc/create-benchmark/references/shared/pitfalls.md
  worked_example: .opencode/skills/sk-doc/create-benchmark/references/shared/worked-example.md
  conformance_guide: .opencode/skills/sk-doc/create-benchmark/references/conformance-benchmark/conformance-benchmark-authoring-guide.md
  core_standards: .opencode/skills/sk-doc/shared/references/core-standards.md
  validation: .opencode/skills/sk-doc/shared/references/validation.md

template_sources:
  benchmark_report: .opencode/skills/sk-doc/create-benchmark/assets/shared/benchmark-report-template.md
  source_file: .opencode/skills/sk-doc/create-benchmark/assets/shared/source-template.md
  conformance_readme: .opencode/skills/sk-doc/create-benchmark/assets/conformance-benchmark/conformance-benchmark-readme-template.md
  conformance_contract: .opencode/skills/sk-doc/create-benchmark/assets/conformance-benchmark/conformance-benchmark-contract-template.md
  conformance_lane_config: .opencode/skills/sk-doc/create-benchmark/assets/conformance-benchmark/conformance-benchmark-lane-config-template.md
  conformance_fixture_manifest: .opencode/skills/sk-doc/create-benchmark/assets/conformance-benchmark/conformance-benchmark-fixture-manifest-template.md

validation_scripts:
  validate_document: .opencode/skills/sk-doc/shared/scripts/validate_document.py
  extract_structure: .opencode/skills/sk-doc/shared/scripts/extract_structure.py

quality_standards:
  template_first: required
  frontmatter_required: true
  report_requirements:
    - fixed ten-section benchmark-report.md structure
    - section 1 is HEADLINE / OVERVIEW
    - section 10 is RELATED RESOURCES
  source_file_requirements:
    - frontmatter
    - OVERVIEW
    - SPEC PACKET LOCATION
    - WHEN TO READ WHAT
    - EVIDENCE FILE MAP
  current_reality_rule: "Promote accepted benchmark evidence, not speculative or in-flight measurements"
  validation_pipeline:
    - "python3 .opencode/skills/sk-doc/shared/scripts/validate_document.py [benchmark_folder]/benchmark-report.md --type readme"
    - "python3 .opencode/skills/sk-doc/shared/scripts/validate_document.py [benchmarks_root]/README.md --type readme"
  conformance_requirements:
    - "family README and per-benchmark contract are filled from their templates and pass markdown validation"
    - "lane-config.json and fixtures/fixture-manifest.json contain only the filled fenced JSON values and parse as JSON"
    - "family index, benchmark ID, package paths, and evidence pointers agree"
    - "validation stops before scoping.cjs, the peer adapter, or any deep-alignment command"

gate_logic:
  hard:
    H0_write_verified:
      description: "create_benchmark_verified must be true"
      fail_action: "STOP and return to setup"
    H1_required_fields:
      description: "All required setup fields must be present"
      fail_action: "STOP and collect missing fields"
    H1_family_branch:
      description: "benchmark_family must resolve to a registered command branch"
      fail_action: "STOP and report the unregistered family branch"
    H2_existence_semantics:
      description: "create/update must match the selected family target's existence"
      fail_action: "STOP and reroute or correct target"
    H3_contract_shape:
      description: "Generated package must match the selected family contract"
      fail_action: "Return to generation before continuing"
    H4_validation_gate:
      description: "Selected-family Markdown, JSON, artifact, and index checks must pass"
      fail_action: "Run fix-and-revalidate loop"
    H5_authoring_boundary:
      description: "The conformance branch must terminate after authoring and validation"
      fail_action: "STOP before any adapter, scoping, or deep-alignment invocation"
  soft:
    S1_source_strategy:
      description: "Prefer true promotion only when an accepted decision and replayable evidence exist"
      fail_action: "Proceed only with logged provisional or retirement status"

interactive_execution:
  principle: "Pause at each checkpoint and wait for explicit approval"
  user_feedback_handling:
    proceed: "Advance to the next step"
    review: "Show more detail and remain at the current checkpoint"
    modify: "Revise the current step and re-present the checkpoint"
    abort: "Return STATUS=CANCELLED and stop"

workflow_overview:
  steps:
    - id: step_1_preflight
      purpose: "Normalize inputs and enforce H0-H2"
    - id: step_2_source_discovery
      purpose: "Resolve source evidence and the selected family's target package"
    - id: step_3_template_loading
      purpose: "Load the selected family guide and templates"
    - id: step_4_package_generation
      purpose: "Create or update selected-family artifacts after approval"
    - id: step_5_validation
      purpose: "Run family-specific validation and path/artifact consistency checks"
    - id: step_6_completion
      purpose: "Emit deterministic completion report"

workflow:
  step_1_preflight:
    purpose: Normalize inputs and existence semantics
    activities:
      - Normalize skill_path to default when omitted
      - Validate benchmark_family against the create-benchmark FAMILIES list and registered command branches
      - For mcp_promotion, derive benchmarks_root and benchmark_folder from skill path, skill name, and benchmark date
      - For conformance_benchmark, derive target_mode_path, conformance_package_root, and benchmark_package from skill path, skill name, and benchmark ID
      - Validate operation token to supported value
      - Validate execution_mode is :confirm
      - Check whether the selected family target exists
      - Resolve memory_choice via the context_loading block when applicable; record result as memory_loaded
    outputs:
      - normalized_inputs
      - target_existence_state
    checkpoint:
      question: "Preflight complete for [skill_name], family [benchmark_family], using [operation]. Continue?"
      options:
        - proceed
        - review
        - modify
        - abort

  step_2_source_discovery:
    purpose: Resolve source packet evidence and selected-family authoring inputs
    activities:
      - For mcp_promotion, read decision-record.md, implementation-summary.md, and benchmark evidence; verify the existing promotion gate
      - For mcp_promotion, verify the target skill MCP surface and identify copied artifacts plus README index needs
      - For conformance_benchmark, read the source packet and collect the corpus, lane, fixture, oracle-provenance, validity-gate, and evidence-pointer values needed by the templates
      - For conformance_benchmark, verify the owning mode exists without loading or invoking its peer adapter
    outputs:
      - source_gate_state
      - family_artifact_plan
      - family_index_plan
    checkpoint:
      question: "Review the source inputs, selected target, and authoring plan?"
      options:
        - proceed
        - review
        - modify
        - abort

  step_3_template_loading:
    purpose: Load selected-family standards and templates
    activities:
      - Read create-benchmark/SKILL.md
      - For mcp_promotion, read the shared references plus benchmark-report-template.md and source-template.md
      - For conformance_benchmark, read conformance-benchmark-authoring-guide.md and all four conformance templates
      - Extract only the selected family's output contracts
    outputs:
      - template_contract_loaded

  step_4_package_generation:
    purpose: Draft the selected family package
    activities:
      - For mcp_promotion, preserve the existing benchmark folder, report, SOURCE.md, copied-artifact, and README-index workflow
      - For conformance_benchmark, ensure conformance_package_root, benchmark_package, fixtures/public, and fixtures/held-out exist
      - For conformance_benchmark, copy and fill the README index template to conformance_package_root/README.md
      - For conformance_benchmark, copy and fill the contract template to benchmark_package/conformance-benchmark.md
      - For conformance_benchmark, extract and fill only the fenced JSON array into benchmark_package/lane-config.json
      - For conformance_benchmark, extract and fill only the fenced JSON object into benchmark_package/fixtures/fixture-manifest.json
      - Remove template guidance, template-only version fields, and all placeholders from shipped conformance artifacts
    outputs:
      - generated_family_artifacts_preview
      - updated_family_index_preview
      - selected_target_path
    checkpoint:
      question: "Review the selected family package preview and index/path changes?"
      options:
        - proceed
        - review
        - modify
        - abort

  step_5_validation:
    purpose: Validate the selected family package
    activities:
      - For mcp_promotion, preserve report, README index, SOURCE.md, artifact, and ten-section validation
      - For conformance_benchmark, run validate_document.py --type readme on the family README and benchmark contract
      - For conformance_benchmark, parse lane-config.json and fixtures/fixture-manifest.json as JSON
      - For conformance_benchmark, check the four outputs, benchmark ID, paths, index row, and evidence pointer agree with no placeholders
      - For conformance_benchmark, do not run scoping.cjs, load the adapter, or invoke deep-alignment
    outputs:
      - markdown_validation_passed
      - json_artifact_validation_passed
      - index_path_consistency_passed
      - authoring_only_stop_enforced

  step_6_completion:
    purpose: Emit completion status
    activities:
      - Summarize benchmark family, operation, and generated paths
      - Report validation results
      - Return STATUS=OK PATH=[benchmark_folder or benchmark_package]
      - Terminate the conformance branch immediately after the completion report
    outputs:
      - completion_report

error_recovery:
  checkpoint_rejected:
    action: "Return to the previous step and revise"
  missing_benchmark_on_update:
    action: "Offer reroute to create"
  report_validation_failure:
    action: "Fix and re-run validation before completion"
  unsupported_family_branch:
    action: "Stop and route to the live create-benchmark skill contract"
  conformance_boundary_violation:
    action: "Stop before adapter or deep-alignment execution"

circuit_breaker:
  trigger_threshold: 3
  reset_condition: "A checkpoint is approved and the selected-family validation gate passes"
  actions:
    - "Stop the workflow"
    - "Report the failing step and affected path"
    - "Return STATUS=CANCELLED or STATUS=FAIL"

completion_report_template: |
  Benchmark Command Complete

  Skill: [skill_name]
  Family: [benchmark_family]
  Operation: [operation]
  Source strategy: [source_strategy or N/A]
  Mode: :confirm
  Target: [benchmark_folder or benchmark_package]

  Validation:
  - Markdown validation: [passed/failed]
  - JSON/artifact validation: [passed/failed/N/A]
  - Index and path consistency checks: [passed/failed]
  - Authoring-only stop enforced: [yes/N/A]

  STATUS=[OK|CANCELLED|FAIL] PATH=[benchmark_folder or benchmark_package]

termination:
  success_signal: "STATUS=OK PATH=[benchmark_folder or benchmark_package]"
  cancel_signal: "STATUS=CANCELLED PATH=[benchmark_folder or benchmark_package]"
  failure_signal: "STATUS=FAIL PATH=[benchmark_folder or benchmark_package]"
  rule: "Do not claim completion until checkpoint outcomes and validation are included; conformance_benchmark stops here"

rules:
  must:
    - "Load the create-benchmark SKILL, selected family guide, and selected templates before writing"
    - "Keep SOURCE.md as navigation, not a duplicate audit trail"
    - "Use the benchmark execution date for benchmark-YYYY-MM-DD"
    - "Keep the conformance branch authoring-only and terminate after validation"
  must_not:
    - "Promote in-flight or unreplayable benchmark evidence"
    - "Compare numeric results across different MCP stacks as if equivalent"
    - "Leave template placeholders in shipped benchmark files"
    - "Invoke a peer adapter, scoping.cjs, or deep-alignment from the conformance branch"
