# ─────────────────────────────────────────────────────────────────
# SKILL BENCHMARK: DIAGNOSTIC RUN (AUTONOMOUS MODE)
# ─────────────────────────────────────────────────────────────────
role: Skill Benchmark Specialist using deep-improvement skill-benchmark mode autonomously
purpose: Benchmark a skill's real-world routing, discovery, efficiency, and usefulness (Lane C) and emit a ranked, remediable Skill Benchmark Report
action: Resolve the target skill and output location, dispatch the self-contained skill-benchmark loop host once, and surface the report it writes

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: single_dispatch_diagnostic
  workflow_compliance: MANDATORY
  workflow_execution: autonomous
  approvals: none
  tracking: loop_host_owned_report
  validation: loop_host_owned_scoring
  promotion: none
  description: |
    Dispatches the skill-benchmark loop host exactly once. The loop host
    (loop-host.cjs --mode=skill-benchmark -> run-skill-benchmark.cjs) is
    self-contained: it runs the D5 structural hard gate, then per-scenario
    contamination-lint, router-replay, and scoring, and writes the dual
    JSON+Markdown report. This workflow adds no iteration, reduction, or
    promotion; Lane C is diagnostic by default and never mutates the target skill.

# ─────────────────────────────────────────────────────────────────
# USER INPUTS (resolved by the command's Mandatory Input Gate before this loads)
# ─────────────────────────────────────────────────────────────────
user_inputs:
  skill: "[SKILL] - Skill id or root to benchmark (must have an INTENT_SIGNALS + RESOURCE_MAP smart router for Mode A). REQUIRED."
  outputs_dir: "[OUTPUTS_DIR] - Directory where skill-benchmark-report.{json,md} are written. REQUIRED."
  fixtures_dir: "[FIXTURES_DIR] - Optional fixtures dir. Defaults to <skill>/assets/skill_benchmark/fixtures/<skill-id>/ inside the loop host."
  trace_mode: "[TRACE_MODE] - router (Mode A, deterministic, default/CI) or live (Mode B, playbook corpus dispatched through cli-opencode). Default: router."
  advisor_mode: "[ADVISOR_MODE] - python enables the opt-in D1-inter advisor probe. Optional; off by default and in CI."
  execution_mode: "[EXECUTION_MODE] - AUTONOMOUS or INTERACTIVE. Derived from :auto/:confirm suffix."

# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  defaults:
    trace_mode_empty: "router"
    fixtures_dir_empty: "let the loop host resolve <skill>/assets/skill_benchmark/fixtures/<skill-id>/"
    advisor_mode_empty: "unset (D1-inter advisor probe stays off)"
  validation:
    skill_required: true
    outputs_dir_required: true
    trace_mode_enum: "Must be one of: router, live"
    advisor_mode_enum: "When set, must be: python"

# ─────────────────────────────────────────────────────────────────
# SKILL REFERENCE
# ─────────────────────────────────────────────────────────────────
skill_reference:
  skill: system-deep-loop
  skill_md: .opencode/skills/system-deep-loop/deep-improvement/SKILL.md
  operator_guide: .opencode/skills/system-deep-loop/deep-improvement/references/skill_benchmark/operator_guide.md
  routing_optimization: .opencode/skills/system-deep-loop/deep-improvement/references/skill_benchmark/routing_optimization.md
  scripts:
    loop_host: .opencode/skills/system-deep-loop/deep-improvement/scripts/shared/loop-host.cjs
    orchestrator: .opencode/skills/system-deep-loop/deep-improvement/scripts/skill-benchmark/run-skill-benchmark.cjs

# ─────────────────────────────────────────────────────────────────
# STATE PATHS
# ─────────────────────────────────────────────────────────────────
state_paths:
  outputs_dir: "{outputs_dir}"
  report_json: "{outputs_dir}/skill-benchmark-report.json"
  report_md: "{outputs_dir}/skill-benchmark-report.md"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_setup:
    description: "Validate required inputs and ensure the outputs directory exists"
    steps:
      step_preflight:
        action: "Confirm skill and outputs_dir are bound before dispatch"
        verify:
          - required_values_present: [skill, outputs_dir]
          - trace_mode_valid: "trace_mode is router or live"
        on_fail: "Halt with STATUS=FAIL naming the missing or invalid input"
      step_create_outputs_dir:
        description: "Create the outputs directory if it does not exist"
        command: "mkdir -p {outputs_dir}"

  phase_run:
    description: "Dispatch the self-contained skill-benchmark loop host once"
    steps:
      step_run_skill_benchmark:
        description: "Run loop-host.cjs --mode=skill-benchmark; it internally sequences run-skill-benchmark.cjs (D5 gate -> contamination-lint -> router-replay -> score -> dual report)"
        dispatch_contract: "This is the exact direct-dispatch invocation the command previously ran inline. Only required --skill and --outputs-dir are always passed; --fixtures-dir, --trace-mode, and --advisor-mode are appended only when the operator set them, preserving the loop host's own defaults otherwise."
        command: "node .opencode/skills/system-deep-loop/deep-improvement/scripts/shared/loop-host.cjs --mode=skill-benchmark --skill={skill} --outputs-dir={outputs_dir}$([ -n \"{fixtures_dir}\" ] && echo \" --fixtures-dir={fixtures_dir}\")$([ -n \"{trace_mode}\" ] && echo \" --trace-mode={trace_mode}\")$([ -n \"{advisor_mode}\" ] && echo \" --advisor-mode={advisor_mode}\")"
        on_fail: "Report the loop host's own STATUS=FAIL and error verbatim; do not synthesize a verdict."

  phase_report:
    description: "Surface the report the loop host wrote; add nothing to it"
    steps:
      step_confirm_report:
        description: "Confirm the loop host wrote its report before reporting status"
        command: "test -f {outputs_dir}/skill-benchmark-report.json && echo report-present || echo report-missing"
      step_report_status:
        description: "Report the loop-host-owned verdict; the report content is owned by the loop host, never synthesized here"
        action: "Read {outputs_dir}/skill-benchmark-report.json and report its verdict, aggregate, and ranked bottlenecks. Lane C is diagnostic by default: findings hand off to Lane A (/deep:agent-improvement) or a follow-up spec packet via the remediation taxonomy. Never mutate the target skill or its gold."
