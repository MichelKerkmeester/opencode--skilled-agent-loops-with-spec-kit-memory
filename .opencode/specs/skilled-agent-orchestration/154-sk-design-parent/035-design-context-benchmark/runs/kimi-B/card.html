<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anobel — Bestellimten</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f3f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 560px;
      height: 480px;
      background: #ffffff;
      border: 1px solid #e7e9ee;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
      color: #06458c;
    }

    .subtitle {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      color: #787878;
    }

    .alert {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #ffffff;
      border-left: 4px solid #c9140f;
    }

    .alert-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: #c9140f;
      font-weight: 700;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
    }

    .alert-text {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      color: #c9140f;
    }

    .balance {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .balance-label {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #787878;
    }

    .balance-amount {
      font-size: 48px;
      font-weight: 700;
      line-height: 1.1;
      color: #c9140f;
    }

    .balance-meta {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      color: #787878;
    }

    .limits {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .limit {
      background: #f2f3f6;
      border: 1px solid #e7e9ee;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .limit-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .limit-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      color: #0a1a2f;
    }

    .limit-pct {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .limit-pct.exceeded { color: #c9140f; }
    .limit-pct.ok { color: #367e39; }

    .limit-value {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      color: #0a1a2f;
    }

    .limit-cap {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.3;
      color: #787878;
    }

    .bar {
      width: 100%;
      height: 6px;
      background: #e7e9ee;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
    }

    .bar-fill.exceeded { background: #c9140f; }
    .bar-fill.ok { background: #367e39; }

    .action {
      margin-top: auto;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 20px;
      background: #06458c;
      color: #ffffff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .button:hover { background: #053b77; }
    .button:active { background: #043367; }
  </style>
</head>
<body>
  <article class="card" aria-label="Bestellimten overzicht">
    <header class="header">
      <h1 class="title">Bestellimten</h1>
      <p class="subtitle">Per schip &amp; locatie</p>
    </header>

    <section class="alert" role="alert" aria-live="polite">
      <span class="alert-icon" aria-hidden="true">!</span>
      <p class="alert-text">Limiet overschreden: € 1.240 boven het maandbudget</p>
    </section>

    <section class="balance">
      <span class="balance-label">Resterend budget</span>
      <span class="balance-amount">− € 1.240,00</span>
      <span class="balance-meta">van € 8.500 limiet</span>
    </section>

    <section class="limits" aria-label="Limieten per schip en locatie">
      <div class="limit">
        <div class="limit-header">
          <span class="limit-name">Per schip</span>
          <span class="limit-pct exceeded">130%</span>
        </div>
        <div>
          <div class="limit-value">€ 5.200</div>
          <div class="limit-cap">van € 4.000</div>
        </div>
        <div class="bar" aria-hidden="true">
          <div class="bar-fill exceeded" style="width: 100%;"></div>
        </div>
      </div>

      <div class="limit">
        <div class="limit-header">
          <span class="limit-name">Per locatie</span>
          <span class="limit-pct ok">46%</span>
        </div>
        <div>
          <div class="limit-value">€ 2.060</div>
          <div class="limit-cap">van € 4.500</div>
        </div>
        <div class="bar" aria-hidden="true">
          <div class="bar-fill ok" style="width: 46%;"></div>
        </div>
      </div>
    </section>

    <footer class="action">
      <button class="button" type="button">Limieten aanpassen</button>
    </footer>
  </article>
</body>
</html>
