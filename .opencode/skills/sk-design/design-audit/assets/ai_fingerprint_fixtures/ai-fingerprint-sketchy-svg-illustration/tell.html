<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sketchy SVG Illustration</title>
  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      font-family: Inter, system-ui, sans-serif;
    }

    .sketch-illustration {
      display: block;
      width: 320px;
      margin: 48px auto;
    }
  </style>
</head>
<body>
  <svg class="sketch-illustration" viewBox="0 0 320 180" role="img" aria-label="Loose hand drawn trust scene">
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="2"></feDisplacementMap>
    </filter>
    <g filter="url(#roughen)" fill="none" stroke="#334155" stroke-width="3">
      <path d="M54 116c18-40 56-40 74 0"></path>
      <path d="M164 116c18-40 56-40 74 0"></path>
      <path d="M64 72c12-14 28-14 40 0"></path>
      <path d="M174 72c12-14 28-14 40 0"></path>
    </g>
  </svg>
</body>
</html>
