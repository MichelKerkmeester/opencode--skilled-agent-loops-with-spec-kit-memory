# ─────────────────────────────────────────────────────────────────
# DOCTOR: CODE-GRAPH WORKFLOW (APPLY MODE — AUTONOMOUS)
# ─────────────────────────────────────────────────────────────────
role: Diagnostic Operator running code-graph apply pass in autonomous mode
purpose: Recover code-graph health through verification-gated typed operations
action: Execute pre-flight battery → state classification → operation dispatch → post-flight battery → commit-or-rollback

operating_mode:
  workflow: sequential
  compliance: MANDATORY
  execution: autonomous
  approvals: hard_stale_requires_confirm_true
  tracking: phase_by_phase
  validation: pre_and_post_gold_battery

phase_b_invariant: |
  Apply-mode mutates only through the code_graph_apply MCP tool. The workflow
  never executes recovery-playbook shell snippets. Recovery procedures map to
  typed TypeScript functions and validate parameters before filesystem or DB
  operations. Phase A diagnostic YAMLs remain read-only and unchanged.

upstream_assets:
  packet: ".opencode/specs/system-spec-kit/026-graph-and-context-optimization/007-code-graph/007-code-graph-resilience-research"
  files:
    gold_queries: "assets/code-graph-gold-queries.json"
    staleness_model: "assets/staleness-model.md"
    recovery_playbook: "assets/recovery-playbook.md"
    exclude_rule_confidence: "assets/exclude-rule-confidence.json"
  pass_policy:
    overall_top_k_symbol_pass_floor: 0.90
    edge_focus_pass_floor: 0.80

user_inputs:
  operation: "[OPERATION] - rescan|prune-excludes|repair-nodes|recover-sqlite-corruption|rollback-bad-apply (default rescan by state)"
  confirm: "[CONFIRM] - true required for hard-stale mutation"
  dry_run: "[DRY_RUN] - true runs batteries and classification, skips dispatch"
  tier_floor: "[TIER_FLOOR] - high in autonomous mode; medium/low require explicit opt-in through apply-confirm"

mutation_boundaries:
  allowed_targets:
    - "<code_graph_data_dir>/code-graph.sqlite"
    - "<code_graph_data_dir>/code-graph.sqlite-wal"
    - "<code_graph_data_dir>/code-graph.sqlite-shm"
    - "<code_graph_data_dir>/apply-audit/*.jsonl"
    - "<code_graph_data_dir>/apply-audit/known-good-*/*"
    - "<code_graph_data_dir>/apply-audit/bad-apply-*/*"
    - "<code_graph_data_dir>/recovery-*/*"
    - "<code_graph_data_dir>/quarantine-*/*"
  forbidden_targets:
    - "Phase A YAMLs: doctor_code-graph_auto.yaml and doctor_code-graph_confirm.yaml"
    - "parser_skip_list schema or quarantine logic"
    - "Source files indexed by the graph"
    - "Research artifacts under specs/.../assets/"
  audit_log: "<code_graph_data_dir>/apply-audit/apply-<timestamp>.jsonl"

phases:
  phase_0_preflight_battery:
    purpose: "Prove baseline before mutation"
    tool_call: "code_graph_apply({ dryRun: true }) may be used for operator-only baseline checks"
    apply_contract:
      - "code_graph_apply always runs the 28-query battery before mutation"
      - "pre-flight failure returns status=aborted and writes an audit event"
      - "no operation dispatch happens when pre-flight fails"

  phase_1_state_classification:
    purpose: "Classify graph as fresh, soft-stale, or hard-stale"
    model:
      fresh: "freshness=fresh, canonicalReadiness=ready, trustState=live, battery pass"
      soft_stale: "1-50 stale files, no Git HEAD drift, no schema/error signal, bounded selective reindex"
      hard_stale: "empty/error, unavailable trust, Git HEAD drift, >50 stale files, missing lastPersistedAt, schema mismatch, or battery failure"
    self_healing_boundary: "only soft-stale auto-fixes without confirm=true"

  phase_2_operation_dispatch:
    purpose: "Run one typed operation"
    operations:
      rescan:
        soft_stale: "code_graph_scan({ incremental: true })"
        hard_stale_with_confirm: "code_graph_scan({ incremental: false })"
      prune_excludes:
        high: "classified as safe without prompt"
        medium: "requires interactive apply-confirm gate"
        low: "requires explicit lowTierOptIn"
      repair_nodes:
        gate: "crashRootCauseAddressed must be true and parser_skip_list entries must exceed quarantine age"
      recover_sqlite_corruption:
        procedure: "CG-RP-001"
      rollback_bad_apply:
        procedure: "CG-RP-003"

  phase_3_postflight_battery:
    purpose: "Verify committed graph quality after operation"
    pass_policy: "overall >= 0.90 and edge-focus >= 0.80, env overrides may raise but never lower floors"
    on_pass: "commit apply metadata: apply.lastRunAt, apply.lastResult=committed, apply.batteryPassRate"
    on_fail: "execute CG-RP-003 rollback"

  phase_4_rollback:
    purpose: "Restore known-good graph on post-flight failure"
    contract:
      - "move live DB triplet into apply-audit/bad-apply-<timestamp>/"
      - "restore latest apply-audit/known-good-<timestamp>/ triplet when available"
      - "run full source scan"
      - "record rollback result in JSONL audit"

output_format: |
  Return the code_graph_apply JSON payload:
    status: committed | rolled-back | aborted | dry-run | noop | error
    result.auditLogPath: <code_graph_data_dir>/apply-audit/apply-<timestamp>.jsonl
    result.preflight/result.postflight: battery pass evidence
    result.recovery: CG-RP evidence when recovery ran

cross_references:
  spec: ".opencode/specs/system-spec-kit/026-graph-and-context-optimization/007-code-graph/013-doctor-apply-mode-phase-b/spec.md"
  recovery_playbook: ".opencode/specs/system-spec-kit/026-graph-and-context-optimization/007-code-graph/007-code-graph-resilience-research/assets/recovery-playbook.md"
  staleness_model: ".opencode/specs/system-spec-kit/026-graph-and-context-optimization/007-code-graph/007-code-graph-resilience-research/assets/staleness-model.md"
