[mcp_servers."mk-spec-memory"]
command = "node"
args = [".opencode/bin/mk-spec-memory-launcher.cjs"]

[mcp_servers."mk-spec-memory".env]
EMBEDDINGS_PROVIDER = "auto"
# MEMORY_DB_PATH intentionally unset: filename is auto-derived from provider+model+dim+dtype
# (e.g., context-index__llama-cpp__unsloth-embeddinggemma-300m-gguf__768__q8.sqlite when the
# GGUF runtime is installed; otherwise context-index__hf-local__onnx-community_embeddinggemma-300m-onnx__768__q8.sqlite).
# Resolved automatically by the active embedding profile via shared/embeddings/profile.ts.
# To override the model: set HF_EMBEDDINGS_MODEL or LLAMA_CPP_EMBEDDINGS_MODEL_PATH in .env.local (see .env.example).
SPECKIT_SESSION_BOOST = "true"
SPECKIT_CAUSAL_BOOST = "true"
_NOTE_1_DB = "Default DB: context-index__llama-cpp__unsloth-embeddinggemma-300m-gguf__768__q8.sqlite (auto-derived from provider+model+dim+dtype; hf-local ONNX q8 is the fallback)."
_NOTE_2_TOOLS = "Registers 39 tools: memory_save/search/context/match_triggers/index_scan/stats/health/validate/update/delete/bulk_delete/list/drift_why/retention_sweep/get_learning_history (15 memory), memory_causal_link/stats (2 causal), memory_ingest_start/status/cancel (3 async ingest), session_bootstrap/resume/health (3 session), checkpoint_create/delete/list/restore (4 checkpoint), task_preflight/postflight (2 task), council_graph_query/status/upsert/convergence (4 council), deep_loop_graph_query/status/upsert/convergence (4 deep-loop), eval_run_ablation/reporting_dashboard (2 eval). MCP namespace: mcp__mk_spec_memory__*"
_NOTE_3_PROVIDERS = "Auto cascade: VOYAGE_API_KEY -> OPENAI_API_KEY -> llama-cpp (GGUF Q8_0 + Metal) -> hf-local (ONNX q8 fallback)."
_NOTE_4_EMBEDDINGS_PROVIDER = "Auto cascade: VOYAGE_API_KEY -> OPENAI_API_KEY -> llama-cpp (when GGUF runtime installed) -> hf-local. Set EMBEDDINGS_PROVIDER=<provider> to force a specific provider."
_NOTE_5_CLOUD_PROVIDERS = "For cloud: add VOYAGE_API_KEY or OPENAI_API_KEY and set EMBEDDINGS_PROVIDER=auto"
_NOTE_6_GET_VOYAGE_KEY = "Get Voyage key: https://dash.voyageai.com/api-keys"
_NOTE_7_GET_OPENAI_KEY = "Get OpenAI key: https://platform.openai.com/api-keys"
_NOTE_8_FEATURE_FLAGS = "Opt-out flags (all default ON): SPECKIT_ADAPTIVE_FUSION, SPECKIT_EXTENDED_TELEMETRY, SPECKIT_SESSION_BOOST, SPECKIT_CAUSAL_BOOST"
_NOTE_AUTO_MIGRATION = "Auto-migration: hf-local sqlite + llama-cpp active -> daemon re-embeds + deletes source. Opt out: MEMORY_AUTO_MIGRATE_HF_TO_LLAMA=false."

