# ─────────────────────────────────────────────────────────────────
# SK-DESIGN INTERFACE: MOTION CREATION WORKFLOW (CONFIRM MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: interactive (one consolidated confirmation prompt, then autonomous)
# Delegates shared lifecycle/envelope/authority/proof vocabulary to
# creation-contract.md; this file carries only the motion
# workflow and the command-standard scaffolding.
# ─────────────────────────────────────────────────────────────────
role: sk-design motion creation command, interactive execution
purpose: Create temporal behavior for a transition
action: Resolve confirmation-required fields once, then apply workflowMode=motion

operating_mode:
  workflow: sequential_creation_contract
  workflow_compliance: MANDATORY
  workflow_execution: interactive_then_autonomous
  approvals: consolidated_prompt_once
  intake: progressive
  tracking: progressive_step_outputs
  validation: continuous_self_validation
  confirmation: "Wait for the bundled reply before motion work"
  description: |
    Collects every confirmation-required decision once via the presentation
    prompt, then runs the motion workflow to completion,
    delegating shared lifecycle/envelope/authority/proof vocabulary to
    creation-contract.md.

checkpoint:
  source: ".opencode/commands/interface/assets/interface-motion-presentation.txt"
  wait_for: user_reply

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with citable source" }
    medium: { range: "40-79%", action: "Proceed with caution, record bounded assumptions" }
    low: { range: "0-39%", action: "STOP - fold the unresolved field into the consolidated prompt" }
  scoring_weights:
    brief_clarity: 0.30
    grounding_fit: 0.25
    behavior_and_states: 0.25
    proof_bar: 0.20
  escalation:
    timebox_minutes: 10
    failed_attempts_threshold: 2
    action: "Present the unresolved field to the operator with current findings"

# ─────────────────────────────────────────────────────────────────
# INPUT CONTRACT
# ─────────────────────────────────────────────────────────────────
input_contract:
  required:
  - transition
  optional:
  - intent
  - interruption_reversal
  - material
  - constraints

# ─────────────────────────────────────────────────────────────────
# CHECKPOINT OPTIONS
# ─────────────────────────────────────────────────────────────────
checkpoint_options:
  standard:
  - label: "Approve"
    description: "Approve the resolved brief and continue"
  - label: "Review"
    description: "Show the resolved brief and grounding record"
  - label: "Modify"
    description: "Adjust intent, states, or constraints before proceeding"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW ENFORCEMENT
# ─────────────────────────────────────────────────────────────────
workflow_enforcement:
  mode: strict
  step_order: sequential_mandatory
  skip_allowed: false
  confirmation_gate:
    location: "step_0 before any motion work"
    purpose: "Collect all confirmation-required decisions in one bundled prompt"
    requirements:
    - "Consolidated prompt rendered from the presentation asset"
    - "Operator reply received before step_1"
    action_if_failed: "WAIT for the bundled reply"
  creation_contract_gate:
    location: "Between step_2 and step_3"
    purpose: "Verify the shared creation contract is loaded before route proof and motion work"
    requirements:
    - "creation-contract.md read (lifecycle, envelope, authority, proof vocabulary)"
    - "route proof recorded (command, workflowMode)"
    action_if_failed: "STOP and return to the contract-load step"
  critical_steps:
    step_5_progressive_brief:
      enforcement: "MUST classify every field as resolved, auto-resolvable, or confirmation-required"
      verification: "No confirmation-required field left unresolved before motion work"
    step_9_run_motion_work:
      enforcement: "MUST produce the motion design spec before any handoff"
      verification: "Deliverable visible_blocks are populated, not placeholders"
    step_11_proof:
      enforcement: "MUST qualify evidence with typed levels and an explicit ceiling"
      verification: "Evidence ledger present with an honest proof bar"

gate_logic:
  hard:
    H0_confirmation:
      description: "The consolidated confirmation reply must be received before motion work"
      fail_action: "WAIT for the bundled reply"
    H1_route_proof:
      description: "The canonical /interface:motion route + workflowMode=motion must be proven"
      fail_action: "STOP and record the route proof"
    H2_creation_contract:
      description: "The shared creation contract must be loaded before motion work"
      fail_action: "STOP and load creation-contract.md"
    H3_acceptance_before_handoff:
      description: "Implementation handoff only after accepted design output"
      fail_action: "Hold handoff until acceptance"
  soft:
    S1_bounded_assumptions:
      description: "Auto-resolvable fields may proceed with recorded bounded assumptions"
      fail_action: "Proceed with rationale"

# ─────────────────────────────────────────────────────────────────
# CIRCUIT BREAKER
# ─────────────────────────────────────────────────────────────────
circuit_breaker:
  consecutive_failure_threshold: 3
  states:
    closed: "Normal operation"
    open: "3+ failures - pause and report to the operator"
    half_open: "Single retry before resuming"
  on_open:
    action: "Report failures with a summary of the unresolved brief"
    suggest: "Resolve the blocked field or defer to a sibling route"

# ─────────────────────────────────────────────────────────────────
# AUTONOMOUS EXECUTION (after the consolidated confirmation)
# ─────────────────────────────────────────────────────────────────
autonomous_execution:
  principle: "After the bundled reply, execute the workflow steps sequentially without further approval gates"
  decision_making: "Use the confidence framework to self-assess at each step"
  self_validation_approach:
    continuous: "Self-validate at each step output"
    confidence_threshold: "Stop only if confidence < 40%"
    error_handling: "Apply error_recovery strategies automatically"
  uncertainty_handling: "If a confirmation-required field is unresolved, fold it into the consolidated prompt"
  progress_tracking: "Record each step output"
  completion_criteria: "All steps validated, deliverable produced, status contract emitted"

# ─────────────────────────────────────────────────────────────────
# QUALITY STANDARDS
# ─────────────────────────────────────────────────────────────────
quality_standards:
  proof_first: true
  anti_default_critique: required
  evidence_typing: "Typed evidence levels with an explicit ceiling; no-fit is a valid outcome"
  contract_references:
    creation_contract: ".opencode/skills/sk-design/shared/creation-contract.md"
    context_loading_contract: ".opencode/skills/sk-design/shared/context-loading-contract.md"
    handoff_contract: ".opencode/skills/sk-design/shared/sk-code-handoff.md"

workflow:
  step_0_show_prompt:
    purpose: Collect all confirmation-required decisions once
    action: "Render .opencode/commands/interface/assets/interface-motion-presentation.txt and wait"
    output: confirmed_inputs
  step_1_load_hub:
    purpose: Load the registry-driven design hub
    action: "Read .opencode/skills/sk-design/SKILL.md and mode-registry.json"
    output: hub_context
  step_2_load_creation_contract:
    purpose: Establish the shared lifecycle and evidence vocabulary
    action: "Read .opencode/skills/sk-design/shared/creation-contract.md"
    output: creation_contract
  step_3_route_proof:
    purpose: Prove the canonical temporal route
    action: "Record command=/interface:motion, workflowMode=motion, and proof environment"
    output: route_proof
  step_4_context_manifest:
    purpose: Load trigger, states, elements, runtime, performance budget, accessibility policy, and proof surface
    action: "Read .opencode/skills/sk-design/shared/context-loading-contract.md and name loaded sources"
    output: context_manifest
  step_5_progressive_brief:
    purpose: Resolve intent, before/after state, interruption/reversal, material, and constraints
    action: "Classify facts and record bounded reversible assumptions"
    output: resolved_brief
  step_6_grounding:
    purpose: Ground one behavior-changing decision
    action: "Use one behavior-fit exemplar when available; record provenance and decision changed; no-fit is valid"
    output: grounding_record
  step_7_load_mode:
    purpose: Load the stable motion mode and applicable references
    action: "Read .opencode/skills/sk-design/design-motion/SKILL.md, then references/ and assets as required"
    output: mode_context
  step_8_select_procedure_card:
    purpose: Select a private card only when its trigger matches
    action: "Choose procedures/interaction-states-pass.md or ../shared/procedures/polish-gate-orchestration.md when applicable; otherwise state 'Procedure applied: none - baseline motion workflow'"
    output: mode_plan
  step_9_run_motion_work:
    purpose: Define behavior and mechanism before timings
    action: "Produce the temporal narrative, choreography table, interruption/reversal model, and semantic reduced-motion equivalent"
    output: motion_design_spec
  step_10_critique_revision:
    purpose: Test purpose, state continuity, interruption, and reduced-motion parity
    action: "Revise only the failed criterion rather than resetting the full motion direction"
    output: critique_validation
  step_11_proof:
    purpose: Separate authored timing from runtime measurement
    action: "Validate state/choreography/reduced-motion contracts and upgrade only with interaction or frame-quality evidence"
    output: evidence_ledger
  step_12_prepare_handoff:
    purpose: Prepare implementation handoff only when accepted design output moves to code
    action: "Read .opencode/skills/sk-design/shared/sk-code-handoff.md and preserve the chosen animation stack boundary"
    output: next_action_handoff

deliverable:
  name: "Motion Design Spec"
  visible_blocks: [Route Proof, Resolved Brief, Context Manifest, Grounding Record, Creation/Remediation Artifact, Critique/Validation, Evidence Ledger, Next Action/Handoff]
  required_fields: [componentState, motionPurpose, timingModel, reducedMotionPath]

status_contract:
  success: 'STATUS=OK PRODUCES="Motion Design Spec" NEXT=/interface:design,/interface:foundations,/interface:audit PROOF=componentState,motionPurpose,timingModel,reducedMotionPath'
  missing_input: "STATUS=ASK MISSING=<input>"
  cannot_run: "STATUS=FAIL ERROR=<named-cause>"
  route_instead: "STATUS=DEFER ROUTE=<hub|sibling>"

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY
# ─────────────────────────────────────────────────────────────────
error_recovery:
  missing_transition:
    action: "Fold transition into the consolidated prompt and wait"
  no_fit_grounding:
    action: "Record 'no-fit' as a valid grounding outcome and proceed without a behavior exemplar"
  contract_not_loaded:
    action: "Return to the creation-contract load step before continuing"
  acceptance_conflict:
    action: "Request explicit amendment for conflicting accepted decisions"

# ─────────────────────────────────────────────────────────────────
# TERMINATION
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: step_12_prepare_handoff
  message: "Motion design workflow complete."
  next_steps:
  - action: "Run /interface:design to frame or reframe direction"
  - action: "Run /interface:foundations to revise the static system"
  - action: "Run /interface:audit to QA the behavior"
  - action: "Hand to sk-code via sk-code-handoff.md after acceptance"

# ─────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────
rules:
  ALWAYS:
  - "Render the consolidated prompt and wait for the bundled reply before motion work"
  - "Load creation-contract.md before motion work"
  - "Prove the canonical route before producing the motion spec"
  - "Ground one behavior-changing decision"
  - "Run anti-default critique with one named criterion"
  - "Qualify evidence with typed levels and an explicit ceiling"
  NEVER:
  - "Skip the creation contract or route proof"
  - "Prepare handoff before design output is accepted"
  - "Ship motion without a semantic reduced-motion equivalent"
  - "Proceed past step_0 before the consolidated reply is received"

pipeline:
  stage: "behavior - specifies temporal behavior after direction or foundations and before audit or build"
  accepts_from: ["/interface:audit", "/interface:foundations", "/interface:design"]
  hands_to_next: ["/interface:design", "/interface:foundations", "/interface:audit"]
  recommend_only: true
  hands_to_build: "sk-code, via .opencode/skills/sk-design/shared/sk-code-handoff.md, only after acceptance"
