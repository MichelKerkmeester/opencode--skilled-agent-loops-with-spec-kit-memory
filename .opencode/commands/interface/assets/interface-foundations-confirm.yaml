# ─────────────────────────────────────────────────────────────────
# SK-DESIGN INTERFACE: FOUNDATIONS CREATION WORKFLOW (CONFIRM MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: interactive (one consolidated confirmation prompt, then autonomous)
# Delegates shared lifecycle/envelope/authority/proof vocabulary to
# creation-contract.md; this file carries only the foundations
# workflow and the command-standard scaffolding.
# ─────────────────────────────────────────────────────────────────
role: sk-design foundations creation command, interactive execution
purpose: Create static foundations for a target
action: Resolve confirmation-required fields once, then apply workflowMode=foundations

operating_mode:
  workflow: sequential_creation_contract
  workflow_compliance: MANDATORY
  workflow_execution: interactive_then_autonomous
  approvals: consolidated_prompt_once
  intake: progressive
  tracking: progressive_step_outputs
  validation: continuous_self_validation
  confirmation: "Wait for the bundled reply before foundations work"
  description: |
    Collects every confirmation-required decision once via the presentation
    prompt, then runs the foundations workflow to completion,
    delegating shared lifecycle/envelope/authority/proof vocabulary to
    creation-contract.md.

checkpoint:
  source: ".opencode/commands/interface/assets/interface-foundations-presentation.txt"
  wait_for: user_reply

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with citable source" }
    medium: { range: "40-79%", action: "Proceed with caution, record bounded assumptions" }
    low: { range: "0-39%", action: "STOP - fold the unresolved field into the consolidated prompt" }
  scoring_weights:
    brief_clarity: 0.30
    grounding_fit: 0.25
    system_and_axes: 0.25
    proof_bar: 0.20
  escalation:
    timebox_minutes: 10
    failed_attempts_threshold: 2
    action: "Present the unresolved field to the operator with current findings"

# ─────────────────────────────────────────────────────────────────
# INPUT CONTRACT
# ─────────────────────────────────────────────────────────────────
input_contract:
  required:
  - target
  optional:
  - register
  - density
  - accessibility_target
  - preserve_constraints

# ─────────────────────────────────────────────────────────────────
# CHECKPOINT OPTIONS
# ─────────────────────────────────────────────────────────────────
checkpoint_options:
  standard:
  - label: "Approve"
    description: "Approve the resolved brief and continue"
  - label: "Review"
    description: "Show the resolved brief and grounding record"
  - label: "Modify"
    description: "Adjust register, density, or constraints before proceeding"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW ENFORCEMENT
# ─────────────────────────────────────────────────────────────────
workflow_enforcement:
  mode: strict
  step_order: sequential_mandatory
  skip_allowed: false
  confirmation_gate:
    location: "step_0 before any foundations work"
    purpose: "Collect all confirmation-required decisions in one bundled prompt"
    requirements:
    - "Consolidated prompt rendered from the presentation asset"
    - "Operator reply received before step_1"
    action_if_failed: "WAIT for the bundled reply"
  creation_contract_gate:
    location: "Between step_2 and step_3"
    purpose: "Verify the shared creation contract is loaded before route proof and foundations work"
    requirements:
    - "creation-contract.md read (lifecycle, envelope, authority, proof vocabulary)"
    - "route proof recorded (command, workflowMode)"
    action_if_failed: "STOP and return to the contract-load step"
  critical_steps:
    step_5_progressive_brief:
      enforcement: "MUST classify every field as resolved, auto-resolvable, or confirmation-required"
      verification: "No confirmation-required field left unresolved before foundations work"
    step_9_run_foundations_work:
      enforcement: "MUST produce the applicable static-system artifacts before any handoff"
      verification: "Deliverable visible_blocks are populated, not placeholders"
    step_11_proof:
      enforcement: "MUST qualify evidence with typed levels and an explicit ceiling"
      verification: "Evidence ledger present with an honest proof bar"

gate_logic:
  hard:
    H0_confirmation:
      description: "The consolidated confirmation reply must be received before foundations work"
      fail_action: "WAIT for the bundled reply"
    H1_route_proof:
      description: "The canonical /interface:foundations route + workflowMode=foundations must be proven"
      fail_action: "STOP and record the route proof"
    H2_creation_contract:
      description: "The shared creation contract must be loaded before foundations work"
      fail_action: "STOP and load creation-contract.md"
    H3_acceptance_before_handoff:
      description: "Implementation handoff only after accepted design output"
      fail_action: "Hold handoff until acceptance"
  soft:
    S1_bounded_assumptions:
      description: "Auto-resolvable fields may proceed with recorded bounded assumptions"
      fail_action: "Proceed with rationale"

# ─────────────────────────────────────────────────────────────────
# CIRCUIT BREAKER
# ─────────────────────────────────────────────────────────────────
circuit_breaker:
  consecutive_failure_threshold: 3
  states:
    closed: "Normal operation"
    open: "3+ failures - pause and report to the operator"
    half_open: "Single retry before resuming"
  on_open:
    action: "Report failures with a summary of the unresolved brief"
    suggest: "Resolve the blocked field or defer to a sibling route"

# ─────────────────────────────────────────────────────────────────
# AUTONOMOUS EXECUTION (after the consolidated confirmation)
# ─────────────────────────────────────────────────────────────────
autonomous_execution:
  principle: "After the bundled reply, execute the workflow steps sequentially without further approval gates"
  decision_making: "Use the confidence framework to self-assess at each step"
  self_validation_approach:
    continuous: "Self-validate at each step output"
    confidence_threshold: "Stop only if confidence < 40%"
    error_handling: "Apply error_recovery strategies automatically"
  uncertainty_handling: "If a confirmation-required field is unresolved, fold it into the consolidated prompt"
  progress_tracking: "Record each step output"
  completion_criteria: "All steps validated, deliverable produced, status contract emitted"

# ─────────────────────────────────────────────────────────────────
# QUALITY STANDARDS
# ─────────────────────────────────────────────────────────────────
quality_standards:
  proof_first: true
  anti_default_critique: required
  evidence_typing: "Typed evidence levels with an explicit ceiling; no-fit is a valid outcome"
  contract_references:
    creation_contract: ".opencode/skills/sk-design/shared/creation-contract.md"
    context_loading_contract: ".opencode/skills/sk-design/shared/context-loading-contract.md"
    handoff_contract: ".opencode/skills/sk-design/shared/sk-code-handoff.md"

task_projections:
  typeset: "Apply within workflowMode=foundations."
  colorize: "Apply within workflowMode=foundations."
  negative_corpus: "These are advisory verbs, never standalone commands."

workflow:
  step_0_show_prompt:
    purpose: Collect all confirmation-required decisions once
    action: "Render .opencode/commands/interface/assets/interface-foundations-presentation.txt and wait"
    output: confirmed_inputs
  step_1_load_hub:
    purpose: Load the registry-driven design hub
    action: "Read .opencode/skills/sk-design/SKILL.md and mode-registry.json"
    output: hub_context
  step_2_load_creation_contract:
    purpose: Establish the shared lifecycle and evidence vocabulary
    action: "Read .opencode/skills/sk-design/shared/creation-contract.md"
    output: creation_contract
  step_3_route_proof:
    purpose: Prove the canonical static-system route
    action: "Record command=/interface:foundations, workflowMode=foundations, and proof environment"
    output: route_proof
  step_4_context_manifest:
    purpose: Load target, real content, existing tokens, constraints, viewports, themes, and runtime context
    action: "Read .opencode/skills/sk-design/shared/context-loading-contract.md and name loaded sources"
    output: context_manifest
  step_5_progressive_brief:
    purpose: Resolve register, visual problem, density, accessibility target, preserve constraints, and output
    action: "Classify facts and record bounded reversible assumptions"
    output: resolved_brief
  step_6_grounding:
    purpose: Ground the static scaffold in owned precedent or one named principle
    action: "Record provenance, fit axes, decision changed, and limitations; no-fit is valid"
    output: grounding_record
  step_7_load_mode:
    purpose: Load the stable foundations mode and applicable static references
    action: "Read .opencode/skills/sk-design/design-foundations/SKILL.md, then references/ and assets as required"
    output: mode_context
  step_8_select_procedure_card:
    purpose: Select at most one private card or the explicit fallback
    action: "Choose procedures/tweakable-design-controls.md, procedures/component-system-inventory.md, procedures/hierarchy-rhythm-review.md, or ../shared/procedures/polish-gate-orchestration.md when its trigger matches; otherwise state 'Procedure applied: none - baseline foundations workflow'"
    output: mode_plan
  step_9_run_foundations_work:
    purpose: Produce only applicable static-system artifacts
    action: "Create primitive, semantic, and component tokens plus type roles, spacing rhythm, grid/measure, hierarchy, responsive deltas, and theme deltas as applicable"
    output: foundations_plan
  step_10_critique_revision:
    purpose: Test the scaffold against real content and one named static criterion
    action: "Revise only the failed static criterion and preserve accepted constraints"
    output: critique_validation
  step_11_proof:
    purpose: Validate deterministic static gates and declare runtime ceiling
    action: "Run token/schema and applicable contrast/layout checks; separate authored direction from browser-measured evidence"
    output: evidence_ledger
  step_12_prepare_handoff:
    purpose: Prepare implementation handoff only when accepted design output moves to code
    action: "Read .opencode/skills/sk-design/shared/sk-code-handoff.md and preserve exact token roles and values"
    output: next_action_handoff

deliverable:
  name: "Visual System Foundations Plan"
  visible_blocks: [Route Proof, Resolved Brief, Context Manifest, Grounding Record, Creation/Remediation Artifact, Critique/Validation, Evidence Ledger, Next Action/Handoff]
  required_fields: [axis, target, tokenDecisions, contrastEvidence]

status_contract:
  success: 'STATUS=OK PRODUCES="Visual System Foundations Plan" NEXT=/interface:design,/interface:motion,/interface:audit PROOF=axis,target,tokenDecisions,contrastEvidence'
  missing_input: "STATUS=ASK MISSING=<input>"
  cannot_run: "STATUS=FAIL ERROR=<named-cause>"
  route_instead: "STATUS=DEFER ROUTE=<hub|sibling>"

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY
# ─────────────────────────────────────────────────────────────────
error_recovery:
  missing_target:
    action: "Fold target into the consolidated prompt and wait"
  no_fit_grounding:
    action: "Record 'no-fit' as a valid grounding outcome and proceed with the owned system"
  contract_not_loaded:
    action: "Return to the creation-contract load step before continuing"
  acceptance_conflict:
    action: "Request explicit amendment for conflicting accepted decisions"

# ─────────────────────────────────────────────────────────────────
# TERMINATION
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: step_12_prepare_handoff
  message: "Visual system foundations workflow complete."
  next_steps:
  - action: "Run /interface:design to frame or reframe direction"
  - action: "Run /interface:motion for behavior"
  - action: "Run /interface:audit to QA the system"
  - action: "Hand to sk-code via sk-code-handoff.md after acceptance"

# ─────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────
rules:
  ALWAYS:
  - "Render the consolidated prompt and wait for the bundled reply before foundations work"
  - "Load creation-contract.md before foundations work"
  - "Prove the canonical route before producing artifacts"
  - "Ground the static scaffold in owned precedent or one named principle"
  - "Run anti-default critique with one named static criterion"
  - "Qualify evidence with typed levels and an explicit ceiling"
  NEVER:
  - "Turn task_projection verbs into standalone commands"
  - "Skip the creation contract or route proof"
  - "Prepare handoff before design output is accepted"
  - "Proceed past step_0 before the consolidated reply is received"

pipeline:
  stage: "system - turns direction or measured evidence into static visual-system decisions"
  accepts_from: ["/interface:audit", "/interface:design", "/interface:design-reference", "/interface:motion"]
  hands_to_next: ["/interface:design", "/interface:motion", "/interface:audit"]
  recommend_only: true
  hands_to_build: "sk-code, via .opencode/skills/sk-design/shared/sk-code-handoff.md, only after acceptance"
