# ─────────────────────────────────────────────────────────────────
# MODEL BENCHMARK: EVALUATION LOOP (AUTONOMOUS MODE)
# ─────────────────────────────────────────────────────────────────
role: Model Benchmark Specialist using deep-improvement model-benchmark mode autonomously
purpose: Profile-driven model and prompt-framework benchmarking with deterministic fixture scoring and guarded promotion
action: Resolve a benchmark profile, materialize fixtures, score model variants across fixtures, reduce evidence, and decide keep/reject/promote

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: iterative_evaluation_loop
  workflow_compliance: MANDATORY
  workflow_execution: autonomous
  approvals: none
  tracking: append_only_jsonl_ledger
  validation: profile_driven_fixture_scoring
  promotion: guarded_canonical_only
  description: |
    Executes the model benchmark loop without step-by-step approval.
    Each iteration: resolve profile -> run loop-host model-benchmark (materialize then run-benchmark) -> reduce -> decide.
    The benchmark scores model or prompt-framework variants against deterministic fixtures using the selected scorer.
    Stops when: max iterations reached, benchmark scores plateau (3+ identical aggregate scores),
    infra failures exceed threshold, or reducer signals shouldStop.

# ─────────────────────────────────────────────────────────────────
# EVALUATION PHILOSOPHY
# ─────────────────────────────────────────────────────────────────
evaluation_philosophy:
  principle: "Prove improvement before promotion"
  approach: "Profile-driven fixture benchmarking with deterministic scoring"
  mandate: "Every variant is bounded, every score is repeatable, every decision is auditable"

# ─────────────────────────────────────────────────────────────────
# USER INPUTS
# ─────────────────────────────────────────────────────────────────
user_inputs:
  profile: "[PROFILE] - Path or ID of the benchmark profile. Default: .opencode/skills/deep-improvement/assets/model-benchmark/benchmark-profiles/default.json."
  scoring_method: "[SCORING_METHOD] - 'pattern' for the default heading/pattern matcher, '5dim' for the ported 5-dimension scorer. Default: pattern."
  grader: "[GRADER] - 'noop' deterministic no-dispatch grader, 'mock', or 'llm' (model dispatch). Default: noop."
  spec_folder: "[SPEC_FOLDER] - Spec folder path for benchmark runtime. REQUIRED."
  max_iterations: "[MAX_ITERATIONS] - Maximum loop iterations before forced stop. Default: 5."
  target_model: "[TARGET_MODEL] - Model identifier dispatched only when grader=llm. Optional; ignored for noop/mock graders."
  execution_mode: "[EXECUTION_MODE] - AUTONOMOUS or INTERACTIVE. Derived from :auto/:confirm suffix."

# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  defaults:
    profile_empty: ".opencode/skills/deep-improvement/assets/model-benchmark/benchmark-profiles/default.json"
    scoring_method_empty: "pattern"
    grader_empty: "noop"
    max_iterations_empty: "5"
    target_model_empty: "Unused unless grader == 'llm'"
  validation:
    spec_folder_required: true
    profile_must_resolve: "Profile path or ID must resolve to an existing profile JSON before phase_loop"
    scoring_method_enum: "Must be one of: pattern, 5dim"
    grader_enum: "Must be one of: noop, mock, llm"
    target_model_required_when_llm: "When grader == 'llm', target_model MUST be provided"

# ─────────────────────────────────────────────────────────────────
# CONTEXT LOADING
# ─────────────────────────────────────────────────────────────────
context_loading:
  trigger: "At workflow START, before phase_init"
  mcp_integration:
    tool: memory_search
    note: "Call MCP tools directly - NEVER through Code Mode"
    parameters: { query: "model benchmark context for {profile}", specFolder: "{spec_folder}", anchors: ['summary', 'decisions', 'state', 'improvement'] }
  command_reference: "/memory:search"
  when_to_skip: ["First-time benchmark of this profile", "User explicitly says 'skip context' or 'fresh start'", "No spec folder context exists"]
  behavior:
    if_context_found: "Surface prior benchmark history, best-known aggregate scores, and scoring-method trends before first iteration"
    if_no_context: "Proceed to phase_init without delay"

# ─────────────────────────────────────────────────────────────────
# SKILL REFERENCE
# ─────────────────────────────────────────────────────────────────
skill_reference:
  skill: deep-improvement
  skill_md: .opencode/skills/deep-improvement/SKILL.md
  templates:
    config: .opencode/skills/deep-improvement/assets/agent-improvement/improvement_config.json
    default_profile: .opencode/skills/deep-improvement/assets/model-benchmark/benchmark-profiles/default.json
  scripts:
    loop_host: .opencode/skills/deep-improvement/scripts/shared/loop-host.cjs
    benchmark_materializer: .opencode/skills/deep-improvement/scripts/shared/materialize-benchmark-fixtures.cjs
    benchmark: .opencode/skills/deep-improvement/scripts/model-benchmark/run-benchmark.cjs
    scorer_5dim: .opencode/skills/deep-improvement/scripts/model-benchmark/scorer/score-model-variant.cjs
    dispatch_model: .opencode/skills/deep-improvement/scripts/model-benchmark/dispatch-model.cjs
    promoter: .opencode/skills/deep-improvement/scripts/shared/promote-candidate.cjs
    journal: .opencode/skills/deep-improvement/scripts/shared/improvement-journal.cjs
    reducer: .opencode/skills/deep-improvement/scripts/shared/reduce-state.cjs

# ─────────────────────────────────────────────────────────────────
# STATE PATHS
# ─────────────────────────────────────────────────────────────────
state_paths:
  runtime_root: "{spec_folder}/improvement"
  config: "{spec_folder}/improvement/model-benchmark-config.json"
  state_log: "{spec_folder}/improvement/agent-improvement-state.jsonl"
  dashboard: "{spec_folder}/improvement/agent-improvement-dashboard.md"
  registry: "{spec_folder}/improvement/experiment-registry.json"
  journal: "{spec_folder}/improvement/improvement-journal.jsonl"
  benchmark_root: ".opencode/skills/sk-prompt-small-model/benchmarks/{run_label}"
  benchmark_report: ".opencode/skills/sk-prompt-small-model/benchmarks/{run_label}/report.json"
  lock_file: "{spec_folder}/improvement/.deep-improvement.lock"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_init:
    description: "Resolve benchmark profile, create runtime structure, record baseline"
    steps:
      step_session_boundary_gate:
        description: "Gate the run to a fresh standalone session boundary before init writes"
        verify:
          - lineage_mode_must_equal_new: "Model-benchmark currently ships only `new` sessions; resume/restart/fork/completed-continue are not runtime-wired."
          - existing_runtime_must_be_archived: "If {spec_folder}/improvement already exists from a prior run, archive or replace it instead of resuming in place."
          - dormant_resume_fields_disallowed: "Do not populate continuedFromIteration, resumeMode, or carried-forward parentSessionId state."
        on_fail: "Halt with STATUS=FAIL and instruct the operator to archive the prior improvement packet before re-running."
      step_acquire_lock:
        action: "Acquire the advisory lock before any init writes to prevent cross-session races on the shared agent-improvement-state.jsonl"
        command: "Open {state_paths.lock_file} with exclusive non-blocking advisory locking semantics; fail closed on contention."
        note: "model-benchmark writes to the same agent-improvement-state.jsonl as the agent-improvement loop; the shared lock file prevents two concurrent runs from racing on that file. Sessions within the same orchestrator process are serialized by design."
        on_halt:
          action: "Release {state_paths.lock_file} before any terminal halt branch returns control"
          command: "Remove or close-with-release {state_paths.lock_file}; failures here are logged but do not block the halt"
        on_cancel:
          action: "Release {state_paths.lock_file} on user cancel"
          command: "Remove or close-with-release {state_paths.lock_file}; cancel completes regardless of cleanup result"
        on_workflow_exit:
          action: "Release {state_paths.lock_file} as the final step of any workflow exit path (success or failure)"
          command: "Remove or close-with-release {state_paths.lock_file}; idempotent — safe to invoke when already released"
      step_resolve_profile:
        description: "Resolve the benchmark profile path or ID, defaulting to the bundled default profile"
        action: "Bind {profile} to the user-supplied profile or, when empty, to .opencode/skills/deep-improvement/assets/model-benchmark/benchmark-profiles/default.json; verify it resolves to an existing profile JSON."
      step_create_directories:
        description: "Create benchmark runtime directories including the outputs dir"
        command: "mkdir -p .opencode/skills/sk-prompt-small-model/benchmarks/{run_label}"
      step_copy_templates:
        description: "Copy config template into runtime root"
        action: "Copy the improvement config template into the runtime root"
      step_record_baseline:
        description: "Record baseline benchmark state in append-only ledger"
        action: "Append a baseline record for profile {profile} into agent-improvement-state.jsonl"
      step_emit_journal_event:
        description: "Emit session_start journal event before the first loop iteration begins"
        command: "node .opencode/skills/deep-improvement/scripts/shared/improvement-journal.cjs --emit session_start --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"target\":\"{profile}\",\"startedAt\":\"{started_at}\"}'"

  phase_loop:
    description: "Iterative benchmark -> reduce cycle"
    repeat: true
    max_repeats: "{max_iterations}"
    steps:
      step_run_benchmark:
        description: "Run the model-benchmark loop host: materialize fixtures then run-benchmark (EC-5 ordering, internal to loop-host)"
        command: "node .opencode/skills/deep-improvement/scripts/shared/loop-host.cjs --mode=model-benchmark --profile \"{profile}\" --outputs-dir \".opencode/skills/sk-prompt-small-model/benchmarks/{run_label}\" --scorer \"{scoring_method}\" --grader \"{grader}\""
      step_emit_journal_event_benchmark_completed:
        description: "Emit benchmark_completed journal event after report.json exists"
        command: "test -f .opencode/skills/sk-prompt-small-model/benchmarks/{run_label}/report.json && node .opencode/skills/deep-improvement/scripts/shared/improvement-journal.cjs --emit benchmark_completed --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"iteration\":\"{iteration}\",\"profile\":\"{profile}\",\"benchmarkOutputPath\":\".opencode/skills/sk-prompt-small-model/benchmarks/{run_label}/report.json\",\"scoringMethod\":\"{scoring_method}\"}'"
      step_append_ledger:
        description: "Verify the benchmark_run ledger row written by run-benchmark.cjs"
        ledger_ownership: "run-benchmark.cjs is the sole ledger writer. It appends the benchmark_run row (with mode, scoringMethod, and aggregate score) when it can infer the state-log path. This step VERIFIES that row exists. The orchestrator does NOT append a duplicate."
        action: "Confirm a benchmark_run row for this iteration was appended to agent-improvement-state.jsonl by run-benchmark.cjs; if the runner could not infer the state-log path, re-run with an explicit --state-log so the runner writes it."
      step_reduce:
        description: "Refresh dashboard, registry, and benchmark progress"
        command: "node .opencode/skills/deep-improvement/scripts/shared/reduce-state.cjs {spec_folder}/improvement"
      step_stop_check:
        description: "Evaluate stop conditions: score plateau, infra failure, weak aggregate, max iterations"
        action: "Stop if experiment-registry.json reports stopStatus.shouldStop: true"
      step_emit_journal_event_legal_stop_evaluated:
        description: "Emit legal_stop_evaluated journal event after stop-condition evaluation"
        command: "node .opencode/skills/deep-improvement/scripts/shared/improvement-journal.cjs --emit legal_stop_evaluated --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"iteration\":\"{iteration}\",\"scoringMethod\":\"{scoring_method}\",\"stopReason\":\"{stop_reason}\"}'"

  phase_synthesis:
    description: "After loop exits, summarize findings and recommend next action"
    steps:
      step_final_dashboard:
        description: "Render the final dashboard via reduce-state and present benchmark trends and stop reason"
        command: "node .opencode/skills/deep-improvement/scripts/shared/reduce-state.cjs {spec_folder}/improvement"
      step_recommendation:
        description: "Recommend continue, promote, or stop based on reducer output and the benchmark report scoringMethod"
        action: "Check experiment-registry.json for the best benchmark record and stopStatus; read scoringMethod from .opencode/skills/sk-prompt-small-model/benchmarks/{run_label}/report.json"
      step_promote_candidate:
        description: "Offer optional promotion of the accepted benchmark variant to canonical target (guarded benchmark-mode path, requires benchmark evidence)"
        promotion_evidence: "Lane B promotes on benchmark evidence. The gate is the benchmark report (.opencode/skills/sk-prompt-small-model/benchmarks/{run_label}/report.json) passed via --benchmark-report. promote-candidate.cjs runs its benchmark-mode path when --score is omitted, reads status, recommendation, target, profileId, and aggregateScore from the report, and refuses promotion unless status is benchmark-complete with a benchmark-pass recommendation and a passing aggregate and repeatability gate. There is no scored agent file and no --score argument in Lane B."
        command: "node .opencode/skills/deep-improvement/scripts/shared/promote-candidate.cjs --candidate={candidate_path} --target={target_path} --benchmark-report=.opencode/skills/sk-prompt-small-model/benchmarks/{run_label}/report.json --config={spec_folder}/improvement/model-benchmark-config.json --manifest={spec_folder}/improvement/target_manifest.jsonc --archive-dir={spec_folder}/improvement/archive --approve"
      step_report_status:
        description: "Report STATUS with the benchmark outcome and scoring method"
        action: "Report STATUS=benchmark-complete with scoringMethod={scoring_method}, grader={grader}, and the final aggregate score"
      step_release_lock:
        description: "Release the advisory lock as the final step of synthesis"
        command: "Close or unlock {state_paths.lock_file} using advisory semantics only."
        append_to_jsonl: '{"type":"event","event":"lock_released","path":"{state_paths.lock_file}","releasePhase":"synthesis","timestamp":"{ISO_8601_NOW}"}'
      step_emit_journal_event:
        description: "Emit session_end journal event after synthesis completes"
        outcome_binding: "Bind {session_outcome} to a canonical sessionOutcome enum value (keptBaseline | promoted | rolledBack | advisoryOnly). A benchmark run that did not promote a variant binds advisoryOnly. A promoted variant binds promoted."
        command: "node .opencode/skills/deep-improvement/scripts/shared/improvement-journal.cjs --emit session_end --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"stopReason\":\"{stop_reason}\",\"sessionOutcome\":\"{session_outcome}\",\"scoringMethod\":\"{scoring_method}\",\"endedAt\":\"{ended_at}\",\"totalIterations\":\"{total_iterations}\"}'"
