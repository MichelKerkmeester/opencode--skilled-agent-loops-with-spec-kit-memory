# ─────────────────────────────────────────────────────────────────
# SK-DESIGN INTERFACE: AUDIT CREATION WORKFLOW (CONFIRM MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: interactive (one consolidated confirmation prompt, then autonomous)
# Delegates shared lifecycle/envelope/authority/proof vocabulary to
# creation-contract.md; this file carries only the audit
# workflow and the command-standard scaffolding.
# ─────────────────────────────────────────────────────────────────
role: sk-design audit creation command, interactive execution
purpose: Diagnose a design surface, create bounded remediation, and re-verify
action: Resolve confirmation-required fields once, then apply workflowMode=audit

operating_mode:
  workflow: sequential_creation_contract
  workflow_compliance: MANDATORY
  workflow_execution: interactive_then_autonomous
  approvals: consolidated_prompt_once
  intake: progressive
  tracking: progressive_step_outputs
  validation: continuous_self_validation
  confirmation: "Wait for the bundled reply before audit work"
  description: |
    Collects every confirmation-required decision once via the presentation
    prompt, then runs the audit workflow to completion,
    delegating shared lifecycle/envelope/authority/proof vocabulary to
    creation-contract.md.

checkpoint:
  source: ".opencode/commands/interface/assets/interface-audit-presentation.txt"
  wait_for: user_reply

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with citable source" }
    medium: { range: "40-79%", action: "Proceed with caution, record bounded assumptions" }
    low: { range: "0-39%", action: "STOP - fold the unresolved field into the consolidated prompt" }
  scoring_weights:
    brief_clarity: 0.30
    grounding_fit: 0.25
    evidence_and_severity: 0.25
    proof_bar: 0.20
  escalation:
    timebox_minutes: 10
    failed_attempts_threshold: 2
    action: "Present the unresolved field to the operator with current findings"

# ─────────────────────────────────────────────────────────────────
# INPUT CONTRACT
# ─────────────────────────────────────────────────────────────────
input_contract:
  required:
  - target
  optional:
  - scope
  - baseline
  - severity_policy
  - axes

# ─────────────────────────────────────────────────────────────────
# CHECKPOINT OPTIONS
# ─────────────────────────────────────────────────────────────────
checkpoint_options:
  standard:
  - label: "Approve"
    description: "Approve the resolved brief and continue"
  - label: "Review"
    description: "Show the resolved brief and grounding record"
  - label: "Modify"
    description: "Adjust scope, baseline, or severity policy before proceeding"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW ENFORCEMENT
# ─────────────────────────────────────────────────────────────────
workflow_enforcement:
  mode: strict
  step_order: sequential_mandatory
  skip_allowed: false
  confirmation_gate:
    location: "step_0 before any audit work"
    purpose: "Collect all confirmation-required decisions in one bundled prompt"
    requirements:
    - "Consolidated prompt rendered from the presentation asset"
    - "Operator reply received before step_1"
    action_if_failed: "WAIT for the bundled reply"
  creation_contract_gate:
    location: "Between step_2 and step_3"
    purpose: "Verify the shared creation contract is loaded before route proof and audit work"
    requirements:
    - "creation-contract.md read (lifecycle, mutation boundary, evidence vocabulary)"
    - "route proof recorded (command, workflowMode, measurement transport when needed)"
    action_if_failed: "STOP and return to the contract-load step"
  critical_steps:
    step_5_progressive_brief:
      enforcement: "MUST classify every field as resolved, auto-resolvable, or confirmation-required"
      verification: "No confirmation-required field left unresolved before audit work"
    step_9_run_audit_work:
      enforcement: "MUST produce reproducible findings and bounded remediation before any handoff"
      verification: "Deliverable visible_blocks are populated, not placeholders"
    step_11_proof:
      enforcement: "MUST qualify evidence with typed levels and an explicit ceiling"
      verification: "Evidence ledger present with an honest proof bar"

gate_logic:
  hard:
    H0_confirmation:
      description: "The consolidated confirmation reply must be received before audit work"
      fail_action: "WAIT for the bundled reply"
    H1_route_proof:
      description: "The canonical /interface:audit route + workflowMode=audit must be proven"
      fail_action: "STOP and record the route proof"
    H2_creation_contract:
      description: "The shared creation contract must be loaded before audit work"
      fail_action: "STOP and load creation-contract.md"
    H3_acceptance_before_handoff:
      description: "Implementation handoff only after accepted findings"
      fail_action: "Hold handoff until acceptance"
  soft:
    S1_bounded_assumptions:
      description: "Auto-resolvable fields may proceed with recorded bounded assumptions"
      fail_action: "Proceed with rationale"

# ─────────────────────────────────────────────────────────────────
# CIRCUIT BREAKER
# ─────────────────────────────────────────────────────────────────
circuit_breaker:
  consecutive_failure_threshold: 3
  states:
    closed: "Normal operation"
    open: "3+ failures - pause and report to the operator"
    half_open: "Single retry before resuming"
  on_open:
    action: "Report failures with a summary of the unresolved brief"
    suggest: "Resolve the blocked field or defer to a sibling route"

# ─────────────────────────────────────────────────────────────────
# AUTONOMOUS EXECUTION (after the consolidated confirmation)
# ─────────────────────────────────────────────────────────────────
autonomous_execution:
  principle: "After the bundled reply, execute the workflow steps sequentially without further approval gates"
  decision_making: "Use the confidence framework to self-assess at each step"
  self_validation_approach:
    continuous: "Self-validate at each step output"
    confidence_threshold: "Stop only if confidence < 40%"
    error_handling: "Apply error_recovery strategies automatically"
  uncertainty_handling: "If a confirmation-required field is unresolved, fold it into the consolidated prompt"
  progress_tracking: "Record each step output"
  completion_criteria: "All steps validated, deliverable produced, status contract emitted"

# ─────────────────────────────────────────────────────────────────
# QUALITY STANDARDS
# ─────────────────────────────────────────────────────────────────
quality_standards:
  proof_first: true
  anti_default_critique: required
  evidence_typing: "Typed evidence levels with an explicit ceiling; no-fit is a valid outcome"
  contract_references:
    creation_contract: ".opencode/skills/sk-design/shared/creation-contract.md"
    context_loading_contract: ".opencode/skills/sk-design/shared/context-loading-contract.md"
    handoff_contract: ".opencode/skills/sk-design/shared/sk-code-handoff.md"

task_projections:
  harden: "Apply within workflowMode=audit."
  polish: "Apply within workflowMode=audit."
  negative_corpus: "These are advisory verbs, never standalone commands."

workflow:
  step_0_show_prompt:
    purpose: Collect all confirmation-required decisions once
    action: "Render .opencode/commands/interface/assets/interface-audit-presentation.txt and wait"
    output: confirmed_inputs
  step_1_load_hub:
    purpose: Load the registry-driven design hub
    action: "Read .opencode/skills/sk-design/SKILL.md and mode-registry.json"
    output: hub_context
  step_2_load_creation_contract:
    purpose: Establish the shared lifecycle, mutation boundary, and evidence vocabulary
    action: "Read .opencode/skills/sk-design/shared/creation-contract.md"
    output: creation_contract
  step_3_route_proof:
    purpose: Prove the canonical audit route and evidence ceiling
    action: "Record command=/interface:audit, workflowMode=audit, measurement transport if needed, and proof environment"
    output: route_proof
  step_4_context_manifest:
    purpose: Load target state, journeys, viewports, constraints, baseline, axes, severity policy, and runtime evidence
    action: "Read .opencode/skills/sk-design/shared/context-loading-contract.md and name loaded and blocked evidence"
    output: context_manifest
  step_5_progressive_brief:
    purpose: Resolve scope, baseline, mutation boundary, and acceptance
    action: "Classify facts; always require confirmation before audit mutation"
    output: resolved_brief
  step_6_grounding:
    purpose: Establish observable controls rather than aesthetic preference
    action: "Record baseline or control provenance, scenario, decision changed, and limitations; no-fit is valid but no baseline means no improvement claim"
    output: grounding_record
  step_7_load_mode:
    purpose: Load the stable audit mode and required evidence references
    action: "Read .opencode/skills/sk-design/design-audit/SKILL.md, then references/ and assets as required"
    output: mode_context
  step_8_select_procedure_card:
    purpose: Select at most one private card or the explicit fallback
    action: "Choose procedures/accessibility-audit.md, procedures/ai-slop-check.md, or ../shared/procedures/polish-gate-orchestration.md when its trigger matches; otherwise state 'Procedure applied: none - baseline audit workflow'"
    output: mode_plan
  step_9_run_audit_work:
    purpose: Produce reproducible findings and bounded remediation before mutation
    action: "Capture observations, label severity and confidence, cluster root causes, and define remediation acceptance criteria; do not apply fixes"
    output: design_quality_audit_report
  step_10_critique_revision:
    purpose: Validate findings against evidence and scope
    action: "Reject unsupported aesthetic findings and narrow remediation to evidenced causes"
    output: critique_validation
  step_11_proof:
    purpose: Re-test matched scenarios and qualify the verdict
    action: "Compare matched baseline and re-test evidence when available; otherwise report the explicit evidence ceiling and residual risks"
    output: evidence_ledger
  step_12_prepare_handoff:
    purpose: Prepare implementation handoff only when accepted design output moves to code
    action: "Read .opencode/skills/sk-design/shared/sk-code-handoff.md; emit accepted findings only and require explicit amendment for conflicts"
    output: next_action_handoff

deliverable:
  name: "Design Quality Audit Report"
  visible_blocks: [Route Proof, Resolved Brief, Context Manifest, Grounding Record, Creation/Remediation Artifact, Critique/Validation, Evidence Ledger, Next Action/Handoff]
  required_fields: [target, evidenceInventory, severityFindings, qualityScore]

status_contract:
  success: 'STATUS=OK PRODUCES="Design Quality Audit Report" NEXT=/interface:foundations,/interface:design,/interface:motion PROOF=target,evidenceInventory,severityFindings,qualityScore'
  missing_input: "STATUS=ASK MISSING=<input>"
  cannot_run: "STATUS=FAIL ERROR=<named-cause>"
  route_instead: "STATUS=DEFER ROUTE=<hub|sibling>"

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY
# ─────────────────────────────────────────────────────────────────
error_recovery:
  missing_target:
    action: "Fold target into the consolidated prompt and wait"
  no_fit_grounding:
    action: "Record 'no-fit' as a valid grounding outcome and proceed with the available baseline or control"
  contract_not_loaded:
    action: "Return to the creation-contract load step before continuing"
  acceptance_conflict:
    action: "Request explicit amendment for conflicting accepted findings"

# ─────────────────────────────────────────────────────────────────
# TERMINATION
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: step_12_prepare_handoff
  message: "Design quality audit workflow complete."
  next_steps:
  - action: "Run /interface:foundations to revise the static visual system"
  - action: "Run /interface:design to reframe direction"
  - action: "Run /interface:motion to revise behavior"
  - action: "Hand to sk-code via sk-code-handoff.md after finding acceptance"

# ─────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────
rules:
  ALWAYS:
  - "Render the consolidated prompt and wait for the bundled reply before audit work"
  - "Load creation-contract.md before audit work"
  - "Prove the canonical route before producing findings"
  - "Ground findings in observable controls, not aesthetic preference"
  - "Run anti-default critique with one named criterion"
  - "Qualify evidence with typed levels and an explicit ceiling"
  NEVER:
  - "Turn task_projection verbs into standalone commands"
  - "Skip the creation contract or route proof"
  - "Prepare handoff before findings are accepted"
  - "Proceed past step_0 before the consolidated reply is received"

pipeline:
  stage: "review - validates design output before the build handoff"
  accepts_from: ["/interface:foundations", "/interface:design", "/interface:design-reference", "/interface:motion"]
  hands_to_next: ["/interface:foundations", "/interface:design", "/interface:motion"]
  recommend_only: true
  hands_to_build: "sk-code, via .opencode/skills/sk-design/shared/sk-code-handoff.md, only after finding acceptance"
