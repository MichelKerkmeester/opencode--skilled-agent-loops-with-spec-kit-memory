---
# ──────────────────────────────────────────────────────────────────────────
# /doctor:skill-budget — interactive mode (read-only audit + checkpoint)
# Packet 086
# ──────────────────────────────────────────────────────────────────────────

command: /doctor:skill-budget:confirm
mode: INTERACTIVE
read_only: true

inputs:
  execution_mode: INTERACTIVE
  json_output: bool
  top_n: int
  fail_over: int|null
  project_ceiling: int

constants:
  audit_script: .opencode/commands/doctor/scripts/audit_descriptions.py
  reference_doc: .opencode/skills/sk-doc/assets/frontmatter_templates.md

phases:

  phase_0_audit:
    purpose: Run the description-budget audit (read-only)
    activities:
      - "Construct the command line and execute audit_script via Bash"
      - "Capture stdout and exit code"
    outputs:
      - report_text_or_json
      - exit_code

  phase_1_checkpoint:
    purpose: Present the report and ask whether to also run a fail-over check
    activities:
      - "Print the report (or surface a JSON path)"
      - "Ask the operator: 'Run --fail-over=[project_ceiling] check now?'"
    options:
      - label: A
        description: "Yes - run the fail-over check"
        next_action: "Re-run audit_script with --fail-over=[project_ceiling]; surface exit code"
      - label: B
        description: "No - audit complete"
        next_action: "Return STATUS=OK"

final_status:
  ok: STATUS=OK
  fail: STATUS=FAIL ERROR="description budget exceeded threshold"
