<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clean Compact Metrics Card</title>
  <style>
    body {
      margin: 0;
      background: #f6f7f8;
      font-family: Inter, system-ui, sans-serif;
    }

    .metric-card {
      max-width: 340px;
      margin: 48px auto;
      padding: 24px;
      border: 1px solid #d8dee6;
      border-radius: 14px;
      box-shadow: 0 8px 12px rgba(15, 23, 42, 0.10);
      background: #ffffff;
    }

    .metric-card h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <article class="metric-card">
    <h1>Queue Health</h1>
    <p>All intake lanes are moving inside the target response window.</p>
  </article>
</body>
</html>
