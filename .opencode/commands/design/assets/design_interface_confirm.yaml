# ─────────────────────────────────────────────────────────────────
# DESIGN INTERFACE WORKFLOW (INTERACTIVE MODE)
# ─────────────────────────────────────────────────────────────────
role: sk-design interface mode, interactive execution
purpose: Invent or reshape a distinctive interface direction for a surface
action: Show the consolidated setup prompt once, then apply the interface mode to $ARGUMENTS

operating_mode:
  workflow: single_pass
  approvals: consolidated_prompt_once
  validation: self_validated

user_inputs:
  target: "Interface target (surface, screen, or component set). REQUIRED."
  register: "[brand|product] - design posture. Default: auto-resolved from declared register field, task cue, or surface in focus."
  mode: "[direction|directions|redesign|preflight|build|aesthetic] - task lane. Default: direction."

checkpoint:
  type: consolidated_setup_prompt
  source: ".opencode/commands/design/assets/design_interface_presentation.txt Consolidated Prompt Template"
  shown: "Always, even when $ARGUMENTS is fully specified."
  wait_for: user_reply

task_lanes:
  direction: "Invent a distinctive interface direction (default)."
  directions: "Produce debiased options (--mode directions)."
  redesign: "Reshape an existing surface (--mode redesign)."
  preflight: "Run the pre-ship mechanical gate (--mode preflight)."
  build: "Run the real UI loop and emit the sk-code handoff manifest (--mode build)."
  aesthetic: "Name a realized look (--mode aesthetic)."
  not_owned: "Quality lanes (accessibility, contrast, scoring, hardening) route to /design:audit, not here."
  hidden_lanes: "register, copy-gate, grounding, and reference run inside the workflow; they are not surfaced as selectable tasks."

task_projections:
  note: "Advisory transform verbs are NOT standalone commands and NOT new modes. Route each into this workflow as the named lane behavior."
  bolder: "Push an interface surface louder with stronger hierarchy and committed choices."
  quieter: "Calm an interface surface while preserving its point of view."
  distill: "Reduce an interface surface to essentials without removing necessary function."
  delight: "Add an earned moment to an interface surface through the real-UI loop."
  negative_corpus: "None of these verbs is a /design:<verb> command. A request that asks to mint one as a top-level command is rejected; the verb routes into this mode instead."

workflow:
  step_0_show_prompt:
    purpose: Show the consolidated setup prompt and wait for the user's reply
    action: "Render the Consolidated Prompt Template from the presentation asset; wait for the reply before proceeding"
    output: resolved_inputs

  step_1_load_hub:
    purpose: Load the sk-design parent hub routing table and shared references
    action: "Read .opencode/skills/sk-design/SKILL.md"
    output: hub_context

  step_2_load_mode:
    purpose: Load the interface mode contract
    action: "Read .opencode/skills/sk-design/design-interface/SKILL.md, then its references/ and assets as the work requires"
    output: mode_context

  step_3_set_register_and_dials:
    purpose: Set the Brand-vs-Product register and read the brief into the variance/motion/density dials, before any visual choice
    action: "Read ../shared/register.md and references/design-process/brief_to_dials.md; state the result as a one-line Design Read"
    output: register_and_dials

  step_4_select_procedure_card:
    purpose: Select at most one private procedure card by request shape, or state the no-procedure fallback
    action: "Match the resolved inputs and task lane against the trigger table below; cite the selected card (or the fallback) by relative path before substantial output"
    trigger_table:
      - request_shape: "Missing material brief facts"
        card: "procedures/discovery_question_round.md"
      - request_shape: "Greenfield direction without a stronger brand/system (--mode direction, --mode aesthetic)"
        card: "procedures/aesthetic_direction.md"
      - request_shape: "Low-fidelity structure or storyboard"
        card: "procedures/wireframe_exploration.md"
      - request_shape: "Multiple high-fidelity directions or alternatives (--mode directions)"
        card: "procedures/variation_set.md"
      - request_shape: "Prototype, demo, or stateful interaction brief (--mode build)"
        card: "procedures/prototype_flow_spec.md"
      - request_shape: "Slide deck or presentation design"
        card: "procedures/deck_direction_spec.md"
      - request_shape: "Final polish across dimensions"
        card: "../shared/procedures/polish_gate_orchestration.md"
      - request_shape: "No trigger matches"
        card: "none - state 'Procedure applied: none - baseline interface workflow' and continue"
    output: selected_procedure_card

  step_5_run_two_pass_process:
    purpose: Run the interface mode's own core workflow against the resolved inputs and the selected procedure card's output
    action: "Ground the subject -> brainstorm a token system -> critique against AI-default looks -> build from the revised plan -> self-critique, per design-interface's Two-Pass Process"
    output: interface_direction_spec

  step_6_clear_mechanical_gates:
    purpose: "Clear the pre-ship mechanical gate before delivery (--mode preflight runs this as the primary lane)"
    action: "Fill in assets/interface_preflight_card.md (layout gate + content gate); every box is binary, a single fail means the surface is not done"
    output: preflight_result

  step_7_prepare_handoff:
    purpose: Prepare implementation handoff only when accepted design output moves to code
    action: "Read .opencode/skills/sk-design/shared/sk_code_handoff.md"
    condition: "Only when the user accepts the design output for build"
    output: handoff_manifest

deliverable:
  name: "Interface Direction Spec"
  required_fields: [target, register, designDials, preflightResult]

status_contract:
  success: 'STATUS=OK PRODUCES="Interface Direction Spec" NEXT=/design:foundations,/design:motion,/design:audit PROOF=target,register,designDials,preflightResult'
  missing_input: "STATUS=ASK MISSING=<input>, plus the Ask-first question from the presentation asset"
  cannot_run: "STATUS=FAIL ERROR=<named-cause>"
  route_instead: "STATUS=DEFER ROUTE=<hub|sibling>"

pipeline:
  stage: "direction - frames the interface decision before static systems, behavior, audit, or build"
  accepts_from: ["/design:audit", "/design:foundations", "/design:md-generator", "/design:motion"]
  hands_to_next: ["/design:foundations", "/design:motion", "/design:audit"]
  recommend_only: true
  hands_to_build: "sk-code, via .opencode/skills/sk-design/shared/sk_code_handoff.md, only when accepted design output moves to implementation"
