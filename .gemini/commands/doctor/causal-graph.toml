description = "Diagnose causal-edge integrity with an interactive read-only status workflow."
prompt = "<!-- skill_agent: system-spec-kit -->\n\n> ⚠️ **EXECUTION PROTOCOL — READ FIRST**\n>\n> This command runs a structured YAML workflow. Do NOT dispatch agents from this document.\n>\n> **Ownership:** Markdown owns setup (resolves all inputs). YAML owns execution. Setup values resolved here are passed to the YAML workflow.\n>\n> **YOUR FIRST ACTION:**\n> 1. Run the unified setup phase in this Markdown entrypoint and resolve: `execution_mode`, `intent`, `confidence_threshold`, `no_snapshot`, `dry_run`\n> 2. Load the corresponding YAML file from `assets/` only after all setup values are resolved:\n>    - -> `doctor_causal-graph.yaml` (interactive stats + drift)\n> 3. Execute the YAML workflow step by step using those resolved values\n>\n> All content below is reference context for the YAML workflow. Do not treat reference sections as direct instructions to execute.\n\n## CONSTRAINTS\n\n- **ONLY MODE ()**: this doctor command is always interactive by design; deleted mode suffixes are invalid.\n- **DO NOT** dispatch any agent from this document\n- **ALL** workflow execution happens through the YAML — this document is setup + reference only\n- **MARKDOWN OWNS SETUP**: resolve setup inputs here first, then hand off to YAML\n- **YAML START CONDITION**: do not load YAML until ALL required inputs are bound: `execution_mode`, `intent`, `confidence_threshold`, `no_snapshot`, `dry_run`\n- **CONFIRM WORKFLOW IS READ-ONLY**: zero causal-edge mutations; report goes to packet-local scratch only\n- **CONFIRM WORKFLOW IS STATUS-GATED**: snapshot `context-index.sqlite`, then create new causal edges through `memory_causal_link` only for candidates with confidence >= 0.7\n- **NO EDGE DELETION**: never call unlink/delete SQL, never prune existing edges, and never lower or rewrite existing edge weights\n- **NO MUTATIONS** in `--dry-run` mode — propose candidate links only, never write\n\n> **Format:** `/doctor:causal-graph` [flags]\n> Example: `/doctor:causal-graph`\n\n## GATE 3 STATUS: EXEMPT\n\n| Aspect      | Value                                                                                                                                               |\n| ----------- | --------------------------------------------------------------------------------------------------------------------------------------------------- |\n| Location    | `mcp_server/database/context-index.sqlite` (`causal_edges` table)                                                                                   |\n| Reason      | Mutations target a stable runtime database table, not a spec folder packet                                                                          |\n| Alternative | Mutation boundaries validated by Phase 3 canonical-path validator (allowlist exact-match); rollback via `VACUUM INTO` snapshot generated by Phase 2 |\n\n---\n\n# SINGLE CONSOLIDATED PROMPT - ONE USER INTERACTION\n\nThis workflow gathers ALL inputs in ONE prompt. Only the suffix is supported; doctor commands are interactive by design.\n\n---\n\n## 0. UNIFIED SETUP PHASE\n\n**FIRST MESSAGE PROTOCOL**: This prompt MUST be your FIRST response when no mode suffix is given. No mutating tool calls before asking. Lightweight read-only discovery is allowed (`memory_causal_stats`), then ask ALL questions immediately and wait.\n\n**STATUS: BLOCKED**\n\n```\nEXECUTE THIS SINGLE CONSOLIDATED PROMPT:\n\n1. CHECK mode suffix:\n   - default -> execution_mode = \"INTERACTIVE\", yaml = \"doctor_causal-graph.yaml\"\n   - No suffix -> execution_mode = \"INTERACTIVE\", yaml = \"doctor_causal-graph.yaml\" (confirm is the only supported mode)\n\n2. PARSE flags from $ARGUMENTS:\n   |- --confidence-threshold=N -> confidence_threshold = parsed float (default: 0.7; minimum allowed for candidate linking is 0.7)\n   |- --no-snapshot            -> no_snapshot = TRUE (advanced opt-out; only honored in interactive workflow)\n   |- --dry-run                -> dry_run = TRUE (propose only, no writes; only honored in interactive workflow)\n   `- Defaults: confidence_threshold=0.7, no_snapshot=FALSE, dry_run=FALSE\n\n3. Lightweight discovery (read-only):\n   - Run: memory_causal_stats({})\n   - Store: total_edges, link_coverage_percent, currentCoverage, targetCoverage, health, orphanedEdges, relationCoverage\n\n4. ASK with a single prompt only for unresolved flags:\n\n   Q1. Confidence threshold (always ask if not flagged):\n     A) 0.7 default - minimum permitted auto-link threshold\n     B) 0.8 stricter - fewer links, lower false-positive risk\n     C) 0.9 conservative - first-time packet bootstrap\n\n   Q2. Snapshot opt-out (always ask if --no-snapshot not flagged):\n     A) Take snapshot before auto-link (default; recommended)\n     B) Skip snapshot (advanced; rollback unavailable on failure)\n\n   Reply format: answer only unresolved flag questions, or confirm defaults.\n\n5. WAIT only when an unresolved flag question was asked\n\n6. Parse and store:\n   - execution_mode | intent | confidence_threshold | no_snapshot | dry_run\n\n7. SET STATUS: PASSED\n\nDO NOT proceed until any required flag prompt is answered\nNEVER mutate causal_edges without snapshot unless --no-snapshot was explicitly set\nNEVER split questions into multiple prompts\n```\n\n**Phase Output:**\n- `execution_mode` | `intent` | `confidence_threshold` | `no_snapshot` | `dry_run` | `total_edges` | `link_coverage_percent` | `health` | `orphanedEdges`\n\n---\n\n# SpecKit Doctor — Causal Graph\n\nDiagnose and rebuild causal-edge integrity inside `mcp_server/database/context-index.sqlite`. The command surfaces causal graph coverage, stale relationship signals, and add-only auto-link candidates for the `causal_edges` table.\n\n```yaml\nrole: Expert Operator running causal-edges integrity diagnostics + add-only auto-link\npurpose: Detect low coverage, orphaned records, drifted lineage, and stale edge observations\naction: Discovery -> analysis -> (run: snapshot -> add-only auto-link -> verify -> rollback-on-regression)\n```\n\n## 1. PURPOSE\n\nRestore the causal graph to useful coverage without destroying existing lineage evidence. The `causal_edges` table drifts when new spec docs are created without explicit links, when ad-hoc `memory_save` calls skip link suggestions or leave references unresolved, and when decision lineage evolves across packets faster than the graph is backfilled.\n\nThis command exposes that drift through the interactive workflow and reports the actions needed for creating only high-confidence new edges. It never deletes existing causal edges, never prunes low-weight edges, and treats coverage below 60% as the gold-battery failure floor inherited from the causal graph routing packet.\n\n## SUBSYSTEM CONTRACT\n\n| Aspect               | Value                                                                       |\n| -------------------- | --------------------------------------------------------------------------- |\n| Command              | `/doctor:causal-graph`                                                      |\n| Modes                | (stats + drift), , (auto-link), |\n| Target table         | `causal_edges` inside `mcp_server/database/context-index.sqlite`            |\n| Snapshot             | YES — snapshots host context-index DB before any link mutation              |\n| Mutation boundary    | ADD-ONLY edges; never deletes existing edges                                |\n| Link confidence | >= 0.7 only                                                                 |\n| Coverage target      | >= 60% of spec-doc records                                                  |\n| Stats MCP tool       | `memory_causal_stats({})`                                                   |\n| Link MCP tool        | `memory_causal_link({sourceId, targetId, relation, strength, evidence})`    |\n| Drift MCP tool       | `memory_drift_why({memoryId, maxDepth, direction})`                         |\n\n## STALENESS SIGNALS\n\nThe diagnostic phase detects:\n\n1. **Low coverage** — `link_coverage_percent` below 60% of spec-doc records\n2. **Orphan records** — high-importance memory records with no incoming or outgoing causal edges\n3. **Divergent edge weights** — relation weights skewed enough to imply repeated upsert or extraction imbalance\n4. **Stale edge observations** — old `last_observed_at` equivalents (`extracted_at` / `last_accessed`) relative to recent packet edits\n5. **Relation imbalance** — one relation dominates the recent insertion window and risks masking real lineage variety\n6. **Unresolved lineage** — `memory_drift_why` shows sparse or missing paths around active phase packets\n\n## WHEN TO RUN CONFIRM\n\n| Symptom                                                                | Recommended Mode                            |\n| ---------------------------------------------------------------------- | ------------------------------------------- |\n| Routine causal-graph health check                                      |                                     |\n| Reviewing first before changing any edge                               |                                  |\n| After a deep-research/deep-review iteration created new packet records | `--confidence-threshold=0.7`         |\n| First-time auto-link on a packet                                       | `--confidence-threshold=0.9` |\n| You only want candidate links                                          | `--dry-run`                          |\n\n## MUTATION BOUNDARIES (Phase 3 enforced)\n\n| Allowed Targets                                                          | Forbidden Targets                                                                             |\n| ------------------------------------------------------------------------ | --------------------------------------------------------------------------------------------- |\n| `mcp_server/database/context-index.sqlite`                               | Any spec folder doc (`.opencode/specs/**/*.md`, `.opencode/specs/**/*.json`)                  |\n| `mcp_server/database/context-index.sqlite.pre-doctor-causal-graph.*.bak` | Any skill, agent, or command file                                                             |\n| New rows in `causal_edges` via `memory_causal_link` only                 | Any other database, including code graph, skill graph, deep-loop, eval, and vector DBs        |\n|                                                                          | Any `DELETE FROM causal_edges`, `memory_causal_unlink`, or direct SQL mutation of causal rows |\n\nPhase 3 first activity (`validate_targets_and_policy`) runs canonical-path validation and add-only policy validation BEFORE any write: resolved targets via `realpath`, exact-match against allowed_targets, no `..` escapes, no symlinks outside repo root, and no forbidden operation strings. Failure halts before mutation.\n\n## WORKFLOW PHASES (delegated to YAML)\n\n```\nPhase 0 — Discovery\n  Purpose: probe memory_causal_stats; capture coverage and relation health\n  Tools: memory_causal_stats, Bash(stat for host DB mtime)\n  Output: { total_edges, coverage_percent, health, orphaned_edges, relation_balance }\n\nPhase 1 — Analysis\n  Purpose: sample up to 10 candidate records and classify drift\n  Tools: memory_drift_why, memory_search\n  Output: { candidate_records[], drift_signals[], recommended_action }\n\nPhase 2 — Snapshot\n  Purpose: VACUUM INTO snapshot of context-index.sqlite before any edge insert\n  Tools: Bash(sqlite3 ... 'VACUUM INTO ...'), disk-free preflight\n  Output: { snapshot_path, snapshot_bytes }\n  Halt-on: disk-free < 2x current DB size\n\nPhase 3 — run\n  First activity: validate_targets_and_policy\n  Then: memory_causal_link for each candidate with confidence >= threshold and no existing same source/target/relation edge\n  Output: { attempted: N, inserted: M, skipped: K, threshold }\n\nPhase 4 — Post-verify\n  Purpose: gold-battery coverage check; coverage must be >= 60% and must not regress from baseline\n  Tools: memory_causal_stats, memory_drift_why on sampled linked records\n  Output: { gold_battery_pass: bool, coverage_percent, regressions[] }\n\nPhase 5 — Rollback (only on regression in interactive workflow or user request in confirm)\n  Purpose: restore context-index.sqlite from snapshot\n  Tools: Bash(cp -p)\n  Output: { rolled_back: true, restored_at }\n\nPhase 6 — Report\n  Purpose: emit final status + state log\n  Output: { status: OK|APPLIED|ROLLED_BACK|FAIL, state_log_path }\n```\n\n## 6. INSTRUCTIONS\n\nThe orchestrator (`assets/doctor_causal-graph.yaml`) executes the workflow phases above. As the operator running this command:\n\n1. **Resolve mode + flags** via the Unified Setup Phase prompt above. Do not advance until ALL inputs are bound (`execution_mode`, `intent`, `confidence_threshold`, `no_snapshot`, `dry_run`).\n2. **Load the matching YAML** from `assets/`. The surviving YAML file is `doctor_causal-graph.yaml`.\n3. **Execute the YAML phases sequentially**. Phase 0 and Phase 1 are read-only. Phase 2-5 only run in modes.\n4. **In modes, never skip the snapshot phase** unless the user passed `--no-snapshot` explicitly. The validator records the waiver and rollback becomes unavailable.\n5. **Honor the confidence threshold**. The threshold default is 0.7 and MUST NOT be lowered. Any candidate below threshold is skipped.\n6. **Honor add-only semantics**. If `memory_drift_why` shows the same source/target/relation already exists, skip the candidate rather than calling `memory_causal_link`.\n7. **Always emit the state log** in Phase 6, regardless of success or failure. The log feeds `/doctor:update`'s cross-subsystem dashboard.\n\nRead the YAML file end-to-end before starting Phase 0. Do not paraphrase; the YAML defines exact tool sequences, parameters, halt conditions, and rollback behavior.\n\n## OUTPUT CONTRACT\n\n```markdown\n## Causal Graph Health Report\n\n### Status\n[OK | ATTENTION | STALE | APPLIED | ROLLED_BACK | FAIL]\n\n### Stats\n| Metric          | Value   |\n| --------------- | ------- |\n| Total Edges     | N       |\n| Coverage        | NN.NN%  |\n| Target Coverage | 60%     |\n| Orphaned Edges  | N       |\n| Health          | healthy | attention | has_orphans |\n\n### Drift Signals\n[N drift signals detected]\n- low_coverage: current NN.NN% vs target 60%\n- orphan_records: N high-priority records without incoming causal edges\n- stale_observations: N edges with stale last_observed_at/extracted_at timestamps\n\n### Action Taken\n- Snapshot: <path>\n- Auto-link: threshold=N, attempted=N, inserted=N, skipped=N\n- Gold-battery: PASS|FAIL\n- Rollback: not_needed|restored|unavailable\n\n### Recommendation\n[Run /doctor:causal-graph | Raise threshold and rerun | No action needed]\n\n### Next Steps\n[Specific command or packet follow-up]\n```\n\n## NEXT STEPS\n\nAfter running this command:\n\n- **OK + coverage >= 60%** -> no action needed; rerun after major packet creation\n- **ATTENTION + low coverage** -> run `--confidence-threshold=0.7`\n- **First-time auto-link on a packet** -> run `--confidence-threshold=0.9`\n- **ROLLED_BACK** -> inspect `<packet_scratch>/doctor-causal-graph-state.<timestamp>.json` and rerun with a stricter threshold\n\n## RELATED COMMANDS\n\n- `/doctor:update` — unified orchestrator that includes causal-edge integrity in the dependency-ordered chain\n- `/doctor:memory` — host DB health for `context-index.sqlite`\n- `/spec_kit:deep-research` — produces packets whose decisions often need causal edges\n- `/spec_kit:deep-review` — produces review lineage that benefits from explicit causal edges\n\n\nUser request: {{args}}"
