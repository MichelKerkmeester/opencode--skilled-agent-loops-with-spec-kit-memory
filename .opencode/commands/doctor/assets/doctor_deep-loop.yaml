# ─────────────────────────────────────────────────────────────────
# DOCTOR: DEEP LOOP COVERAGE GRAPH WORKFLOW (INTERACTIVE DIAGNOSTIC MODE)
# ─────────────────────────────────────────────────────────────────
role: Expert Operator running deep-loop coverage graph diagnostics in interactive mode
purpose: Read-only deep-loop graph status and lazy-init analysis with user review gates. No mutations.
action: Discovery -> gate -> analysis -> gate -> recommendation -> report

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: sequential
  compliance: MANDATORY
  execution: interactive
  approvals: per_phase
  tracking: phase_by_phase
  validation: continuous_self_validation
  intent: DIAGNOSE


# ─────────────────────────────────────────────────────────────────
# DEEP LOOP DOCTOR INVARIANT
# ─────────────────────────────────────────────────────────────────
deep_loop_doctor_invariant: |
  Deep-loop doctor is read-only by contract. It reads graph nodes and edges and
  the research/review iteration folders to assess coverage, without modifying the
  source markdown files or the coverage graph. It never calls
  deep_loop_graph_upsert; rebuilds are owned by /doctor:update. Lazy-init is
  surfaced only as a recommendation when the graph is empty and iteration folders
  provide a readable source inventory.

# ─────────────────────────────────────────────────────────────────
# UPSTREAM ASSETS
# ─────────────────────────────────────────────────────────────────
upstream_assets:
  contract: "local command design contract"
  files:
    spec: "spec.md"  # REQ-013 covers lazy-init/default-mode behavior
    decision_record: "decision-record.md"  # ADR-004/ADR-007 rollback and cancel safety
    checklist: "checklist.md#doctor-deep-loop"  # CHK-304 convergence acceptance
  pass_policy:
    convergence_signal_required: true  # CHK-304 gold-battery signal
    minimum_iterations: 3  # existing gold_battery.minimum_iterations
    lazy_init_source_required: true  # REQ-013 source detection before upsert

# ─────────────────────────────────────────────────────────────────
# DEEP LOOP DOCTOR PHILOSOPHY
# ─────────────────────────────────────────────────────────────────
deep_loop_doctor_philosophy:
  principle: "Coverage graph reads should prove whether research/review iteration evidence is represented without changing the graph."
  approach: "Discover iteration folders -> let user review -> sample status/query/convergence -> let user review -> emit recommendation."
  mandate: "This command is read-only by contract."

# ─────────────────────────────────────────────────────────────────
# USER INPUTS
# ─────────────────────────────────────────────────────────────────
user_inputs:
  execution_mode: "[EXECUTION_MODE] - INTERACTIVE (this YAML)"
  intent: "[INTENT] - DIAGNOSE (this YAML)"
  scope: "[SCOPE] - research|review|both; default both"


# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  defaults:
    scope_empty: "both"
  scope_policy:
    research: "inspect research/iterations only"
    review: "inspect review/iterations only"
    both: "inspect both research and review iteration folders"

# ─────────────────────────────────────────────────────────────────
# MUTATION BOUNDARIES
# ─────────────────────────────────────────────────────────────────
mutation_boundaries:
  allowed_targets:
    - ".opencode/skills/deep-loop-runtime/database/deep-loop-graph.sqlite"  # coverage graph DB
    - ".opencode/skills/deep-loop-runtime/database/deep-loop-graph.sqlite.pre-doctor-deep-loop.*.bak"  # deep-loop snapshot files only
  forbidden_targets:
    - "<active-spec-folder>/research/iterations/*.md"  # read-only source inputs, never rewritten
    - "<active-spec-folder>/review/iterations/*.md"  # read-only source inputs, never rewritten
    - "<active-spec-folder>/**/*.md"  # no spec packet doc writes from deep-loop doctor
    - "<active-spec-folder>/description.json"  # metadata not deep-loop storage
    - "<active-spec-folder>/graph-metadata.json"
    - ".opencode/skills/**/SKILL.md"
    - ".opencode/skills/**/graph-metadata.json"
    - ".opencode/agents/**/*.md"
    - ".opencode/commands/doctor/*.md"
    - ".opencode/commands/doctor/assets/doctor_*.yaml"
    - "mcp_server/database/*context-index*"
    - "mcp_server/database/*voyage*"
    - "mcp_server/database/*code-graph*"
    - "mcp_server/database/*skill*"
    - "mcp_server/database/*eval*"
    - "mcp_server/database/*causal*"
    - "mcp_server/database/*coco*"
    - "direct SQL graph mutation"
  policy: "read-only diagnostic; iteration files are read-only inputs, never mutation targets"
  enforcement: "This command is READ-ONLY by contract. Any attempted write halts with STATUS=FAIL and ERROR='confirm-mode-mutation-violation'."
  validator:
    name: validate_targets
    runs: "before any file or database write; diagnostic mode should never reach a write path"
    steps:
      - "Resolve candidate target through realpath under repo_root."
      - "Assert target is one of mutation_boundaries.allowed_targets."
      - "Reject forbidden_targets even when a glob would otherwise match."
      - "Reject direct sqlite3 mutation statements and any deep_loop_graph_upsert call."

# ─────────────────────────────────────────────────────────────────
# INTERACTIVE GATES
# ─────────────────────────────────────────────────────────────────
interactive_gates:
  before_phase_1_analysis:
    prompt: "Phase 0 deep-loop discovery complete. Continue to Phase 1 graph analysis? (y/n/details)"
    blocking: true
    approvals:
      y: "continue to phase_1_analysis"
      n: "STATUS=CANCELLED; emit state log with phase=phase_0_discovery"
      details: "print graph presence, empty_graph, stale_graph, iteration counts, and lazy-init availability, then ask again"
  before_phase_2_recommendation:
    prompt: "Phase 1 graph analysis complete. Continue to Phase 2 recommendation? (y/n/details)"
    blocking: true
    approvals:
      y: "continue to phase_2_recommendation"
      n: "STATUS=CANCELLED; emit state log with phase=phase_1_analysis"
      details: "print drift classes and convergence samples, then ask again"
  before_phase_3_report:
    prompt: "Phase 2 recommendation ready. Emit report and state log? (y/n/details)"
    blocking: true
    approvals:
      y: "emit report and state log"
      n: "STATUS=CANCELLED; emit minimal state log"
      details: "print recommendation, then ask again"

# ─────────────────────────────────────────────────────────────────
# STALENESS SIGNALS
# ─────────────────────────────────────────────────────────────────
staleness_signals:
  empty_graph:
    detection: "deep_loop_graph_status reports totalNodes == 0 while iteration folders exist"
    severity: high
  stale_graph:
    detection: "deep-loop-graph.sqlite last write age > 7 days OR older than newest iteration file"
    severity: medium
  orphan_nodes:
    detection: "deep_loop_graph_query coverage_gaps returns nodes missing incoming coverage edges"
    severity: medium
  missing_convergence_signal:
    detection: "packets with >= 3 iterations return empty signals from deep_loop_graph_convergence"
    severity: high

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_0_discovery:
    purpose: "Detect graph presence, empty_graph state, staleness, and iteration folders."
    activities:
      - "Glob: <active-spec-folder>/research/iterations/*.md when scope includes research."
      - "Glob: <active-spec-folder>/review/iterations/*.md when scope includes review."
      - "Bash: stat -f '%m %z' .opencode/skills/deep-loop-runtime/database/deep-loop-graph.sqlite when present."
      - "Group iteration files by specFolder, loopType, and inferred sessionId from iteration metadata or folder path."
      - "Run deep_loop_graph_status({specFolder, loopType, sessionId}) for up to 10 sampled packet/session namespaces."
      - "Set lazy_init.available=true when empty_graph=true and iteration_folder_count > 0."
      - "Interactive gate: before_phase_1_analysis."
    outputs:
      - graph_present: true|false
      - empty_graph: true|false
      - stale_graph: true|false
      - iteration_folder_count: N
      - sampled_status: list
      - lazy_init_available: true|false
    validation: discovery_complete
    fail_fast:
      - "deep_loop_graph_status returns tool error for all samples -> STATUS=FAIL with diagnostic"

  phase_1_analysis:
    purpose: "Classify graph drift using read-only query and convergence checks."
    activities:
      - "For sampled namespaces, run deep_loop_graph_query({queryType: 'coverage_gaps', limit: 50})."
      - "For sampled research namespaces, run deep_loop_graph_query({queryType: 'uncovered_questions', limit: 50})."
      - "For sampled research namespaces, run deep_loop_graph_query({queryType: 'unverified_claims', limit: 50})."
      - "For packets with >= 3 iterations, run deep_loop_graph_convergence({specFolder, loopType, sessionId, iteration: latest_iteration, persistSnapshot: false})."
      - "Classify drift as empty_graph, stale_graph, orphan_nodes, missing_convergence_signal, or coverage_gaps."
      - "Never call deep_loop_graph_upsert in diagnostic mode."
      - "Interactive gate: before_phase_2_recommendation."
    outputs:
      - drift_classes:
          empty_graph: boolean
          stale_graph: boolean
          orphan_nodes: N
          missing_convergence_signal: N
          coverage_gaps: N
      - convergence_samples: list
      - severity_max: low|medium|high
    validation: analysis_complete

  phase_2_recommendation:
    purpose: "Translate drift signals into a safe operator action."
    rules:
      - "If empty_graph=true and lazy_init_available=true -> recommend a coverage-graph rebuild via /doctor:update."
      - "If missing_convergence_signal > 0 -> recommend a coverage-graph rebuild via /doctor:update."
      - "If stale_graph=true or orphan_nodes > 0 -> recommend a coverage-graph rebuild via /doctor:update."
      - "If no drift -> status=OK, no action needed."
    outputs:
      - status: OK|EMPTY|STALE|ATTENTION|MISSING|CANCELLED|FAIL
      - recommended_command: string
      - recommended_when: now|after-next-iteration|monitor
    validation: recommendation_complete
    activities:
      - "Interactive gate: before_phase_3_report."

  phase_3_report:
    purpose: "Emit packet-local report + state log."
    activities:
      - "Compose report following OUTPUT CONTRACT in deep-loop.md."
      - "Write state log to <packet_scratch>/doctor-deep-loop-state.<timestamp>.json."
      - "Print summary table to stdout."
    outputs:
      - state_log_path: "<packet_scratch>/doctor-deep-loop-state.<timestamp>.json"
      - status: STATUS_OK|STATUS_EMPTY|STATUS_STALE|STATUS_ATTENTION|STATUS_MISSING|STATUS_CANCELLED|STATUS_FAIL
    validation: report_emitted

# ─────────────────────────────────────────────────────────────────
# OUTPUT FORMAT
# ─────────────────────────────────────────────────────────────────
output_contract:
  format: markdown
  required_sections:
    - status_header
    - graph_state_table
    - drift_signals_block
    - lazy_init_block
    - recommendation_block
    - next_steps_block
  state_log:
    path: "<packet_scratch>/doctor-deep-loop-state.<timestamp>.json"
    schema:
      command: "/doctor deep-loop"
      mode: INTERACTIVE
      intent: DIAGNOSE
      timestamp: ISO_8601
      duration_seconds: number
      status: OK|EMPTY|STALE|ATTENTION|MISSING|CANCELLED|FAIL
      scope: research|review|both
      drift_classes: object
      lazy_init: object
      recommendation: string

# ─────────────────────────────────────────────────────────────────
# HALT CONDITIONS
# ─────────────────────────────────────────────────────────────────
halt_conditions:
  - "Any phase emits a write attempt -> STATUS=FAIL with ERROR='confirm-mode-mutation-violation'"
  - "Any phase calls deep_loop_graph_upsert -> STATUS=FAIL with ERROR='confirm-mode-upsert-forbidden'"
  - "Any direct sqlite3 mutation is attempted -> STATUS=FAIL with ERROR='direct-sql-forbidden'"
  - "User answers n at any interactive gate -> STATUS=CANCELLED and emit state log"

