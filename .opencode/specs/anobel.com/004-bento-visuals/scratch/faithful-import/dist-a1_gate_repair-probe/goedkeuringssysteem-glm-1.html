<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Goedkeuringssysteem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#eceef0;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    font-family:'Hanken Grotesk',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .card{
    width:560px;height:480px;
    background:#ffffff;
    border-radius:22px;
    box-shadow:0 1px 2px rgba(20,28,46,.04),0 26px 52px -22px rgba(20,28,46,.20);
    padding:30px;
    overflow:hidden;
    color:#0a1a2f;
    font-variant-numeric:tabular-nums;
    position:relative;
    margin-bottom:24px;
  }

  .visual{
    position:relative;
    width:500px;height:298px;
    background:#f6f8fc;
    border-radius:16px;
    border:1px solid #e7e9ee;
    padding:14px 16px 12px;
    display:flex;flex-direction:column;gap:8px;
    overflow:hidden;
  }

  .visual-head{
    display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  }

  .eyebrow{
    display:inline-flex;align-items:center;gap:6px;
    background:#ffffff;border:1px solid #cbd0dc;
    padding:5px 10px;border-radius:999px;
    font-size:12px;font-weight:600;color:#043367;line-height:1;
  }
  .eyebrow svg{display:block}

  .legend{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    font-size:11.5px;font-weight:600;color:#0a1a2f;
  }
  .legend-item{display:inline-flex;align-items:center;gap:6px}
  .legend-item i{display:inline-block;width:9px;height:9px;border-radius:50%}
  .legend-item.te-k i{background:#c9140f}
  .legend-item.goed i{background:#367e39}

  .matrix{
    display:grid;
    grid-template-columns:1.05fr 0.62fr 0.72fr;
    column-gap:12px;row-gap:2px;
    background:#fefefe;
    border:1px solid #e7e9ee;
    border-radius:12px;
    padding:10px 14px 9px;
    align-content:start;
  }

  .label{
    font-size:10.5px;font-weight:700;color:#4e4e4e;
    padding:4px 0 5px;letter-spacing:.005em;line-height:1.2;
    border-bottom:1px solid #e7e9ee;
    text-transform:none;
  }
  .label.right{text-align:right}

  .row{
    display:contents;
    font-size:12.5px;font-weight:500;color:#0a1a2f;line-height:1.2;
  }
  .row > div{
    padding:6px 0 5px;
    border-bottom:1px solid #ececec;
    display:flex;align-items:center;
  }
  .row:last-child > div{border-bottom:none}
  .row .status{justify-content:flex-end;gap:5px}
  .row .amount{justify-content:flex-end}

  .status-pill{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11.5px;font-weight:600;line-height:1;
    padding:4px 8px 4px 7px;border-radius:999px;
    border:1px solid transparent;
  }
  .status-pill svg{display:block}
  .status-pill.pending{color:#c9140f;background:#fefefe;border-color:#cbd0dc}
  .status-pill.approved{color:#367e39;background:#fefefe;border-color:#cbd0dc}

  .more-row{
    margin-top:auto;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding-top:8px;
    border-top:1px dashed #cbd0dc;
  }
  .more-meta{
    display:inline-flex;align-items:center;gap:7px;
    font-size:11.5px;font-weight:600;color:#043367;
    background:#ffffff;border:1px solid #cbd0dc;
    padding:5px 9px;border-radius:999px;line-height:1;
  }
  .more-meta i{
    width:8px;height:8px;border-radius:50%;background:#c9140f;display:inline-block;
  }
  .more-row .shell-cta{
    font-size:11.5px;font-weight:600;color:#043367;
    border:1px solid #cbd0dc;border-radius:999px;
    padding:5px 12px;background:#ffffff;line-height:1;cursor:pointer;
    text-transform:none;
    transition:background-color .18s ease,color .18s ease;
  }
  .more-row .shell-cta:hover{background:#043367;color:#E7ECF7}

  .title-block{
    position:absolute;left:30px;top:356px;width:500px;
  }
  .title{
    font-size:21px;font-weight:700;color:#0a1a2f;line-height:1.15;
    margin-bottom:7px;
  }
  .description{
    font-size:13.5px;font-weight:500;color:#4e4e4e;line-height:1.45;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
  <article class="card">

    <section class="visual" data-a1-role="visual">
      <div class="visual-head">
        <span class="eyebrow" data-a1-role="eyebrow">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2l7 3v6c0 4.5-3 8.2-7 9.5-4-1.3-7-5-7-9.5V5l7-3z"></path>
          </svg>
          Vloot-functie
        </span>
        <div class="legend">
          <span class="legend-item te-k"><i aria-hidden="true"></i>Te keuren</span>
          <span class="legend-item goed"><i aria-hidden="true"></i>Goedgekeurd</span>
        </div>
      </div>

      <div class="matrix">
        <div class="label" data-a1-role="label">Schip</div>
        <div class="label right" data-a1-role="label">Bedrag</div>
        <div class="label right" data-a1-role="label">Status</div>

        <div class="row" data-a1-role="row">
          <div>MS Aldebaran</div>
          <div class="amount">€2.480</div>
          <div class="status">
            <span class="status-pill pending">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="6"/></svg>
              Te keuren
            </span>
          </div>
        </div>

        <div class="row" data-a1-role="row">
          <div>MS Castor</div>
          <div class="amount">€1.150</div>
          <div class="status">
            <span class="status-pill pending">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="6"/></svg>
              Te keuren
            </span>
          </div>
        </div>

        <div class="row" data-a1-role="row">
          <div>MS Pollux</div>
          <div class="amount">€860</div>
          <div class="status">
            <span class="status-pill approved">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
              Goedgekeurd
            </span>
          </div>
        </div>
      </div>

      <div class="more-row">
        <span class="more-meta"><i aria-hidden="true"></i>2 te keuren · maart 2026</span>
        <button class="shell-cta" data-a1-role="shell-cta" type="button">+1 more</button>
      </div>
    </section>

    <div class="title-block">
      <h1 class="title" data-a1-role="title">Goedkeuringssysteem</h1>
      <p class="description" data-a1-role="description">Controleer bestellingen van de vloot voordat ze worden verwerkt</p>
    </div>

  </article>
</body>
</html>
