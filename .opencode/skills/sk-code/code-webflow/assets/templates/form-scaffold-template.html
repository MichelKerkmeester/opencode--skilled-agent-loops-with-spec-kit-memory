<!--
   COPY-PASTE TEMPLATE for Webflow custom form scaffolding.

   Where to use: Webflow Designer → Embed element inside a Form block, or as standalone embed
   when the Webflow Form behavior is augmented with custom validation/upload logic.

   Conventions enforced (see references/webflow/html/style-guide.md §3 Data-Attribute Conventions):
     - data-form-field marks the field container that JS toggles validation classes on
     - data-form-input marks the actual <input>/<select>/<textarea>
     - .validation-invalid / .validation-valid classes go on [data-form-field] container
     - aria-describedby links input → error message for screen readers
     - aria-invalid / aria-required mirror the JS-managed validation state
     - kebab-case for all data attribute names
     - Semantic HTML elements (<label>, <input>, <button type="submit">) — no <div> form rolls

   Replace ALL placeholder text marked [LIKE_THIS] before shipping.
-->


<!-- ───────────────────────────────────────────────────────────────
     1. FORM SHELL
─────────────────────────────────────────────────────────────── -->

<!-- Form root — Webflow Form element wraps this. Add data-component for custom validation JS. -->
<form
  data-component="[form-name]"
  data-form-state="ready"
  novalidate
>


<!-- ───────────────────────────────────────────────────────────────
     2. TEXT INPUT FIELD (standard pattern)
─────────────────────────────────────────────────────────────── -->

  <!-- Field container — class toggles `.validation-invalid` / `.validation-valid` -->
  <div data-form-field class="form-field">
    <label for="[field-id]" class="form-field--label">
      [Field label]
      <span class="form-field--required" aria-hidden="true">*</span>
    </label>

    <input
      id="[field-id]"
      name="[field-name]"
      type="text"
      data-form-input
      class="input"
      required
      aria-required="true"
      aria-invalid="false"
      aria-describedby="[field-id]-error"
    >

    <!-- Error message — JS unhides this when validation fails -->
    <p id="[field-id]-error" class="form-field--error" hidden>
      [Default error message — JS may replace with field-specific error]
    </p>

    <!-- Success indicator — JS unhides this when validation passes -->
    <span id="[field-id]-success" class="form-field--success" aria-hidden="true" hidden>
      ✓
    </span>
  </div>


<!-- ───────────────────────────────────────────────────────────────
     3. EMAIL INPUT FIELD (with type=email native validation)
─────────────────────────────────────────────────────────────── -->

  <div data-form-field class="form-field">
    <label for="email" class="form-field--label">
      Email address
      <span class="form-field--required" aria-hidden="true">*</span>
    </label>

    <input
      id="email"
      name="email"
      type="email"
      data-form-input
      class="input"
      required
      aria-required="true"
      aria-invalid="false"
      aria-describedby="email-error"
      autocomplete="email"
      inputmode="email"
    >

    <p id="email-error" class="form-field--error" hidden>
      Please enter a valid email address.
    </p>
  </div>


<!-- ───────────────────────────────────────────────────────────────
     4. SELECT FIELD (with bridge attributes for custom dropdown)
─────────────────────────────────────────────────────────────── -->

  <div data-form-field class="form-field">
    <label for="[select-id]" class="form-field--label">[Select label]</label>

    <!-- Native select for form submission (visually hidden when custom dropdown overlays it) -->
    <select
      id="[select-id]"
      name="[select-name]"
      data-form-input
      class="input"
      aria-describedby="[select-id]-error"
    >
      <option value="">[Placeholder text]</option>
      <option value="[value-1]">[Option 1]</option>
      <option value="[value-2]">[Option 2]</option>
    </select>

    <!-- Custom select bridge wrapper — JS attaches dropdown UI here -->
    <div data-select="wrapper">
      <div data-select="trigger">
        <input data-select="input" placeholder="[Placeholder text]" readonly>
      </div>
      <div data-select="dropdown" hidden>
        <div data-select="option" data-value="[value-1]">[Option 1]</div>
        <div data-select="option" data-value="[value-2]">[Option 2]</div>
      </div>
    </div>

    <p id="[select-id]-error" class="form-field--error" hidden>
      Please select an option.
    </p>
  </div>


<!-- ───────────────────────────────────────────────────────────────
     5. CHECKBOX (with separate validation message)
─────────────────────────────────────────────────────────────── -->

  <div data-form-field class="form-field">
    <label class="checkbox-label">
      <input
        type="checkbox"
        name="[consent-name]"
        data-form-input
        required
        aria-required="true"
        aria-invalid="false"
        aria-describedby="[consent-name]-error"
      >
      <span class="checkbox-label--text">
        [Consent label text — e.g. "I agree to the terms and conditions"]
      </span>
    </label>

    <p id="[consent-name]-error" class="form-field--error" hidden>
      [Required-consent error message]
    </p>
  </div>


<!-- ───────────────────────────────────────────────────────────────
     6. SUBMIT
─────────────────────────────────────────────────────────────── -->

  <!-- Submit button — JS toggles disabled state during submission -->
  <button
    type="submit"
    data-form-submit
    class="btn btn--primary"
    aria-disabled="false"
  >
    <span data-submit-label>[Submit label — e.g. "Send message"]</span>
    <span data-submit-loading hidden>[Loading label — e.g. "Sending..."]</span>
  </button>

</form>


<!-- ───────────────────────────────────────────────────────────────
     7. JS HANDOFF NOTES
─────────────────────────────────────────────────────────────── -->

<!--
   The form-validation JS targets:
     - [data-component="[form-name]"]            — form root
     - [data-form-field]                          — field containers; toggles .validation-invalid / .validation-valid
     - [data-form-input]                          — actual inputs; reads value, sets aria-invalid
     - [data-form-submit]                         — submit button; toggles disabled + loading state
     - [data-submit-label] / [data-submit-loading] — submit text variants

   On validation failure:
     - .validation-invalid added to [data-form-field] container
     - aria-invalid="true" set on [data-form-input]
     - hidden removed from #[field-id]-error
     - Focus moved to first invalid field

   On validation success:
     - .validation-valid added to [data-form-field] container
     - aria-invalid="false" set on [data-form-input]
     - hidden re-applied to #[field-id]-error

   See:
     - references/webflow/html/style-guide.md §3 Form-field state markers
     - references/webflow/javascript/quick-reference.md §5 Form Validation Classes
     - references/webflow/css/quick-reference.md §3 Form Validation Classes
-->
